<html lang="ar" dir="rtl">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3B1B40;--purple-l:#5a2d63;--gold:#D4B48E;--gold-d:#b8965e;--bg:#faf8f5;--muted:#7a6a7e}
body{font-family:'Zain',sans-serif;background:var(--bg);color:#1a0a1e;direction:rtl;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px 40px;max-width:480px;width:100%;box-shadow:0 24px 80px rgba(59,27,64,.12);border:1px solid rgba(212,180,142,.2)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:24px;font-weight:900;color:var(--gold);margin:0 auto 10px}
.logo h1{font-family:'Amiri',serif;font-size:20px;color:var(--purple);font-weight:700}
.logo p{font-size:12px;color:var(--muted)}

/* Mode toggle */
.mode-switch{display:flex;gap:6px;background:#f5f0f8;border-radius:12px;padding:5px;margin-bottom:22px}
.mode-btn{flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;transition:.25s;background:transparent;color:var(--muted)}
.mode-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 3px 10px rgba(59,27,64,.2)}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:13px;font-weight:700;transition:.25s;background:transparent;color:var(--muted)}
.tab-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 4px 14px rgba(59,27,64,.22)}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--purple);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid rgba(212,180,142,.4);font-size:14px;color:#1a0a1e;background:var(--bg);font-family:'Zain',sans-serif;outline:none;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,180,142,.2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;font-family:'Zain',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.25s;margin-bottom:10px}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 6px 20px rgba(59,27,64,.25)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--purple)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.remember{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--muted);cursor:pointer}
.remember input[type=checkbox]{width:16px;height:16px;accent-color:var(--purple);cursor:pointer}

.msg{display:none;font-size:13px;padding:11px 14px;border-radius:10px;margin-bottom:14px;line-height:1.8}
.msg.error{color:#dc3545;background:#fff5f5;border:1px solid #ffcccc}
.msg.success{color:#155724;background:#d4edda;border:1px solid #c3e6cb;text-align:center}
.msg.warning{color:#856404;background:#fff3cd;border:1px solid #ffc107}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(212,180,142,.3)}

.back-link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.back-link a{color:var(--purple);font-weight:700;text-decoration:none}
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">ت</div>
    <h1>معهد التأصيل العلمي</h1>
    <p>منصة تعليمية شرعية متخصصة</p>
  </div>

  <!-- Mode: Student / Admin -->
  <div class="mode-switch">
    <button class="mode-btn active" id="mode-student" onclick="setMode('student')">
      <i data-lucide="user" style="width:13px;height:13px;vertical-align:-2px"></i> طالب
    </button>
    <button class="mode-btn" id="mode-admin" onclick="setMode('admin')">
      <i data-lucide="shield" style="width:13px;height:13px;vertical-align:-2px"></i> مشرف
    </button>
  </div>

  <!-- ════════════ STUDENT SECTION ════════════ -->
  <div id="student-section">
    <!-- Login / Register tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="setTab('login')">تسجيل الدخول</button>
      <button class="tab-btn" id="tab-reg" onclick="setTab('reg')">حساب جديد</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="msg error" id="login-err"></div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="l-email" placeholder="example@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <label class="remember">
        <input type="checkbox" id="l-remember"/> تذكرني
      </label>
      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
        <i data-lucide="log-in" style="width:16px;height:16px"></i> دخول
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="reg-form" style="display:none">
      <div class="msg error" id="reg-err"></div>
      <div class="field">
        <label>الاسم الثلاثي <span style="color:#dc3545">*</span></label>
        <input type="text" id="r-name" placeholder="أدخل اسمك الثلاثي"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>العمر</label>
          <input type="number" id="r-age" placeholder="عمرك" min="10" max="80"/>
        </div>
        <div class="field">
          <label>رقم الهاتف</label>
          <input type="text" id="r-phone" placeholder="+966..."/>
        </div>
      </div>
      <div class="field">
        <label>معرف تيليجرام</label>
        <input type="text" id="r-tg" placeholder="@username"/>
      </div>
      <div class="field">
        <label>المستوى الدراسي</label>
        <select id="r-level">
          <option value="">اختر المستوى</option>
          <option>ابتدائي</option><option>متوسط</option><option>ثانوي</option>
          <option>دبلوم</option><option>بكالوريوس</option><option>ماجستير</option>
          <option>دكتوراه</option><option>موظف</option>
        </select>
      </div>
      <div class="field">
        <label>البريد الإلكتروني <span style="color:#dc3545">*</span></label>
        <input type="email" id="r-email" placeholder="example@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>كلمة المرور <span style="color:#dc3545">*</span></label>
        <input type="password" id="r-pass" placeholder="6 أحرف على الأقل" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>تأكيد كلمة المرور <span style="color:#dc3545">*</span></label>
        <input type="password" id="r-pass2" placeholder="أعد كتابة كلمة المرور" autocomplete="new-password"/>
      </div>
      <button class="btn btn-gold" id="btn-reg" onclick="doRegister()">
        <i data-lucide="user-plus" style="width:16px;height:16px"></i> إنشاء الحساب
      </button>
    </div>
  </div>

  <!-- ════════════ ADMIN SECTION ════════════ -->
  <div id="admin-section" style="display:none">
    <div class="msg error" id="admin-err"></div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="a-email" placeholder="admin@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="a-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doAdminLogin()"/>
    </div>
    <label class="remember">
      <input type="checkbox" id="a-remember"/> تذكرني (30 يوماً)
    </label>
    <button class="btn btn-primary" id="btn-admin" onclick="doAdminLogin()">
      <i data-lucide="shield-check" style="width:16px;height:16px"></i> دخول المشرف
    </button>
  </div>

  <div class="back-link">
    <a href="index.html">← العودة للصفحة الرئيسية</a>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// UI helpers
// ══════════════════════════════════════════════
function showMsg(id, text, type='error'){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}
function showMsgHtml(id, html, type='success'){
  const el = document.getElementById(id);
  el.innerHTML = html;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}
function hideMsg(id){ document.getElementById(id).style.display='none'; }

function setBusy(id, busy, label){
  const btn = document.getElementById(id);
  btn.disabled = busy;
  if(busy){ btn._orig = btn.innerHTML; btn.innerHTML = `<span style="opacity:.7">${label}</span>`; }
  else if(btn._orig){ btn.innerHTML = btn._orig; }
}

function setMode(mode){
  const isAdmin = mode === 'admin';
  document.getElementById('student-section').style.display = isAdmin ? 'none' : '';
  document.getElementById('admin-section').style.display = isAdmin ? '' : 'none';
  document.getElementById('mode-student').className = `mode-btn${isAdmin?'':' active'}`;
  document.getElementById('mode-admin').className = `mode-btn${isAdmin?' active':''}`;
}

function setTab(t){
  document.getElementById('login-form').style.display = t==='login' ? '' : 'none';
  document.getElementById('reg-form').style.display = t==='reg' ? '' : 'none';
  document.getElementById('tab-login').className = `tab-btn${t==='login'?' active':''}`;
  document.getElementById('tab-reg').className = `tab-btn${t==='reg'?' active':''}`;
}

// ══════════════════════════════════════════════
// Firebase error messages (Arabic)
// ══════════════════════════════════════════════
function fbMsg(code){
  return {
    'auth/user-not-found':      'البريد غير مسجّل',
    'auth/wrong-password':      'كلمة المرور غير صحيحة',
    'auth/invalid-credential':  'البريد أو كلمة المرور غير صحيحة',
    'auth/email-already-in-use':'البريد مسجّل مسبقاً — سجّل دخولك',
    'auth/invalid-email':       'صيغة البريد غير صحيحة',
    'auth/weak-password':       'كلمة المرور ضعيفة (6 أحرف كحد أدنى)',
    'auth/too-many-requests':   'محاولات كثيرة، انتظر قليلاً',
    'auth/network-request-failed': 'تعذّر الاتصال — تحقق من الإنترنت',
    'auth/user-disabled':       'هذا الحساب موقوف',
    'auth/operation-not-allowed': 'Email/Password غير مفعّل في Firebase Console',
    'auth/unauthorized-domain': 'النطاق غير مُصرَّح به في Firebase Console',
  }[code] || `خطأ: ${code || 'غير معروف'}`;
}

// ══════════════════════════════════════════════
// تسجيل الدخول — طالب
// ══════════════════════════════════════════════
async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  hideMsg('login-err');

  if(!email || !pass){ showMsg('login-err','يرجى إدخال البريد وكلمة المرور'); return; }
  setBusy('btn-login', true, 'جارٍ الدخول...');

  try{
    // Firebase Auth
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    console.log('✅ doLogin success, uid:', cred.user.uid);

    // Firestore — get user profile
    const snap = await db.collection('users').doc(cred.user.uid).get();

    if(!snap.exists){
      await auth.signOut();
      showMsg('login-err','لم يُعثر على ملفك الشخصي — تواصل مع المسؤول');
      return;
    }

    const profile = snap.data();
    console.log('Profile status:', profile.status);

    if(profile.status === 'pending'){
      await auth.signOut();
      showMsg('login-err','⏳ حسابك في انتظار موافقة المسؤول', 'warning');
      return;
    }
    if(profile.status === 'rejected'){
      await auth.signOut();
      showMsg('login-err','❌ تم رفض طلبك — تواصل مع المسؤول');
      return;
    }

    // Save remember me
    if(document.getElementById('l-remember').checked){
      try{ localStorage.setItem('ti_rm', btoa(JSON.stringify({e:email,p:pass}))); }catch(_){}
    } else {
      localStorage.removeItem('ti_rm');
    }

    // Save profile to localStorage for dashboard
    localStorage.setItem('ti_user', JSON.stringify({
      uid: cred.user.uid, ...profile, isAdmin: false
    }));

    window.location.href = 'dashboard.html';

  }catch(e){
    console.log('❌ doLogin error:', e.code, e.message);
    showMsg('login-err', fbMsg(e.code));
  }finally{
    setBusy('btn-login', false);
  }
}

// ══════════════════════════════════════════════
// إنشاء حساب جديد — طالب
// ══════════════════════════════════════════════
async function doRegister(){
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  hideMsg('reg-err');

  // Validation
  if(!name)         { showMsg('reg-err','⚠️ يرجى إدخال الاسم الثلاثي'); return; }
  if(!email)        { showMsg('reg-err','⚠️ يرجى إدخال البريد الإلكتروني'); return; }
  if(!pass)         { showMsg('reg-err','⚠️ يرجى إدخال كلمة المرور'); return; }
  if(pass.length<6) { showMsg('reg-err','⚠️ كلمة المرور 6 أحرف على الأقل'); return; }
  if(pass !== pass2){ showMsg('reg-err','⚠️ كلمتا المرور غير متطابقتَين'); return; }

  setBusy('btn-reg', true, 'جارٍ إنشاء الحساب...');

  try{
    // 1. Create Firebase Auth account
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    console.log('✅ doRegister: account created, uid:', cred.user.uid);

    // 2. Save profile to Firestore
    const profile = {
      uid:      cred.user.uid,
      name,     email,
      phone:    document.getElementById('r-phone').value.trim() || '',
      age:      document.getElementById('r-age').value || '',
      telegram: document.getElementById('r-tg').value.trim() || '',
      level:    document.getElementById('r-level').value || '',
      status:   'pending',
      completedLessons: [],
      testResults: [],
      createdAt: new Date().toISOString(),
      provider: 'email'
    };

    try{
      await db.collection('users').doc(cred.user.uid).set(profile);
      console.log('✅ doRegister: profile saved to Firestore');
    }catch(fe){
      console.log('❌ Firestore write error:', fe.code, fe.message);
      // Not fatal — account still created
    }

    // 3. Sign out (wait for admin approval)
    await auth.signOut();

    // 4. Clear form
    ['r-name','r-email','r-pass','r-pass2','r-phone','r-age','r-tg'].forEach(id=>{
      document.getElementById(id).value = '';
    });
    document.getElementById('r-level').value = '';

    // 5. Show success
    showMsgHtml('reg-err',
      '🎉 <strong>تم التسجيل بنجاح!</strong><br>حسابك في انتظار موافقة المسؤول.<br><small style="color:#6c757d">يمكنك تسجيل الدخول بعد الموافقة.</small>',
      'success'
    );

    // 6. Switch to login tab after 3s
    setTimeout(() => setTab('login'), 3000);

  }catch(e){
    console.log('❌ doRegister error:', e.code, e.message);
    showMsg('reg-err', fbMsg(e.code));
  }finally{
    setBusy('btn-reg', false);
  }
}

// ══════════════════════════════════════════════
// تسجيل دخول المشرف
// ══════════════════════════════════════════════
async function doAdminLogin(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  hideMsg('admin-err');

  if(!email || !pass){ showMsg('admin-err','يرجى إدخال البريد وكلمة المرور'); return; }
  setBusy('btn-admin', true, 'جارٍ التحقق...');

  try{
    // Firebase Auth
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    console.log('✅ doAdminLogin: auth success, uid:', cred.user.uid);

    // Check admins collection in Firestore
    const adminSnap = await db.collection('admins').doc(cred.user.uid).get();

    if(!adminSnap.exists){
      await auth.signOut();
      showMsg('admin-err','هذا الحساب غير مسجّل كمشرف');
      console.log('❌ uid not in admins collection');
      return;
    }

    const adminData = adminSnap.data();
    console.log('✅ Admin verified:', adminData.username);

    // Remember admin
    if(document.getElementById('a-remember').checked){
      try{
        localStorage.setItem('ti_admin_rm', btoa(JSON.stringify({
          e:email, p:pass, ts:Date.now()
        })));
      }catch(_){}
    }

    // Save admin profile to localStorage
    localStorage.setItem('ti_user', JSON.stringify({
      uid: cred.user.uid, ...adminData, isAdmin: true
    }));

    window.location.href = 'dashboard.html';

  }catch(e){
    console.log('❌ doAdminLogin error:', e.code, e.message);
    showMsg('admin-err', fbMsg(e.code));
  }finally{
    setBusy('btn-admin', false);
  }
}

// ══════════════════════════════════════════════
// Auto-login check
// ══════════════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if(!user) return;
  // Already authenticated — check if admin or student and redirect
  console.log('onAuthStateChanged: user logged in:', user.uid);

  const adminSnap = await db.collection('admins').doc(user.uid).get().catch(()=>null);
  if(adminSnap?.exists){
    localStorage.setItem('ti_user', JSON.stringify({
      uid: user.uid, ...adminSnap.data(), isAdmin: true
    }));
    window.location.href = 'dashboard.html';
    return;
  }

  const userSnap = await db.collection('users').doc(user.uid).get().catch(()=>null);
  if(userSnap?.exists && userSnap.data().status === 'approved'){
    localStorage.setItem('ti_user', JSON.stringify({
      uid: user.uid, ...userSnap.data(), isAdmin: false
    }));
    window.location.href = 'dashboard.html';
  }
});

// Auto-fill remember me
(function(){
  try{
    const rm = JSON.parse(atob(localStorage.getItem('ti_rm')||''));
    if(rm?.e){ document.getElementById('l-email').value=rm.e; document.getElementById('l-pass').value=rm.p; document.getElementById('l-remember').checked=true; }
  }catch(_){}
  try{
    const arm = JSON.parse(atob(localStorage.getItem('ti_admin_rm')||''));
    if(arm?.e && Date.now()-arm.ts < 30*24*60*60*1000){
      document.getElementById('a-email').value=arm.e;
      document.getElementById('a-pass').value=arm.p;
      document.getElementById('a-remember').checked=true;
    }
  }catch(_){}
})();

// Show login message from redirect
const msg = sessionStorage.getItem('_loginMsg');
if(msg){ sessionStorage.removeItem('_loginMsg');
  if(msg==='pending')  showMsg('login-err','⏳ حسابك في انتظار موافقة المسؤول','warning');
  if(msg==='rejected') showMsg('login-err','❌ تم رفض طلبك — تواصل مع المسؤول');
}

lucide.createIcons();
</script>
</body>
</html>
