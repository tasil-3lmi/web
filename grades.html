<style>
.grade-card{background:#fff;border-radius:16px;padding:20px;border:1px solid rgba(212,180,142,.2);box-shadow:0 4px 16px rgba(59,27,64,.06);margin-bottom:14px}

.pct-circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:18px;font-weight:900}
.section-head{font-family:'Amiri',serif;font-size:19px;font-weight:700;color:var(--purple);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state div:first-child{font-size:48px;margin-bottom:12px}

<body>

<div id="app" style="display:none">
  <main style="max-width:1000px;margin:0 auto;padding:24px">

    <!-- Page header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px">
      <div>
        <h1 style="font-family:'Amiri',serif;font-size:24px;color:var(--purple);font-weight:700">🏅 درجاتي وإنجازاتي</h1>
        <p id="student-name" style="font-size:13px;color:var(--muted);margin-top:3px"></p>
      </div>
      <a href="profile.html" style="font-size:12px;color:var(--purple-l);font-weight:700;text-decoration:none;padding:6px 14px;border-radius:9px;border:1px solid rgba(212,180,142,.3)">← الملف الشخصي</a>
    </div>

    <!-- Summary cards -->
    <div class="summary-grid" id="summary-grid">
      <div class="summary-card"><div class="spin-ring" style="margin:0 auto"></div></div>
    </div>

    <!-- Final GPA -->
    <div id="gpa-section" style="background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:18px;padding:24px;text-align:center;margin-bottom:24px;display:none">
      <div style="color:rgba(255,255,255,.75);font-size:13px;margin-bottom:6px">المعدل العام</div>
      <div id="gpa-display" style="font-family:'Amiri',serif;font-size:48px;font-weight:900;color:#fff;line-height:1"></div>
      <div id="gpa-label" style="color:rgba(255,255,255,.8);font-size:14px;margin-top:8px"></div>
      <div id="gpa-bar-wrap" style="background:rgba(255,255,255,.2);border-radius:10px;height:8px;margin:14px auto 0;max-width:300px">
        <div id="gpa-bar" style="height:100%;border-radius:10px;background:var(--gold);transition:width .8s;width:0%"></div>
      </div>
    </div>

    <!-- Per-course breakdown -->
    <div class="section-head">📚 تفصيل الدرجات حسب المقرر</div>
    <div id="courses-grades">
      <div class="empty-state"><div>⏳</div><div>جارٍ تحميل بياناتك...</div></div>
    </div>

  </main>
</div>

<div id="toast-container"></div>

<script>
const PAGE_ID='profile';
let currentUser=null;

// Cache-first auth
(function(){
  const c=localStorage.getItem('ti_user');
  if(c){ try{ currentUser=JSON.parse(c); showApp(); }catch(e){} }
})();
auth.onAuthStateChanged(async user=>{
  if(!user){ localStorage.removeItem('ti_user'); location.href='login.html'; return; }
  if(!currentUser){
    const a=await db.collection('admins').doc(user.uid).get().catch(()=>null);
    if(a?.exists){ currentUser={uid:user.uid,...a.data(),isAdmin:true}; }
    else{ const u=await db.collection('users').doc(user.uid).get().catch(()=>null); if(!u?.exists){ await auth.signOut(); location.href='login.html'; return; } currentUser={uid:user.uid,...u.data(),isAdmin:false}; }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
    showApp();
  }
});

function showApp(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav(PAGE_ID,currentUser);
  if(typeof setNavUser==='function') setNavUser(currentUser);
  setTimeout(()=>{ if(window.lucide) lucide.createIcons(); },80);
  document.getElementById('student-name').textContent=(currentUser.name||currentUser.fullName||'الطالب');
  loadGrades();
}

async function logout(){ localStorage.removeItem('ti_user'); try{await auth.signOut();}catch(e){} location.href='index.html'; }

// ═══════════════════════════════════════
// KNOWN COURSES (same as course.html)
// ═══════════════════════════════════════
const ALL_COURSES = [
  {id:'t1',title:'المدخل إلى طلب العلم',color:'#b8965e'},
  {id:'t2',title:'تذكرة السامع والمتكلم',color:'#a07840'},
  {id:'t3',title:'الجرد القرآني التطبيقي',color:'#8B6914'},
  {id:'m1',title:'القواعد الأربع',color:'#3B1B40'},
  {id:'m2',title:'نواقض الإسلام',color:'#4a2250'},
  {id:'m3',title:'الأصول الثلاثة وأدلتها',color:'#5a2d63'},
  {id:'m4',title:'كشف الشبهات',color:'#3B1B40'},
  {id:'m5',title:'الآجرومية في النحو',color:'#1a5276'},
  {id:'m6',title:'التذكرة في علوم الحديث',color:'#1b4f72'},
  {id:'m7',title:'الأرجوزة الميئية في السيرة',color:'#154360'},
  {id:'m8',title:'الرسالة اللطيفة في أصول الفقه',color:'#0e3251'},
  {id:'m9',title:'الأربعون النووية',color:'#1a5276'},
  {id:'m10',title:'مقدمات التفقه',color:'#117a65'},
  {id:'m11',title:'متن الأخضري',color:'#0e6655'},
  {id:'m12',title:'متن العشماوية',color:'#117a65'},
  {id:'m13',title:'نظم ابن أبي كف',color:'#0d5e4a'},
  {id:'m14',title:'نظم المرشد المعين',color:'#117a65'},
  {id:'m15',title:'منظومة القواعد الفقهية',color:'#0a4d3a'},
  {id:'m16',title:'أصول التفسير',color:'#6e2f0a'},
  {id:'m17',title:'كتاب التوحيد',color:'#7d3410'},
  {id:'m18',title:'القواعد السلفية في الأسماء والصفات',color:'#6e2f0a'},
  {id:'m19',title:'العقيدة الواسطية',color:'#8b3c11'},
  {id:'m20',title:'تبصرة القاصد في المقاصد',color:'#512e5f'},
  {id:'m21',title:'الجامع في الآداب',color:'#5b3068'},
  {id:'m22',title:'السبل المرضية',color:'#6c3483'},
  {id:'m23',title:'الأمر بالمعروف والنهي عن المنكر',color:'#922b21'},
  {id:'m24',title:'آداب البحث والمناظرة',color:'#a93226'},
  {id:'m25',title:'الرد على المخالف',color:'#922b21'},
  {id:'m26',title:'الحصانة الفكرية',color:'#b03a2e'},
];

// ═══════════════════════════════════════
// LOAD & CALCULATE GRADES
// ═══════════════════════════════════════
async function loadGrades(){
  const uid = currentUser.uid;
  const completedLessons = currentUser.completedLessons||[];

  // Load all score docs for this user
  const scoresSnap = await db.collection('scores')
    .where('uid','==',uid).get().catch(()=>null);

  const scoresMap = {}; // courseId → scores object
  if(scoresSnap) scoresSnap.docs.forEach(d=>{ scoresMap[d.data().courseId]=d.data().scores||{}; });

  // Load all courses to get exercises/tests
  const coursesSnap = await db.collection('courses').get().catch(()=>null);
  const coursesMap = {};
  if(coursesSnap) coursesSnap.docs.forEach(d=>{ coursesMap[d.id]=d.data(); });

  // Calculate grades per course
  let totalLessons=0, totalDone=0, totalExCorrect=0, totalExQuestions=0, totalTestCorrect=0, totalTestQuestions=0;
  const courseGrades = [];

  for(const c of ALL_COURSES){
    const courseData = coursesMap[c.id];
    if(!courseData) continue;

    const lessons  = courseData.lessons||[];
    const tests    = courseData.tests||[];
    const scores   = scoresMap[c.id]||{};

    // Lessons done
    const lessonsDone = lessons.filter(l=>completedLessons.includes(l.id)).length;
    const lessonPct   = lessons.length ? Math.round(lessonsDone/lessons.length*100) : 0;
    totalLessons += lessons.length;
    totalDone    += lessonsDone;

    // Exercises
    let exCorrect=0, exTotal=0;
    lessons.forEach(l=>{
      (l.exercises||[]).forEach(ex=>{
        const sc = scores[l.id+'_ex_'+ex.id];
        if(sc){ exTotal++; if(sc.correct) exCorrect++; }
        totalExQuestions += sc ? 1 : 0;
        if(sc?.correct) totalExCorrect++;
      });
    });
    const exPct = exTotal ? Math.round(exCorrect/exTotal*100) : null;

    // Tests
    let testCorrect=0, testTotal=0, testsDone=0;
    tests.forEach(t=>{
      const sc = scores[t.id];
      if(sc){ testsDone++; testCorrect+=sc.score||0; testTotal+=sc.total||0; }
    });
    const testPct = testTotal ? Math.round(testCorrect/testTotal*100) : null;
    totalTestCorrect   += testCorrect;
    totalTestQuestions += testTotal;

    // Final grade for course
    const components = [];
    if(lessonPct >= 0) components.push({w:0.3, v:lessonPct});
    if(exPct   != null) components.push({w:0.3, v:exPct});
    if(testPct != null) components.push({w:0.4, v:testPct});

    let finalPct = null;
    if(components.length){
      const totalW = components.reduce((a,c)=>a+c.w,0);
      finalPct = Math.round(components.reduce((a,c)=>a+c.v*c.w,0) / totalW);
    }

    if(lessonsDone > 0 || exTotal > 0 || testsDone > 0){
      courseGrades.push({...c, lessonsDone, lessonsTotal:lessons.length, lessonPct, exCorrect, exTotal, exPct, testCorrect, testTotal, testPct, testsDone, testsTotal:tests.length, finalPct});
    }
  }

  // Overall summary
  const overallLessonPct = totalLessons ? Math.round(totalDone/totalLessons*100) : 0;
  const overallExPct     = totalExQuestions ? Math.round(totalExCorrect/totalExQuestions*100) : null;
  const overallTestPct   = totalTestQuestions ? Math.round(totalTestCorrect/totalTestQuestions*100) : null;

  const gpaComponents = [{w:0.3,v:overallLessonPct}];
  if(overallExPct   != null) gpaComponents.push({w:0.3,v:overallExPct});
  if(overallTestPct != null) gpaComponents.push({w:0.4,v:overallTestPct});
  const totalW = gpaComponents.reduce((a,c)=>a+c.w,0);
  const gpa = gpaComponents.length ? Math.round(gpaComponents.reduce((a,c)=>a+c.v*c.w,0)/totalW) : 0;

  renderSummary(totalDone, totalLessons, overallLessonPct, overallExPct, overallTestPct, gpa);
  renderCourseGrades(courseGrades);
}

function renderSummary(done, total, lessonPct, exPct, testPct, gpa){
  const color = g => g>=80?'#28a745':g>=60?'var(--gold-d)':'#dc3545';
  const label = g => g>=80?'ممتاز 🌟':g>=70?'جيد جداً ✨':g>=60?'جيد 👍':g>=50?'مقبول':'يحتاج مراجعة 📚';

  document.getElementById('summary-grid').innerHTML=`
    <div class="summary-card">
      <div class="pct-circle" style="background:rgba(59,27,64,.08);color:var(--purple);font-size:22px">${done}</div>
      <div style="font-weight:800;font-size:14px;color:var(--purple)">الدروس المكتملة</div>
      <div style="font-size:12px;color:var(--muted)">${done} من ${total}</div>
      <div class="mini-bar" style="margin-top:8px"><div class="mini-fill" style="width:${lessonPct}%;background:var(--purple)"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${lessonPct}%</div>
    </div>
    <div class="summary-card">
      <div class="pct-circle" style="background:rgba(40,167,69,.08);color:#28a745">${exPct!=null?exPct+'%':'—'}</div>
      <div style="font-weight:800;font-size:14px;color:var(--purple)">التمارين</div>
      <div style="font-size:12px;color:var(--muted)">متوسط الإجابات الصحيحة</div>
      ${exPct!=null?`<div class="mini-bar" style="margin-top:8px"><div class="mini-fill" style="width:${exPct}%;background:#28a745"></div></div>`:'<div style="font-size:11px;color:var(--muted);margin-top:8px">لم تُحَل تمارين بعد</div>'}
    </div>
    <div class="summary-card">
      <div class="pct-circle" style="background:rgba(212,180,142,.12);color:var(--gold-d)">${testPct!=null?testPct+'%':'—'}</div>
      <div style="font-weight:800;font-size:14px;color:var(--purple)">الاختبارات</div>
      <div style="font-size:12px;color:var(--muted)">متوسط درجات الاختبارات</div>
      ${testPct!=null?`<div class="mini-bar" style="margin-top:8px"><div class="mini-fill" style="width:${testPct}%;background:var(--gold-d)"></div></div>`:'<div style="font-size:11px;color:var(--muted);margin-top:8px">لم تُحل اختبارات بعد</div>'}
    </div>
    <div class="summary-card" style="background:linear-gradient(135deg,rgba(59,27,64,.06),rgba(212,180,142,.08))">
      <div class="pct-circle" style="background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;font-size:22px">${gpa}%</div>
      <div style="font-weight:800;font-size:14px;color:var(--purple)">المعدل العام</div>
      <div style="font-size:13px;font-weight:700;color:${color(gpa)};margin-top:4px">${label(gpa)}</div>
    </div>`;

  if(gpa > 0){
    const sec = document.getElementById('gpa-section');
    sec.style.display='';
    document.getElementById('gpa-display').textContent = gpa+'%';
    document.getElementById('gpa-label').textContent = label(gpa);
    setTimeout(()=>{ document.getElementById('gpa-bar').style.width=gpa+'%'; },200);
  }
}

function renderCourseGrades(grades){
  if(!grades.length){
    document.getElementById('courses-grades').innerHTML=`
      <div class="empty-state">
        <div>📖</div>
        <div style="font-size:15px;font-weight:700;color:var(--purple);margin-bottom:8px">لم تبدأ أي مقرر بعد</div>
        <div>ابدأ بفتح المقررات وإنجاز الدروس لترى درجاتك هنا</div>
        <a href="courses.html" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:10px 22px;border-radius:11px;background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;text-decoration:none;font-size:13px;font-weight:700">ابدأ الآن →</a>
      </div>`;
    return;
  }

  const color = g => g>=80?'#28a745':g>=60?'var(--gold-d)':'#dc3545';
  const label = g => g>=80?'ممتاز':g>=70?'جيد جداً':g>=60?'جيد':g>=50?'مقبول':'يحتاج مراجعة';
  const barColor = g => g>=80?'#28a745':g>=60?'var(--gold)':'#dc3545';

  document.getElementById('courses-grades').innerHTML = grades.map(g=>`
    <div class="grade-card">
      <div class="grade-card-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:8px;height:36px;border-radius:4px;background:${g.color};flex-shrink:0"></div>
          <a href="course.html?id=${g.id}" style="text-decoration:none">
            <div class="course-name">${g.title}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">انقر لفتح المقرر</div>
          </a>
        </div>
        <div style="text-align:center">
          ${g.finalPct!=null?`
            <div class="final-grade" style="color:${color(g.finalPct)}">${g.finalPct}%</div>
            <div style="font-size:11px;font-weight:700;color:${color(g.finalPct)}">${label(g.finalPct)}</div>
          `:'<div style="font-size:12px;color:var(--muted)">جارٍ</div>'}
        </div>
      </div>

      <!-- Lessons -->
      <div class="grade-row">
        <div>
          <div class="grade-label">📖 إنجاز الدروس</div>
          <div class="mini-bar"><div class="mini-fill" style="width:${g.lessonPct}%;background:var(--purple)"></div></div>
        </div>
        <div class="grade-val" style="color:var(--purple)">${g.lessonsDone}/${g.lessonsTotal} <span style="font-size:11px;opacity:.7">(${g.lessonPct}%)</span></div>
      </div>

      <!-- Exercises -->
      <div class="grade-row">
        <div>
          <div class="grade-label">📝 التمارين</div>
          ${g.exPct!=null?`<div class="mini-bar"><div class="mini-fill" style="width:${g.exPct}%;background:#28a745"></div></div>`:''}
        </div>
        <div class="grade-val" style="color:#28a745">
          ${g.exPct!=null?`${g.exCorrect}/${g.exTotal} <span style="font-size:11px;opacity:.7">(${g.exPct}%)</span>`:'<span style="color:var(--muted);font-weight:600;font-size:12px">لم تُحل</span>'}
        </div>
      </div>

      <!-- Tests -->
      <div class="grade-row">
        <div>
          <div class="grade-label">📊 الاختبارات</div>
          ${g.testPct!=null?`<div class="mini-bar"><div class="mini-fill" style="width:${g.testPct}%;background:${barColor(g.testPct)}"></div></div>`:''}
        </div>
        <div class="grade-val" style="color:${g.testPct!=null?barColor(g.testPct):'var(--muted)'}">
          ${g.testPct!=null?`${g.testCorrect}/${g.testTotal} <span style="font-size:11px;opacity:.7">(${g.testPct}%)</span>`:'<span style="font-weight:600;font-size:12px">لم تُحل</span>'}
        </div>
      </div>

      <!-- Final -->
      ${g.finalPct!=null?`
      <div style="margin-top:10px;padding:10px 14px;border-radius:10px;background:${g.finalPct>=70?'rgba(40,167,69,.06)':'rgba(220,53,69,.04)'};display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:800;color:var(--purple)">الدرجة النهائية للمقرر</span>
        <span style="font-size:18px;font-weight:900;color:${color(g.finalPct)}">${g.finalPct}% — ${label(g.finalPct)}</span>
      </div>`:''}
    </div>`).join('');
}
</script>
