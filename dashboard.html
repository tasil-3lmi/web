<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>الرئيسية — معهد التأصيل العلمي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/></noscript>
<script src="https://unpkg.com/lucide@0.263.0/dist/umd/lucide.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js" defer></script>
<script>firebase.initializeApp({apiKey:"AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk",authDomain:"tasil-3lmi.firebaseapp.com",projectId:"tasil-3lmi",storageBucket:"tasil-3lmi.firebasestorage.app",messagingSenderId:"596405733121",appId:"1:596405733121:web:38ebadcc9eef8d8bb77d00"});
const auth=firebase.auth(); const db=firebase.firestore();</script>
<link rel="stylesheet" href="styles.css"/>
<script src="shared.js" defer></script>
<script src="nav.js" defer></script>
</head>
<body>
<div id="spinner" class="spinner-overlay"><div class="spin-ring"></div></div>
<div id="app" style="display:none">
  <div id="nav-ph"></div>
  <main style="max-width:1100px;margin:0 auto;padding:24px">
    
<div style="margin-bottom:20px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:18px;padding:24px;color:#fff;position:relative;overflow:hidden">
  <div style="position:absolute;left:-20px;bottom:-30px;font-family:'Amiri',serif;font-size:110px;opacity:.05;pointer-events:none">العلم</div>
  <h2 id="welcome-msg" style="font-family:'Amiri',serif;font-size:22px;margin-bottom:6px">أهلاً!</h2>
  <p id="welcome-sub" style="opacity:.8;font-size:14px"></p>
</div>
<div id="stats-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
  <div style="font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--purple)">📚 المقررات الأخيرة</div>
  <div style="display:flex;gap:8px"><a href="grades.html" style="font-size:12px;font-weight:700;color:var(--purple);text-decoration:none;padding:4px 10px;border:1px solid rgba(59,27,64,.2);border-radius:8px">🏅 درجاتي</a><a href="courses.html" style="font-size:13px;font-weight:700;color:var(--gold-d);text-decoration:none">عرض الكل ←</a></div>
</div>
<div id="courses-preview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px"></div>

<!-- Study Plan quick view -->
<div style="margin-top:28px">
  <div style="font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--purple);margin-bottom:14px">📋 الخطة الدراسية</div>
  <div id="plan-quick"></div>
</div>
  </main>
</div>
<div id="modal-container"></div>
<div id="toast-container"></div>
<script>
const PAGE_ID='dashboard';

// Cache-first auth
let currentUser=null;
(function(){ const c=localStorage.getItem('ti_user'); if(c){ try{ currentUser=JSON.parse(c); showApp(); }catch(e){} }})();
auth.onAuthStateChanged(async user=>{
  if(!user){ localStorage.removeItem('ti_user'); location.href='login.html'; return; }
  if(!currentUser){
    const a=await db.collection('admins').doc(user.uid).get().catch(()=>null);
    if(a?.exists){ currentUser={uid:user.uid,...a.data(),isAdmin:true}; }
    else{ const u=await db.collection('users').doc(user.uid).get().catch(()=>null); if(!u?.exists){ await auth.signOut(); location.href='login.html'; return; } currentUser={uid:user.uid,...u.data(),isAdmin:false}; }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
    showApp();
  }
});

function renderStats(done, total){
  document.getElementById('stats-row').innerHTML=[
    {icon:'book-open',label:'المقررات',val:total,color:'var(--purple)',bg:'rgba(59,27,64,.08)'},
    {icon:'check-circle',label:'الدروس المكتملة',val:done,color:'#28a745',bg:'rgba(40,167,69,.08)'},
    {icon:'clipboard-check',label:'الاختبارات',val:total*2,color:'var(--gold-d)',bg:'rgba(212,180,142,.12)'},
  ].map(s=>`<div style="background:#fff;border-radius:14px;padding:18px;border:1px solid rgba(212,180,142,.18);display:flex;align-items:center;gap:12px">
    <div style="width:44px;height:44px;border-radius:11px;background:${s.bg};color:${s.color};display:flex;align-items:center;justify-content:center;">
      <i data-lucide="${s.icon}" style="width:20px;height:20px"></i>
    </div>
    <div><div style="font-size:26px;font-weight:900;color:${s.color}">${s.val}</div>
    <div style="font-size:12px;color:var(--muted);font-weight:700">${s.label}</div></div>
  </div>`).join('');
  if(window.lucide) lucide.createIcons();
}

function renderCoursesPreview(courses){
  const el = document.getElementById('courses-preview');
  if(!el) return;
  el.innerHTML = courses.slice(0,6).map(c=>`
    <a href="course.html?id=${c.id}" style="background:#fff;border-radius:12px;padding:14px;border:1px solid rgba(212,180,142,.18);text-decoration:none;display:block;transition:.2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <div style="height:3px;border-radius:2px;background:${c.color||'#3B1B40'};margin-bottom:10px"></div>
      <div style="font-size:13px;font-weight:800;color:var(--purple)">${c.title}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${(c.lessons||[]).length||20} درساً</div>
    </a>`).join('');
}

function showApp(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav(PAGE_ID,currentUser);
  if(typeof setNavUser==='function') setNavUser(currentUser);
  setTimeout(()=>{ if(window.lucide) lucide.createIcons(); },80);
  if(typeof onReady==='function') onReady();
}
async function logout(){ localStorage.removeItem('ti_user'); try{await auth.signOut();}catch(e){} location.href='index.html'; }

const PLAN_QUICK = [
  {title:"المرحلة التمهيدية",color:"#b8965e",books:['المدخل إلى طلب العلم','تذكرة السامع والمتكلم','الجرد القرآني']},
  {title:"المستوى الأول — المرحلة الأولى (العقيدة)",color:"#3B1B40",books:["القواعد الأربع","نواقض الإسلام","الأصول الثلاثة","كشف الشبهات"]},
  {title:"المستوى الأول — المرحلة الثانية (الآلة والسنة)",color:"#1a5276",books:["الآجرومية","التذكرة في علوم الحديث","الأرجوزة الميئية","الرسالة اللطيفة","الأربعون النووية"]},
  {title:"المستوى الأول — المرحلة الثالثة (الفقه المالكي)",color:"#117a65",books:["مقدمات التفقه","الأخضري","العشماوية","نظم ابن أبي كف","المرشد المعين","القواعد الفقهية"]},
  {title:"المستوى الأول — المرحلة الرابعة (التفسير والعقيدة)",color:"#6e2f0a",books:["أصول التفسير","كتاب التوحيد","القواعد السلفية","الواسطية"]},
  {title:"المستوى الأول — المرحلة الخامسة (المقاصد والآداب)",color:"#512e5f",books:["تبصرة القاصد","الجامع في الآداب","السبل المرضية"]},
  {title:"المستوى الأول — المرحلة السادسة (الدعوة والمناظرة)",color:"#922b21",books:["الأمر بالمعروف","آداب المناظرة","الرد على المخالف","الحصانة الفكرية"]},
];

async function onReady(){
  document.getElementById('welcome-msg').textContent="أهلاً، "+(currentUser.name||currentUser.fullName||'طالب')+"! 👋";
  document.getElementById('welcome-sub').textContent=currentUser.isAdmin?('دورك: '+(currentUser.adminRole==='super'?'المشرف العام':'مشرف')):'مرحباً بك في معهد التأصيل العلمي';

  const done=(currentUser.completedLessons||[]).length;
  const TOTAL_COURSES = 26;

  // Stats immediately from cache
  renderStats(done, TOTAL_COURSES);

  // Load from Firestore in background & update
  db.collection('courses').get().then(snap => {
    const count = snap && !snap.empty ? snap.size : TOTAL_COURSES;
    renderStats(done, count);
    // Show recent courses
    if(snap && !snap.empty){
      const courses = snap.docs.map(d=>d.data()).sort((a,b)=>(a._order||0)-(b._order||0));
      renderCoursesPreview(courses);
    }
  }).catch(()=>{});

  document.getElementById('stats-row').innerHTML=[
    {icon:'book-open',label:'المقررات',val:TOTAL_COURSES,color:'var(--purple)',bg:'rgba(59,27,64,.08)'},
    {icon:'check-circle',label:'الدروس المكتملة',val:done,color:'#28a745',bg:'rgba(40,167,69,.08)'},
    {icon:'clipboard-check',label:'الاختبارات',val:(courses.length||26)*2,color:'var(--gold-d)',bg:'rgba(212,180,142,.12)'},
  ].map(s=>`<div style="background:#fff;border-radius:14px;padding:18px;border:1px solid rgba(212,180,142,.18);display:flex;align-items:center;gap:12px">
    <div style="width:44px;height:44px;border-radius:11px;background:${s.bg};color:${s.color};display:flex;align-items:center;justify-content:center;font-size:20px">
      <i data-lucide="${s.icon}" style="width:20px;height:20px"></i>
    </div>
    <div><div style="font-size:26px;font-weight:900;color:${s.color}">${s.val}</div><div style="font-size:12px;color:var(--muted);font-weight:700">${s.label}</div></div>
  </div>`).join('');

  // Courses preview
  document.getElementById('courses-preview').innerHTML=(courses.slice(0,6).length?courses.slice(0,6):[{id:'t1',title:'المدخل إلى طلب العلم',color:'#b8965e'},{id:'m1',title:'القواعد الأربع',color:'#3B1B40'},{id:'m5',title:'الآجرومية',color:'#1a5276'}]).map(c=>`
    <a href="courses.html?id=${c.id}" style="background:#fff;border-radius:12px;padding:14px;border:1px solid rgba(212,180,142,.18);text-decoration:none;display:block;transition:.2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <div style="height:3px;border-radius:2px;background:${c.color||'#3B1B40'};margin-bottom:10px"></div>
      <div style="font-size:13px;font-weight:800;color:var(--purple)">${c.title}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${(c.lessons||[]).length||20} درساً</div>
    </a>`).join('');

  // Plan quick
  document.getElementById('plan-quick').innerHTML=PLAN_QUICK.map(s=>`
    <div style="background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid rgba(212,180,142,.15);overflow:hidden">
      <div style="background:${s.color};padding:10px 14px">
        <span style="font-family:'Amiri',serif;font-size:13px;font-weight:700;color:#fff">${s.title}</span>
      </div>
      <div style="padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:6px">
        ${s.books.map(b=>`<span style="background:rgba(212,180,142,.12);color:var(--purple-l);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700">${b}</span>`).join('')}
      </div>
    </div>`).join('');
  if(window.lucide) lucide.createIcons();
}
</script>
</body>
</html>
