<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>لوحة التحكم — معهد التأصيل العلمي</title>
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@300;400;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk",
  authDomain:"tasil-3lmi.firebaseapp.com",
  projectId:"tasil-3lmi",
  storageBucket:"tasil-3lmi.firebasestorage.app",

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3B1B40;--purple-l:#5a2d63;--gold:#D4B48E;--gold-d:#b8965e;--bg:#faf8f5;--white:#fff;--muted:#7a6a7e}
body{font-family:'Zain',sans-serif;background:var(--bg);color:#1a0a1e;direction:rtl}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(212,180,142,.2);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 16px rgba(59,27,64,.06)}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color:var(--purple);font-family:'Amiri',serif}
.nav-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Amiri',serif;font-size:16px;font-weight:900}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;transition:.2s;background:transparent;color:var(--muted);text-decoration:none}
.nav-btn:hover,.nav-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.nav-btn i{width:14px;height:14px}
/* MAIN */
main{max-width:1100px;margin:0 auto;padding:28px 24px}
/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--white);border-radius:16px;padding:20px;border:1px solid rgba(212,180,142,.2);box-shadow:0 4px 20px rgba(59,27,64,.06);display:flex;align-items:center;gap:14px}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-num{font-size:28px;font-weight:900;color:var(--purple)}
.stat-label{font-size:12px;color:var(--muted);font-weight:600}
/* WELCOME */
.welcome{background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:20px;padding:28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.welcome::after{content:'العلم';position:absolute;left:-10px;bottom:-20px;font-family:'Amiri',serif;font-size:100px;opacity:.05;font-weight:900;pointer-events:none}
.welcome h2{font-family:'Amiri',serif;font-size:22px;margin-bottom:8px}
.welcome p{opacity:.8;font-size:14px}
/* COURSES PREVIEW */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:16px;font-weight:800;color:var(--purple);display:flex;align-items:center;gap:8px}
.see-all{font-size:13px;color:var(--gold-d);font-weight:700;text-decoration:none}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.course-card{background:var(--white);border-radius:14px;padding:18px;border:1px solid rgba(212,180,142,.18);box-shadow:0 2px 12px rgba(59,27,64,.05);cursor:pointer;transition:.22s}
.course-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(59,27,64,.1)}
.course-color-bar{width:100%;height:4px;border-radius:2px;margin-bottom:12px}
.course-card h4{font-size:14px;font-weight:800;color:var(--purple);margin-bottom:6px}
.course-card p{font-size:12px;color:var(--muted);line-height:1.6}
.course-meta{display:flex;gap:10px;margin-top:10px;font-size:11px;color:var(--muted)}
.tag{background:rgba(212,180,142,.15);color:var(--gold-d);padding:2px 8px;border-radius:10px;font-weight:700}
/* LOGOUT */
.btn-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;background:rgba(220,53,69,.1);color:#dc3545;transition:.2s}
.btn-logout:hover{background:#dc3545;color:#fff}
/* SPINNER */
#spinner{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:48px;height:48px;border:4px solid rgba(59,27,64,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@media(max-width:768px){nav{padding:10px 16px}.nav-links .nav-btn span{display:none}main{padding:20px 16px}}
</style>
</head>
<body>

<!-- Spinner while checking auth -->
<div id="spinner">
  <div class="spin-ring"></div>
  <div style="font-size:14px;color:var(--muted);font-weight:600">جارٍ التحقق من الجلسة...</div>
</div>

<!-- App (hidden until auth verified) -->
<div id="app" style="display:none">
  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="nav-logo-icon">ت</div>
      <span>معهد التأصيل</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-btn active"><i data-lucide="home"></i><span>الرئيسية</span></a>
      <a href="courses.html"   class="nav-btn"><i data-lucide="book-open"></i><span>المقررات</span></a>
      <a href="tests.html"     class="nav-btn"><i data-lucide="clipboard-check"></i><span>الاختبارات</span></a>
      <a href="schedule.html"  class="nav-btn"><i data-lucide="calendar"></i><span>الجدول</span></a>
      <a href="qa.html"        class="nav-btn"><i data-lucide="message-circle"></i><span>الأسئلة</span></a>
      <a href="profile.html"   class="nav-btn"><i data-lucide="user"></i><span>ملفي</span></a>
      <a href="admin.html"     class="nav-btn" id="nav-admin" style="display:none"><i data-lucide="settings"></i><span>الإدارة</span></a>
      <button class="btn-logout" onclick="logout()"><i data-lucide="log-out" style="width:14px;height:14px"></i>خروج</button>
    </div>
  </nav>

  <main>
    <!-- Welcome -->
    <div class="welcome">
      <h2 id="welcome-title">أهلاً!</h2>
      <p id="welcome-sub">مرحباً بك في معهد التأصيل العلمي</p>
    </div>

    <!-- Stats -->
    <div class="stat-grid" id="stats-grid">
      <!-- rendered by JS -->
    </div>

    <!-- Courses preview -->
    <div class="section-header">
      <div class="section-title">
        <i data-lucide="book-open" style="width:18px;height:18px;color:var(--gold-d)"></i>
        المقررات الدراسية
      </div>
      <a href="courses.html" class="see-all">عرض الكل ←</a>
    </div>
    <div class="courses-grid" id="courses-preview">
      <!-- rendered by JS -->
    </div>
  </main>
</div>

<script>
// ── Shared courses data (same as courses.html) ──
const COURSES_DEFAULT = [
  {id:1,title:"مدخل إلى طلب العلم",color:"#b8965e",desc:"تأسيس صحيح لمنهج طالب العلم الشرعي",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
  {id:2,title:"تذكرة السامع والمتكلم",color:"#a07840",desc:"آداب العلم والتعلم",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
  {id:3,title:"الجرد القرآني التطبيقي",color:"#8B6914",desc:"تطبيق عملي للقرآن",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
  {id:4,title:"القواعد الأربع",color:"#3B1B40",desc:"قواعد التوحيد الأربع",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
  {id:5,title:"نواقض الإسلام",color:"#4a2250",desc:"النواقض العشرة",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
  {id:6,title:"الأصول الثلاثة",color:"#5a2d63",desc:"معرفة الله ودينه ونبيه",lessons:Array.from({length:20},(_,i)=>({id:i+1,title:`الدرس ${i+1}`,done:false}))},
];

let currentUser = null;
let courses = [];

// ── Auth check ──
auth.onAuthStateChanged(async user => {
  if(!user){
    // No session → go to login
    window.location.href = 'login.html';
    return;
  }

  console.log('✅ Auth verified, uid:', user.uid);

  // Get profile from Firestore
  let profile = null;
  let isAdmin = false;

  // Check admins first
  const adminSnap = await db.collection('admins').doc(user.uid).get().catch(()=>null);
  if(adminSnap?.exists){
    profile = adminSnap.data();
    isAdmin = true;
  } else {
    const userSnap = await db.collection('users').doc(user.uid).get().catch(()=>null);
    if(userSnap?.exists) profile = userSnap.data();
  }

  if(!profile){
    await auth.signOut();
    window.location.href = 'login.html';
    return;
  }

  currentUser = { uid: user.uid, ...profile, isAdmin };

  // Load courses from Firestore or default
  const coursesSnap = await db.collection('courses').get().catch(()=>null);
  if(coursesSnap && !coursesSnap.empty){
    courses = coursesSnap.docs.map(d=>d.data()).sort((a,b)=>(a._order||0)-(b._order||0));
  } else {
    courses = COURSES_DEFAULT;
  }

  renderDashboard();
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('app').style.display = '';
  lucide.createIcons();
});

function renderDashboard(){
  const u = currentUser;
  const completed = (u.completedLessons||[]).length;
  const total = courses.reduce((a,c)=>(a + (c.lessons||[]).length), 0);

  // Welcome
  document.getElementById('welcome-title').textContent = `أهلاً، ${u.name || u.fullName || 'طالب'}! 👋`;
  document.getElementById('welcome-sub').textContent = u.isAdmin
    ? `مرحباً بك في لوحة التحكم — دورك: ${u.adminRole === 'super' ? 'المشرف العام' : 'مشرف'}`
    : `لديك ${courses.length} مقرراً — أتممت ${completed} درساً`;

  // Show admin nav
  if(u.isAdmin) document.getElementById('nav-admin').style.display = '';

  // Stats
  const stats = [
    {icon:'book-open',     label:'إجمالي المقررات', value:courses.length,         color:'#3B1B40',  bg:'rgba(59,27,64,.08)'},
    {icon:'check-circle',  label:'الدروس المكتملة',  value:completed,              color:'#28a745',  bg:'rgba(40,167,69,.08)'},
    {icon:'clipboard-check',label:'الاختبارات',      value:courses.length*2,       color:'#b8965e',  bg:'rgba(184,150,94,.1)'},
    {icon:'trending-up',   label:'نسبة الإتمام',     value:`${total?Math.round(completed/total*100):0}%`, color:'#1a5276', bg:'rgba(26,82,118,.08)'},
  ];
  document.getElementById('stats-grid').innerHTML = stats.map(s=>`
    <div class="stat-card">
      <div class="stat-icon" style="background:${s.bg};color:${s.color}">
        <i data-lucide="${s.icon}" style="width:22px;height:22px"></i>
      </div>
      <div>
        <div class="stat-num" style="color:${s.color}">${s.value}</div>
        <div class="stat-label">${s.label}</div>
      </div>
    </div>
  `).join('');

  // Courses preview (first 6)
  document.getElementById('courses-preview').innerHTML = courses.slice(0,6).map(c=>`
    <div class="course-card" onclick="window.location.href='courses.html?id=${c.id}'">
      <div class="course-color-bar" style="background:${c.color||'#3B1B40'}"></div>
      <h4>${c.title}</h4>
      <p>${c.desc||''}</p>
      <div class="course-meta">
        <span class="tag">${(c.lessons||[]).length} درساً</span>
        <span>${(c.stage||'')}</span>
      </div>
    </div>
  `).join('');

  lucide.createIcons();
}

async function logout(){
  localStorage.removeItem('ti_rm');
  localStorage.removeItem('ti_user');
  await auth.signOut();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
