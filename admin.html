<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>الإدارة — معهد التأصيل العلمي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/></noscript>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk",authDomain:"tasil-3lmi.firebaseapp.com",projectId:"tasil-3lmi",storageBucket:"tasil-3lmi.firebasestorage.app",messagingSenderId:"596405733121",appId:"1:596405733121:web:38ebadcc9eef8d8bb77d00"});
const auth=firebase.auth(),db=firebase.firestore();
</script>
<link rel="stylesheet" href="styles.css"/>
<script src="shared.js"></script>
<script src="nav.js"></script>
<style>
main{max-width:1100px;margin:0 auto;padding:22px 16px}
.admin-tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.atab{padding:9px 18px;border-radius:10px;border:1px solid rgba(212,180,142,.2);cursor:pointer;font-family:'Zain',sans-serif;font-size:13px;font-weight:700;background:#fff;color:var(--muted);transition:.2s}
.atab.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;border-color:transparent}
.card{background:#fff;border-radius:16px;padding:20px;border:1px solid rgba(212,180,142,.18);margin-bottom:14px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(212,180,142,.12)}
.card-title{font-family:'Amiri',serif;font-size:17px;font-weight:700;color:var(--purple)}
table{width:100%;border-collapse:collapse}
th{background:var(--purple);color:#fff;padding:10px 14px;font-size:12px;font-weight:700;text-align:right}
th:first-child{border-radius:0 8px 0 0}th:last-child{border-radius:8px 0 0 0}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(212,180,142,.1)}
tr:hover td{background:rgba(212,180,142,.04)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.b-green{background:rgba(40,167,69,.12);color:#28a745}
.b-yellow{background:rgba(255,193,7,.15);color:#856404}
.b-red{background:rgba(220,53,69,.1);color:#dc3545}
.b-purple{background:rgba(59,27,64,.1);color:var(--purple)}
.action-btns{display:flex;gap:5px;flex-wrap:wrap}
.ab{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;transition:.18s}
.ab:hover{filter:brightness(1.06)}
.ab-green{background:rgba(40,167,69,.1);color:#28a745}
.ab-green:hover{background:#28a745;color:#fff}
.ab-red{background:rgba(220,53,69,.1);color:#dc3545}
.ab-red:hover{background:#dc3545;color:#fff}
.ab-gold{background:rgba(212,180,142,.2);color:var(--gold-d)}
.ab-gold:hover{background:var(--gold);color:var(--purple)}
.ab-purple{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:#fff;border-radius:14px;padding:18px;text-align:center;border:1px solid rgba(212,180,142,.18)}
.stat-num{font-family:'Amiri',serif;font-size:34px;font-weight:900}
.stat-lbl{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid rgba(212,180,142,.4);font-size:13px;font-family:'Zain',sans-serif;background:var(--bg);outline:none;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.perm-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--purple);cursor:pointer}
.perm-item input{width:15px;height:15px;accent-color:var(--purple)}
#spinner{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:44px;height:44px;border:4px solid rgba(59,27,64,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div id="spinner"><div class="spin-ring"></div></div>
<div id="app" style="display:none">
  <div id="nav-ph"></div>
  <main>
    <h1 style="font-family:'Amiri',serif;font-size:22px;color:var(--purple);margin-bottom:16px;font-weight:700">🛡️ لوحة الإدارة</h1>

    <!-- Stats -->
    <div class="stat-grid" id="stats-grid">
      <div class="stat-box"><div class="stat-num" style="color:var(--purple)" id="st-users">—</div><div class="stat-lbl">إجمالي المستخدمين</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#856404" id="st-pending">—</div><div class="stat-lbl">في انتظار الموافقة</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#28a745" id="st-approved">—</div><div class="stat-lbl">مقبولون</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--gold-d)" id="st-admins">—</div><div class="stat-lbl">المشرفون</div></div>
    </div>

    <!-- Tabs -->
    <div class="admin-tab-bar">
      <button class="atab active" onclick="showTab('students')">👥 الطلاب</button>
      <button class="atab" onclick="showTab('admins')">🛡️ المشرفون</button>
      <button class="atab" onclick="showTab('config')">⚙️ الإعدادات</button>
      <button class="atab" onclick="showTab('qa')">💬 الأسئلة</button>
      <button class="atab" onclick="showTab('notifs')">🔔 إشعارات</button>
    </div>

    <div id="tab-content"></div>
  </main>
</div>
<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
const PAGE_ID='admin';
var currentUser=null, allStudents=[], allAdmins=[];

(function(){var c=localStorage.getItem('ti_user');if(c){try{currentUser=JSON.parse(c);}catch(e){}}})();

auth.onAuthStateChanged(async function(user){
  if(!user){localStorage.removeItem('ti_user');location.href='login.html';return;}
  if(!currentUser){
    var a=await db.collection('admins').doc(user.uid).get().catch(function(){return null;});
    if(a&&a.exists){currentUser={uid:user.uid,...a.data(),isAdmin:true};}
    else{location.href='dashboard.html';return;}
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
  }
  if(!currentUser.isAdmin){location.href='dashboard.html';return;}
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav(PAGE_ID,currentUser);
  if(typeof setNavUser==='function')setNavUser(currentUser);
  setTimeout(function(){if(window.lucide)lucide.createIcons();},80);
  loadStats();
  showTab('students');
});

// ══════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════
async function loadStats(){
  var us=await db.collection('users').get().catch(function(){return null;});
  var as=await db.collection('admins').get().catch(function(){return null;});
  if(us){
    var total=us.size;
    var pending=us.docs.filter(function(d){return d.data().status==='pending';}).length;
    var approved=us.docs.filter(function(d){return d.data().status==='approved';}).length;
    document.getElementById('st-users').textContent=total;
    document.getElementById('st-pending').textContent=pending;
    document.getElementById('st-approved').textContent=approved;
    allStudents=us.docs.map(function(d){return{id:d.id,...d.data()};});
  }
  if(as){
    document.getElementById('st-admins').textContent=as.size;
    allAdmins=as.docs.map(function(d){return{id:d.id,...d.data()};});
  }
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
var TABS=['students','admins','config','qa','notifs'];
function showTab(name){
  document.querySelectorAll('.atab').forEach(function(b,i){b.classList.toggle('active',TABS[i]===name);});
  if(name==='students') renderStudents();
  else if(name==='admins') renderAdmins();
  else if(name==='config') renderConfig();
  else if(name==='qa') renderQA();
  else if(name==='notifs') renderNotifs();
}

// ══════════════════════════════════════════════
// STUDENTS
// ══════════════════════════════════════════════
async function renderStudents(){
  document.getElementById('tab-content').innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">جارٍ التحميل...</div>';
  var snap=await db.collection('users').orderBy('createdAt','desc').get().catch(function(){return null;});
  if(!snap){document.getElementById('tab-content').innerHTML='<p style="color:#dc3545;padding:16px">خطأ في التحميل — تحقق من قواعد Firestore</p>';return;}
  allStudents=snap.docs.map(function(d){return{id:d.id,...d.data()};});

  // Filter tabs
  var filterHtml='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'
    +'<button onclick="filterStudents(\'all\')" id="sf-all" class="ab ab-purple" style="font-size:11px">الكل ('+allStudents.length+')</button>'
    +'<button onclick="filterStudents(\'pending\')" id="sf-pending" class="ab" style="background:#fff3cd;color:#856404;font-size:11px">معلّق ('+allStudents.filter(function(s){return s.status==='pending';}).length+')</button>'
    +'<button onclick="filterStudents(\'approved\')" id="sf-approved" class="ab ab-green" style="font-size:11px">مقبول ('+allStudents.filter(function(s){return s.status==='approved';}).length+')</button>'
    +'<button onclick="filterStudents(\'rejected\')" id="sf-rejected" class="ab ab-red" style="font-size:11px">مرفوض ('+allStudents.filter(function(s){return s.status==='rejected';}).length+')</button>'
    +'</div>';

  document.getElementById('tab-content').innerHTML='<div class="card"><div class="card-head"><span class="card-title">الطلاب المسجّلون</span>'
    +'<button onclick="renderStudents()" class="ab ab-gold">↻ تحديث</button></div>'
    +filterHtml
    +'<div id="students-table">'+buildStudentsTable(allStudents)+'</div></div>';
}

function buildStudentsTable(students){
  if(!students.length)return'<p style="text-align:center;padding:30px;color:var(--muted)">لا توجد بيانات</p>';
  var rows=students.map(function(u){
    var badge=u.status==='approved'?'<span class="badge b-green">مقبول</span>':u.status==='rejected'?'<span class="badge b-red">مرفوض</span>':'<span class="badge b-yellow">معلّق</span>';
    var acts='<div class="action-btns">';
    if(u.status!=='approved') acts+='<button onclick="setStatus(\''+u.id+'\',\'approved\')" class="ab ab-green">✓ قبول</button>';
    if(u.status!=='rejected') acts+='<button onclick="setStatus(\''+u.id+'\',\'rejected\')" class="ab ab-red">✕ رفض</button>';
    if(u.status==='rejected') acts+='<button onclick="setStatus(\''+u.id+'\',\'pending\')" class="ab ab-gold">↩ إعادة</button>';
    acts+='<button onclick="viewStudent(\''+u.id+'\')" class="ab ab-gold">👁 تفاصيل</button>';
    acts+='<button onclick="delStudent(\''+u.id+'\',\''+escHtml(u.name||'')+'\')  " class="ab ab-red">🗑</button>';
    acts+='</div>';
    return'<tr><td style="font-weight:700">'+(u.name||'—')+'</td><td style="direction:ltr;font-size:12px">'+(u.email||'—')+'</td><td>'+badge+'</td><td style="font-size:11px;color:var(--muted)">'+(u.createdAt?new Date(u.createdAt).toLocaleDateString('ar'):'—')+'</td><td>'+acts+'</td></tr>';
  }).join('');
  return'<div style="overflow-x:auto"><table><thead><tr><th>الاسم</th><th>البريد</th><th>الحالة</th><th>التاريخ</th><th>الإجراءات</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function filterStudents(status){
  var filtered=status==='all'?allStudents:allStudents.filter(function(s){return s.status===status;});
  document.getElementById('students-table').innerHTML=buildStudentsTable(filtered);
}

async function setStatus(uid,status){
  try{
    await db.collection('users').doc(uid).update({status:status});
    var s=allStudents.find(function(x){return x.id===uid;});
    if(s)s.status=status;
    renderStudents();
    showToast(status==='approved'?'✅ تم قبول الطالب':status==='rejected'?'❌ تم رفض الطالب':'تم التحديث', status==='approved'?'success':status==='rejected'?'error':'info');
    // Send notification
    if(status==='approved'||status==='rejected'){
      var msg=status==='approved'?'🎉 تم قبول طلبك في معهد التأصيل العلمي، يمكنك الآن تسجيل الدخول':'❌ نأسف، تم رفض طلب تسجيلك. تواصل مع المسؤول لمزيد من المعلومات';
      db.collection('notifications').add({userId:uid,msg:msg,type:status==='approved'?'success':'error',read:false,createdAt:new Date().toISOString()}).catch(function(){});
    }
  }catch(e){showToast('خطأ: '+e.message,'error');}
}

function viewStudent(uid){
  var u=allStudents.find(function(x){return x.id===uid;});if(!u)return;
  var done=(u.completedLessons||[]).length;
  openModal('<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">الاسم</div><div style="font-size:14px;font-weight:700">'+escHtml(u.name||'—')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">البريد</div><div style="font-size:13px;direction:ltr">'+(u.email||'—')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">الهاتف</div><div style="font-size:13px">'+(u.phone||'—')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">تيليجرام</div><div style="font-size:13px">'+(u.telegram||'—')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">المستوى</div><div style="font-size:13px">'+(u.level||'—')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">الدروس المكتملة</div><div style="font-size:13px;font-weight:700;color:var(--purple)">'+done+' درس</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">الحالة</div><div>'+(u.status==='approved'?'<span class="badge b-green">مقبول</span>':u.status==='rejected'?'<span class="badge b-red">مرفوض</span>':'<span class="badge b-yellow">معلّق</span>')+'</div></div>'
    +'<div><div style="font-size:11px;font-weight:800;color:var(--muted)">تاريخ التسجيل</div><div style="font-size:12px;color:var(--muted)">'+(u.createdAt?new Date(u.createdAt).toLocaleDateString('ar'):'—')+'</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">'
    +(u.status!=='approved'?'<button onclick="setStatus(\''+u.id+'\',\'approved\');closeModal()" class="btn btn-primary" style="flex:1">✓ قبول</button>':'')
    +(u.status!=='rejected'?'<button onclick="setStatus(\''+u.id+'\',\'rejected\');closeModal()" class="btn btn-danger" style="flex:1">✕ رفض</button>':'')
    +'<button onclick="closeModal()" class="btn btn-ghost">إغلاق</button></div>'
    ,'معلومات الطالب');
}

async function delStudent(uid,name){
  if(!confirm('حذف حساب "'+name+'" نهائياً؟ لا يمكن التراجع.'))return;
  try{await db.collection('users').doc(uid).delete();showToast('تم حذف الحساب','success');renderStudents();}
  catch(e){showToast('خطأ: '+e.message,'error');}
}

// ══════════════════════════════════════════════
// ADMINS
// ══════════════════════════════════════════════
async function renderAdmins(){
  var snap=await db.collection('admins').get().catch(function(){return null;});
  allAdmins=snap?snap.docs.map(function(d){return{id:d.id,...d.data();};}):[];

  var rows=allAdmins.map(function(a){
    var roleBadge=a.role==='super'?'<span class="badge b-purple">المشرف العام</span>':'<span class="badge b-gold" style="background:rgba(212,180,142,.2);color:var(--gold-d)">مشرف</span>';
    var perms=Object.entries(a.permissions||{}).filter(function(e){return e[1];}).map(function(e){return e[0];}).join('، ')||'لا يوجد';
    var acts='<div class="action-btns">';
    if(a.role!=='super') acts+='<button onclick="editAdmin(\''+a.id+'\')" class="ab ab-gold">✎ تعديل</button>';
    if(a.role!=='super') acts+='<button onclick="delAdmin(\''+a.id+'\',\''+escHtml(a.fullName||'')+'\')  " class="ab ab-red">🗑 حذف</button>';
    acts+='</div>';
    return'<tr><td style="font-weight:700">'+(a.fullName||'—')+'</td><td style="font-size:12px;direction:ltr">'+(a.email||a.id)+'</td><td>'+roleBadge+'</td><td style="font-size:12px;color:var(--muted)">'+perms+'</td><td>'+acts+'</td></tr>';
  }).join('');

  document.getElementById('tab-content').innerHTML='<div class="card"><div class="card-head"><span class="card-title">المشرفون</span>'
    +'<button onclick="openAddAdmin()" class="ab ab-purple">+ إضافة مشرف</button></div>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>الصلاحيات</th><th>الإجراءات</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div></div>';
}

var PERMS=[
  {key:'manageStudents',label:'إدارة الطلاب'},
  {key:'manageCourses', label:'إدارة المقررات'},
  {key:'manageTests',   label:'إدارة الاختبارات'},
  {key:'manageQA',      label:'الإجابة على الأسئلة'},
  {key:'manageConfig',  label:'إعدادات الموقع'},
  {key:'manageAdmins',  label:'إدارة المشرفين'},
  {key:'manageSchedule',label:'إدارة الجدول'},
  {key:'sendNotifs',    label:'إرسال الإشعارات'},
];

function permChecks(existing){
  return'<div class="perm-grid">'+PERMS.map(function(p){
    return'<label class="perm-item"><input type="checkbox" id="perm-'+p.key+'" '+(existing&&existing[p.key]?'checked':'')+'/> '+p.label+'</label>';
  }).join('')+'</div>';
}
function getPerms(){
  var obj={};PERMS.forEach(function(p){obj[p.key]=document.getElementById('perm-'+p.key)?.checked||false;});return obj;
}

function openAddAdmin(){
  openModal('<div class="field"><label>الاسم الكامل</label><input type="text" id="aa-name" placeholder="اسم المشرف"/></div>'
    +'<div class="field"><label>البريد الإلكتروني</label><input type="email" id="aa-email" placeholder="admin@example.com"/></div>'
    +'<div class="field"><label>كلمة المرور</label><input type="password" id="aa-pass" placeholder="كلمة مرور قوية"/></div>'
    +'<div class="field"><label>الصلاحيات</label>'+permChecks(null)+'</div>'
    +'<div style="display:flex;gap:8px"><button onclick="createAdmin()" class="btn btn-primary" style="flex:1">إنشاء الحساب</button><button onclick="closeModal()" class="btn btn-ghost">إلغاء</button></div>'
    ,'إضافة مشرف جديد');
}

async function createAdmin(){
  var name=document.getElementById('aa-name').value.trim();
  var email=document.getElementById('aa-email').value.trim();
  var pass=document.getElementById('aa-pass').value;
  if(!name||!email||!pass){showToast('يرجى ملء جميع الحقول','warn');return;}
  if(pass.length<6){showToast('كلمة المرور 6 أحرف على الأقل','warn');return;}
  var perms=getPerms();

  try{
    // Create Firebase Auth account
    var cred=await auth.createUserWithEmailAndPassword(email,pass);
    var uid=cred.user.uid;
    // Save to admins collection
    await db.collection('admins').doc(uid).set({
      uid:uid,fullName:name,email:email,role:'supervisor',
      permissions:perms,createdAt:new Date().toISOString(),createdBy:currentUser.uid
    });
    // Sign back in as original admin
    closeModal();
    showToast('✅ تم إنشاء حساب المشرف: '+name,'success');
    renderAdmins();loadStats();
  }catch(e){
    console.log('createAdmin error:',e.code,e.message);
    var msg={'auth/email-already-in-use':'البريد مستخدم مسبقاً','auth/weak-password':'كلمة المرور ضعيفة','auth/invalid-email':'صيغة البريد غير صحيحة'}[e.code]||('خطأ: '+e.message);
    showToast(msg,'error');
  }
}

function editAdmin(uid){
  var a=allAdmins.find(function(x){return x.id===uid;});if(!a)return;
  openModal('<div class="field"><label>الاسم الكامل</label><input type="text" id="ea-name" value="'+escHtml(a.fullName||'')+'"/></div>'
    +'<div class="field"><label>الصلاحيات</label>'+permChecks(a.permissions||{})+'</div>'
    +'<div style="display:flex;gap:8px"><button onclick="saveAdminEdit(\''+uid+'\')" class="btn btn-primary" style="flex:1">حفظ</button><button onclick="closeModal()" class="btn btn-ghost">إلغاء</button></div>'
    ,'تعديل صلاحيات المشرف');
}
async function saveAdminEdit(uid){
  var name=document.getElementById('ea-name').value.trim();
  var perms=getPerms();
  try{
    await db.collection('admins').doc(uid).update({fullName:name,permissions:perms});
    closeModal();showToast('✅ تم التعديل','success');renderAdmins();
  }catch(e){showToast('خطأ: '+e.message,'error');}
}
async function delAdmin(uid,name){
  if(!confirm('حذف المشرف "'+name+'"؟ سيُحذف من قاعدة البيانات فقط.'))return;
  try{await db.collection('admins').doc(uid).delete();showToast('تم الحذف','success');renderAdmins();loadStats();}
  catch(e){showToast('خطأ: '+e.message,'error');}
}

// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
async function renderConfig(){
  var snap=await db.collection('config').doc('main').get().catch(function(){return null;});
  var cfg=snap&&snap.exists?snap.data():{};
  document.getElementById('tab-content').innerHTML='<div class="card"><div class="card-head"><span class="card-title">إعدادات الموقع</span></div>'
    +'<div class="field"><label>رابط المقطع التعريفي (يوتيوب)</label><input type="url" id="cfg-video" value="'+(cfg.introVideo||'')+'" placeholder="https://youtube.com/watch?v=..."/></div>'
    +'<div class="field"><label>نص "عن المعهد"</label><textarea id="cfg-about" rows="3">'+(cfg.aboutText||'')+'</textarea></div>'
    +'<div class="field"><label>اسم الشيخ</label><input type="text" id="cfg-sheikh" value="'+(cfg.sheikhName||'')+'"/></div>'
    +'<div class="field"><label>دور الشيخ</label><input type="text" id="cfg-srole" value="'+(cfg.sheikhRole||'المشرف العلمي')+'"/></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    +'<div class="field"><label>تيليجرام</label><input type="text" id="cfg-tg" value="'+(cfg.contactTelegram||'')+'" placeholder="@TaaseelInstitute"/></div>'
    +'<div class="field"><label>البريد</label><input type="email" id="cfg-email" value="'+(cfg.contactEmail||'')+'"/></div>'
    +'<div class="field"><label>الهاتف</label><input type="text" id="cfg-phone" value="'+(cfg.contactPhone||'')+'"/></div>'
    +'<div class="field"><label>قناة خاصة</label><input type="text" id="cfg-ch" value="'+(cfg.privateChannel||'')+'"/></div>'
    +'</div>'
    +'<button onclick="saveConfig()" class="ab ab-purple" style="padding:10px 24px;margin-top:6px;font-size:13px">💾 حفظ الإعدادات</button>'
    +'<div id="cfg-msg" style="display:none;margin-top:10px;font-size:13px;padding:10px;border-radius:8px;background:#d4edda;color:#155724"></div>'
    +'</div>';
}
async function saveConfig(){
  var v=function(id){return(document.getElementById(id)&&document.getElementById(id).value.trim())||'';};
  try{
    await db.collection('config').doc('main').set({introVideo:v('cfg-video'),aboutText:v('cfg-about'),sheikhName:v('cfg-sheikh'),sheikhRole:v('cfg-srole'),contactTelegram:v('cfg-tg'),contactEmail:v('cfg-email'),contactPhone:v('cfg-phone'),privateChannel:v('cfg-ch')},{merge:true});
    var m=document.getElementById('cfg-msg');m.textContent='✅ تم الحفظ بنجاح';m.style.display='block';
    setTimeout(function(){m.style.display='none';},3000);
  }catch(e){showToast('خطأ: '+e.message,'error');}
}

// ══════════════════════════════════════════════
// QA
// ══════════════════════════════════════════════
async function renderQA(){
  var snap=await db.collection('questions').orderBy('createdAt','desc').get().catch(function(){return null;});
  var items=snap?snap.docs.map(function(d){return{id:d.id,...d.data();};}):[];
  var cards=items.map(function(q){
    return'<div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(212,180,142,.18)">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'
      +'<div style="font-weight:700;font-size:14px;color:var(--purple)">'+(q.question||'')+'</div>'
      +'<button onclick="delQ(\''+q.id+'\')" class="ab ab-red" style="font-size:11px">✕</button>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-bottom:8px">'+(q.name||'مجهول')+' — '+(q.createdAt?new Date(q.createdAt).toLocaleDateString('ar'):'')+'</div>'
      +(q.answer?'<div style="background:rgba(212,180,142,.1);border-right:3px solid var(--gold);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:8px">'+escHtml(q.answer)+'</div>':'')
      +'<div style="display:flex;gap:8px">'
      +'<textarea id="ans-'+q.id+'" rows="2" placeholder="اكتب الإجابة..." style="flex:1;padding:8px;border-radius:8px;border:1.5px solid rgba(212,180,142,.35);font-family:Zain,sans-serif;font-size:13px;resize:none">'+(q.answer||'')+'</textarea>'
      +'<button onclick="saveAns(\''+q.id+'\')" class="ab ab-purple" style="align-self:flex-end">إجابة</button>'
      +'</div></div>';
  }).join('');
  document.getElementById('tab-content').innerHTML='<div class="card"><div class="card-head"><span class="card-title">الأسئلة والاستفسارات ('+items.length+')</span>'
    +'<button onclick="renderQA()" class="ab ab-gold">↻</button></div>'
    +(cards||'<p style="text-align:center;padding:30px;color:var(--muted)">لا توجد أسئلة</p>')+'</div>';
}
async function saveAns(qid){
  var ans=document.getElementById('ans-'+qid)&&document.getElementById('ans-'+qid).value.trim();
  if(!ans){showToast('يرجى كتابة الإجابة','warn');return;}
  try{await db.collection('questions').doc(qid).update({answer:ans,answeredAt:new Date().toISOString()});renderQA();}
  catch(e){showToast('خطأ: '+e.message,'error');}
}
async function delQ(qid){
  if(!confirm('حذف هذا السؤال؟'))return;
  try{await db.collection('questions').doc(qid).delete();renderQA();}catch(e){}
}

// ══════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════
function renderNotifs(){
  document.getElementById('tab-content').innerHTML='<div class="card"><div class="card-head"><span class="card-title">إرسال إشعار لجميع الطلاب</span></div>'
    +'<div class="field"><label>نص الإشعار</label><textarea id="nf-msg" rows="3" placeholder="اكتب نص الإشعار..."></textarea></div>'
    +'<div class="field"><label>النوع</label><select id="nf-type"><option value="info">عام 🔔</option><option value="success">إيجابي ✅</option><option value="warn">تنبيه ⚠️</option></select></div>'
    +'<button onclick="sendNotif()" class="ab ab-purple" style="padding:10px 24px;font-size:13px">📨 إرسال للجميع</button>'
    +'<div id="nf-result" style="display:none;margin-top:10px;font-size:13px;padding:10px;border-radius:8px;background:#d4edda;color:#155724"></div>'
    +'</div>';
}
async function sendNotif(){
  var msg=document.getElementById('nf-msg').value.trim();
  var type=document.getElementById('nf-type').value;
  if(!msg){showToast('يرجى كتابة الإشعار','warn');return;}
  try{
    var snap=await db.collection('users').where('status','==','approved').get();
    var batch=db.batch();
    snap.docs.forEach(function(d){
      var ref=db.collection('notifications').doc();
      batch.set(ref,{userId:d.id,msg:msg,type:type,read:false,createdAt:new Date().toISOString()});
    });
    await batch.commit();
    document.getElementById('nf-msg').value='';
    var r=document.getElementById('nf-result');
    r.textContent='✅ تم إرسال الإشعار لـ '+snap.size+' طالب';r.style.display='block';
    setTimeout(function(){r.style.display='none';},5000);
  }catch(e){showToast('خطأ: '+e.message,'error');}
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function logout(){auth.signOut().then(function(){localStorage.removeItem('ti_user');location.href='index.html';});}
function toast(m,t,d){showToast(m,t,d);}
</script>
