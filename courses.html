<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>المقررات — معهد التأصيل العلمي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/></noscript>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk",authDomain:"tasil-3lmi.firebaseapp.com",projectId:"tasil-3lmi",storageBucket:"tasil-3lmi.firebasestorage.app",messagingSenderId:"596405733121",appId:"1:596405733121:web:38ebadcc9eef8d8bb77d00"});
const auth=firebase.auth(),db=firebase.firestore();
</script>
<link rel="stylesheet" href="styles.css"/>
<script src="shared.js"></script>
<script src="nav.js"></script>
<style>
main{max-width:1100px;margin:0 auto;padding:22px 16px}
.level-block{margin-bottom:18px;border-radius:16px;overflow:hidden;border:1px solid rgba(212,180,142,.2);box-shadow:0 4px 14px rgba(59,27,64,.06)}
.level-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none}
.level-title{font-family:'Amiri',serif;font-size:17px;font-weight:700;color:#fff;flex:1}
.level-arr{color:rgba(255,255,255,.75);font-size:13px;transition:transform .25s}
.level-body{background:#fff}
.stage-block{padding:13px 18px 10px;border-top:1px solid rgba(212,180,142,.1)}
.stage-label{font-size:12px;font-weight:800;color:var(--purple);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid rgba(212,180,142,.1)}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;margin-bottom:4px}
.c-card{background:var(--bg);border-radius:12px;padding:13px;border:1.5px solid rgba(212,180,142,.18);display:block;text-decoration:none;transition:transform .2s,box-shadow .2s,border-color .2s}
.c-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(59,27,64,.1);border-color:rgba(59,27,64,.2)}
.c-bar{height:3px;border-radius:2px;margin-bottom:9px}
.c-title{font-size:13px;font-weight:800;color:var(--purple);line-height:1.4;margin-bottom:5px}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.c-lessons{font-size:11px;color:var(--muted)}
.c-pct{font-size:11px;font-weight:700}
.c-prog{height:3px;border-radius:2px;background:rgba(212,180,142,.2);margin-top:5px;overflow:hidden}
.c-prog-fill{height:100%;border-radius:2px;transition:width .5s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(max-width:600px){.course-grid{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.course-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="spinner" class="spinner-overlay"><div class="spin-ring"></div></div>
<div id="app" style="display:none">
  <div id="nav-ph"></div>
  <main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h1 style="font-family:'Amiri',serif;font-size:21px;color:var(--purple);font-weight:700">📚 المقررات الدراسية</h1>
      <input id="search" type="search" placeholder="🔍 ابحث..." oninput="filterPlan(this.value)"
        style="padding:8px 12px;border-radius:10px;border:1.5px solid rgba(212,180,142,.3);font-family:'Zain',sans-serif;font-size:13px;background:var(--bg);outline:none;width:180px"/>
    </div>
    <div id="plan-wrap"></div>
  </main>
</div>

<script>
const PAGE_ID='courses';
let currentUser=null, completedLessons=[], progMap={};

// ── Instant from cache ──
(function(){
  const c=localStorage.getItem('ti_user');
  if(c){try{currentUser=JSON.parse(c);completedLessons=currentUser.completedLessons||[];showApp();}catch(e){}}
})();

auth.onAuthStateChanged(async function(user){
  if(!user){localStorage.removeItem('ti_user');location.href='login.html';return;}
  if(!currentUser){
    const a=await db.collection('admins').doc(user.uid).get().catch(function(){return null;});
    if(a&&a.exists){currentUser={uid:user.uid,...a.data(),isAdmin:true};}
    else{
      const u=await db.collection('users').doc(user.uid).get().catch(function(){return null;});
      if(!u||!u.exists){await auth.signOut();location.href='login.html';return;}
      currentUser={uid:user.uid,...u.data(),isAdmin:false};
    }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
    completedLessons=currentUser.completedLessons||[];
    showApp();
  }
});

function showApp(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav(PAGE_ID,currentUser);
  if(typeof setNavUser==='function')setNavUser(currentUser);
  setTimeout(function(){if(window.lucide)lucide.createIcons();},80);
  buildProgMap();
  renderPlan(null);
  // refresh progress from Firestore in bg
  db.collection('courses').get().then(function(snap){
    if(!snap)return;
    snap.docs.forEach(function(d){
      var data=d.data(), cid=data.id;
      var total=(data.lessons||[]).length||20;
      var done=completedLessons.filter(function(l){return l.startsWith(cid+'-');}).length;
      progMap[cid]={done:done,total:total};
    });
    renderPlan(document.getElementById('search').value.trim()||null);
  }).catch(function(){});
}

function buildProgMap(){
  completedLessons.forEach(function(lid){
    var parts=lid.split('-l');
    if(parts.length<2)return;
    var cid=parts[0];
    if(!progMap[cid])progMap[cid]={done:0,total:20};
    progMap[cid].done++;
  });
}

// ── Plan data ──
var PLAN=[
  {id:'tamhidi',title:'المرحلة التمهيدية',color:'#b8965e',icon:'🌱',stages:[
    {title:'كتب المرحلة التمهيدية',courses:[
      {id:'t1',title:'كتاب "المدخل إلى طلب العلم"',color:'#b8965e'},
      {id:'t2',title:'كتاب "تذكرة السامع والمتكلم"',color:'#a07840'},
      {id:'t3',title:'الجرد القرآني التطبيقي',color:'#8B6914'}
    ]}
  ]},
  {id:'mustawa1',title:'مقررات المستوى الأول',color:'#3B1B40',icon:'📚',stages:[
    {title:'المرحلة الأولى — العقيدة والتوحيد',courses:[
      {id:'m1',title:'القواعد الأربع',color:'#3B1B40'},
      {id:'m2',title:'نواقض الإسلام',color:'#4a2250'},
      {id:'m3',title:'الأصول الثلاثة وأدلتها',color:'#5a2d63'},
      {id:'m4',title:'كشف الشبهات',color:'#3B1B40'}
    ]},
    {title:'المرحلة الثانية — علوم الآلة والسنة',courses:[
      {id:'m5',title:'متن الآجرومية في النحو',color:'#1a5276'},
      {id:'m6',title:'التذكرة في علوم الحديث لابن الملقن',color:'#1b4f72'},
      {id:'m7',title:'الأرجوزة الميئية في السيرة النبوية',color:'#154360'},
      {id:'m8',title:'الرسالة اللطيفة في أصول الفقه للسعدي',color:'#0e3251'},
      {id:'m9',title:'الأربعون النووية مع زيادات ابن رجب',color:'#1a5276'}
    ]},
    {title:'المرحلة الثالثة — الفقه المالكي وأصوله وقواعده',courses:[
      {id:'m10',title:'مقدمات التفقه',color:'#117a65'},
      {id:'m11',title:'متن الأخضري في العبادات',color:'#0e6655'},
      {id:'m12',title:'متن العشماوية (قراءة سريعة)',color:'#117a65'},
      {id:'m13',title:'نظم ابن أبي كف في أدلة المذهب',color:'#0d5e4a'},
      {id:'m14',title:'نظم المرشد المعين لابن عاشر',color:'#117a65'},
      {id:'m15',title:'منظومة القواعد الفقهية',color:'#0a4d3a'}
    ]},
    {title:'المرحلة الرابعة — أصول التفسير والعقيدة',courses:[
      {id:'m16',title:'مقدمة في أصول التفسير لابن تيمية',color:'#6e2f0a'},
      {id:'m17',title:'كتاب التوحيد للشيخ محمد بن عبد الوهاب',color:'#7d3410'},
      {id:'m18',title:'القواعد والضوابط السلفية في الأسماء والصفات',color:'#6e2f0a'},
      {id:'m19',title:'العقيدة الواسطية لابن تيمية',color:'#8b3c11'}
    ]},
    {title:'المرحلة الخامسة — المقاصد والآداب والسياسة الشرعية',courses:[
      {id:'m20',title:'منظومة تبصرة القاصد في علم المقاصد',color:'#512e5f'},
      {id:'m21',title:'كتاب الجامع من "القوانين الفقهية" في الآداب',color:'#5b3068'},
      {id:'m22',title:'منظومة السبل المرضية في السياسة الشرعية',color:'#6c3483'}
    ]},
    {title:'المرحلة السادسة — فقه الدعوة والمناظرة والردود والحصانة',courses:[
      {id:'m23',title:'الأمر بالمعروف والنهي عن المنكر لابن تيمية',color:'#922b21'},
      {id:'m24',title:'آداب البحث والمناظرة لطاشكبري زاده',color:'#a93226'},
      {id:'m25',title:'متن الرد على المخالف',color:'#922b21'},
      {id:'m26',title:'متن الحصانة الفكرية',color:'#b03a2e'}
    ]}
  ]}
];

function renderPlan(filter){
  var out='';
  PLAN.forEach(function(level,li){
    var allC=level.stages.reduce(function(a,s){return a.concat(s.courses);},[]);
    var match=!filter||allC.some(function(c){return c.title.indexOf(filter)>=0;});
    if(!match)return;
    out+='<div class="level-block" style="animation:fadeUp .3s ease '+(li*0.07)+'s both">';
    out+='<div class="level-head" style="background:'+level.color+'" onclick="toggleLv(\'lv-'+level.id+'\')">';
    out+='<span style="font-size:18px">'+level.icon+'</span>';
    out+='<span class="level-title">'+level.title+'</span>';
    out+='<span class="level-arr" id="arr-'+level.id+'">▲</span>';
    out+='</div>';
    out+='<div class="level-body" id="lv-'+level.id+'">';
    level.stages.forEach(function(stage){
      var cs=filter?stage.courses.filter(function(c){return c.title.indexOf(filter)>=0;}):stage.courses;
      if(!cs.length)return;
      out+='<div class="stage-block">';
      out+='<div class="stage-label">'+stage.title+'</div>';
      out+='<div class="course-grid">';
      cs.forEach(function(c){
        var p=progMap[c.id]||{done:0,total:20};
        var pct=p.total?Math.round(p.done/p.total*100):0;
        out+='<a href="course.html?id='+c.id+'" class="c-card">';
        out+='<div class="c-bar" style="background:'+c.color+'"></div>';
        out+='<div class="c-title">'+c.title+'</div>';
        out+='<div class="c-foot">';
        out+='<span class="c-lessons">20 درساً</span>';
        if(pct>0)out+='<span class="c-pct" style="color:'+c.color+'">'+pct+'%</span>';
        out+='</div>';
        if(pct>0)out+='<div class="c-prog"><div class="c-prog-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div>';
        out+='</a>';
      });
      out+='</div></div>';
    });
    out+='</div></div>';
  });
  document.getElementById('plan-wrap').innerHTML=out||'<div style="text-align:center;padding:50px;color:var(--muted)">لا نتائج</div>';
}

function toggleLv(id){
  var el=document.getElementById(id);
  var arr=document.getElementById('arr-'+id.replace('lv-',''));
  var open=el.style.display!=='none';
  el.style.display=open?'none':'';
  if(arr)arr.style.transform=open?'rotate(180deg)':'rotate(0)';
}

function filterPlan(v){renderPlan(v.trim()||null);}

function logout(){auth.signOut().then(function(){localStorage.removeItem('ti_user');location.href='index.html';});}
</script>
</body>
</html>
