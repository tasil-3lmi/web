<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المقرر — معهد التأصيل العلمي</title>
  <link rel="stylesheet" href="styles.css">

  <!-- ============================================================
       window.onerror — يُظهر أي خطأ برمجي في alert واضح
       (نفس نمط dashboard.html)
       ============================================================ -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var msg = '🚨 خطأ برمجي:\n\n'
        + 'الرسالة: ' + message + '\n'
        + 'الملف: '   + source  + '\n'
        + 'السطر: '   + lineno  + ':' + colno + '\n\n'
        + (error && error.stack ? error.stack : '');
      alert(msg);
      console.error('window.onerror:', message, source, lineno, colno, error);
      return false;
    };
    window.onunhandledrejection = function(event) {
      var msg = '🚨 Promise مرفوض:\n\n' + (event.reason && event.reason.stack ? event.reason.stack : event.reason);
      alert(msg);
      console.error('unhandledrejection:', event.reason);
    };
    console.log('🟢 [1] onerror handler set — course.html');
  </script>

  <style>
    body { background: #f7f5fa; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

    /* ── LOADING (نفس dashboard) ── */
    .loading-screen {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px; transition: opacity 0.4s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TEMP HEADER (نفس dashboard) ── */
    .temp-header {
      background: #3b1b40; color: white; padding: 0 32px;
      height: 70px; display: flex; align-items: center; justify-content: space-between;
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    }
    .temp-header .site-title { font-size: 1.05rem; font-weight: bold; }
    .temp-header .header-nav { display: flex; align-items: center; gap: 20px; }
    .temp-header .header-nav a {
      color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.88rem;
      transition: color .2s;
    }
    .temp-header .header-nav a:hover { color: #d4b48e; }
    .temp-header .logout-link {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 8px 18px; border-radius: 100px; cursor: pointer;
      font-size: 0.82rem; font-family: inherit;
    }
    .temp-header .logout-link:hover { background: rgba(255,255,255,0.25); }
    .hamburger-btn {
      display: none; background: none; border: none; color: white;
      font-size: 1.4rem; cursor: pointer; padding: 4px 8px;
    }

    /* ── COURSE TOP BANNER ── */
    .course-top-banner {
      background: linear-gradient(135deg, #3b1b40, #6b3070);
      padding: 100px 0 40px;
    }
    .course-top-banner h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      color: white; margin-bottom: 10px; margin-top: 0;
    }
    .course-top-banner p { color: rgba(255,255,255,0.7); font-size: 0.95rem; max-width: 600px; margin: 0; }
    .course-top-meta { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .course-top-meta span {
      font-size: 0.82rem; color: rgba(255,255,255,0.65);
      display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .breadcrumb a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.82rem; }
    .breadcrumb a:hover { color: #d4b48e; }
    .breadcrumb span { color: rgba(255,255,255,0.3); font-size: 0.82rem; }

    /* ── COURSE LAYOUT ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .course-layout {
      display: grid; grid-template-columns: 280px 1fr;
      gap: 0; max-width: 1200px; margin: 0 auto;
      min-height: calc(100vh - 280px);
    }

    /* ── SIDEBAR ── */
    .lessons-sidebar {
      background: #fff; border-left: 1px solid #eee;
      padding: 24px 0; position: sticky; top: 70px;
      height: calc(100vh - 70px); overflow-y: auto;
    }
    .sidebar-course-title {
      font-size: 0.9rem; font-weight: bold; color: #3b1b40;
      padding: 0 20px 16px; border-bottom: 1px solid #eee; margin-bottom: 8px;
    }
    .lesson-link {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; text-decoration: none;
      color: #555; font-size: 0.88rem; cursor: pointer;
      transition: all .2s; border-right: 3px solid transparent;
    }
    .lesson-link:hover { background: rgba(59,27,64,0.05); color: #3b1b40; }
    .lesson-link.active {
      background: rgba(59,27,64,0.08); color: #3b1b40;
      font-weight: bold; border-right-color: #3b1b40;
    }
    .lesson-link.done { color: #1a7a4a; }
    .lesson-link.done .l-num { background: #1a7a4a; color: white; }
    .lesson-link.locked-lesson { opacity: 0.5; cursor: not-allowed; }
    .l-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(59,27,64,0.1); color: #3b1b40;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: bold; flex-shrink: 0;
    }

    /* ── LESSON CONTENT ── */
    .lesson-content {
      padding: 40px; background: #f7f5fa;
      min-height: calc(100vh - 280px);
    }
    .no-lesson {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 300px; color: #888; gap: 12px;
    }
    .lesson-video-wrap { margin-bottom: 28px; }
    .lesson-video-inner {
      position: relative; padding-bottom: 56.25%;
      height: 0; overflow: hidden; border-radius: 12px;
      background: #000; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .lesson-video-inner iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }
    .lesson-video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; background: rgba(59,27,64,0.06);
      border-radius: 12px; color: #888; gap: 12px;
    }
    .lesson-attachments { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .attachment-card {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; background: #fff; border: 1px solid #eee;
      border-radius: 12px; text-decoration: none; color: inherit;
      box-shadow: 0 2px 8px rgba(59,27,64,0.06); flex: 1; min-width: 200px;
      transition: all .2s;
    }
    .attachment-card:hover { box-shadow: 0 4px 16px rgba(59,27,64,0.12); transform: translateY(-2px); }
    .att-ico { font-size: 2rem; flex-shrink: 0; }
    .attachment-card h4 { margin: 0 0 4px; font-size: 0.9rem; color: #3b1b40; }
    .attachment-card p { margin: 0; font-size: 0.78rem; color: #888; }

    /* ── EXERCISES ── */
    .exercise-section {
      background: #fff; border: 1px solid #eee; border-radius: 12px;
      padding: 28px; margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(59,27,64,0.06);
    }
    .exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .exercise-header h3 { margin: 0; font-size: 1rem; color: #3b1b40; }
    .badge { padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: bold; }
    .badge-purple { background: rgba(59,27,64,0.1); color: #3b1b40; }
    .question-block { margin-bottom: 28px; }
    .q-num-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      background: rgba(59,27,64,0.08); color: #3b1b40;
      font-size: 0.75rem; font-weight: bold; margin-bottom: 10px;
    }
    .q-text { font-size: 0.92rem; color: #333; margin-bottom: 14px; line-height: 1.7; font-weight: bold; }
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border: 1.5px solid #eee; border-radius: 8px;
      cursor: pointer; transition: all .2s; font-size: 0.88rem; color: #333;
    }
    .option-item:hover { border-color: #3b1b40; background: rgba(59,27,64,0.04); }
    .option-item.selected { border-color: #3b1b40; background: rgba(59,27,64,0.06); }
    .option-item.correct { border-color: #1a7a4a; background: rgba(26,122,74,0.08); color: #1a7a4a; }
    .option-item.wrong { border-color: #b92d3a; background: rgba(185,45,58,0.06); color: #b92d3a; }
    .option-item input { display: none; }
    .option-letter {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(59,27,64,0.08); color: #3b1b40;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: bold; flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 12px 28px; border-radius: 100px; border: none;
      font-family: inherit; font-size: 0.9rem; font-weight: bold;
      cursor: pointer; transition: all .2s; display: inline-flex;
      align-items: center; gap: 8px;
    }
    .btn-primary { background: #3b1b40; color: white; }
    .btn-primary:hover { background: #2a1230; transform: translateY(-1px); }
    .btn-success { background: #1a7a4a; color: white; }
    .btn-success:hover { background: #145e38; }
    .btn-sm { padding: 8px 20px; font-size: 0.82rem; }

    /* ── EXAM LINK BANNER ── */
    .exam-link-banner {
      background: linear-gradient(90deg, rgba(212,180,142,0.15), rgba(212,180,142,0.05));
      border: 1px solid rgba(212,180,142,0.3);
      border-radius: 8px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .exam-link-banner p { margin: 0; font-size: 0.88rem; color: #3b1b40; font-weight: bold; }

    /* ── MARK DONE CARD ── */
    .mark-done-card {
      margin-top: 24px; padding: 20px; background: #fff;
      border-radius: 12px; border: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .mark-done-card span { font-size: 0.88rem; color: #888; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #3b1b40; color: white; padding: 14px 28px; border-radius: 100px;
      font-size: 0.88rem; opacity: 0; transition: all .3s; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #1a7a4a; }
    .toast.error   { background: #b92d3a; }

    /* ── TEMP FOOTER ── */
    .temp-footer {
      background: #3b1b40; color: rgba(255,255,255,0.6);
      text-align: center; padding: 24px; font-size: 0.82rem;
    }

    /* ── FADE IN ── */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .fade-in-up { animation: fadeInUp .3s ease; }

    /* ── MOBILE ── */
    @media (max-width: 860px) {
      .course-layout { grid-template-columns: 1fr; }
      .lessons-sidebar {
        position: fixed; top: 70px; right: -300px; width: 280px;
        height: calc(100vh - 70px); z-index: 900;
        transition: right .28s; box-shadow: -4px 0 24px rgba(59,27,64,0.18);
      }
      .lessons-sidebar.open { right: 0; }
      .sidebar-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(59,27,64,0.35); z-index: 850;
      }
      .sidebar-overlay.show { display: block; }
      .mobile-toggle {
        display: flex; align-items: center; justify-content: center;
        position: fixed; bottom: 24px; right: 20px;
        width: 52px; height: 52px; border-radius: 50%;
        background: #3b1b40; color: white; border: none;
        box-shadow: 0 4px 20px rgba(59,27,64,0.4);
        cursor: pointer; font-size: 1.3rem; z-index: 800;
      }
      .lesson-content { padding: 20px 16px; }
      .hamburger-btn { display: block; }
      .temp-header .header-nav { display: none; }
    }
    @media (min-width: 861px) {
      .mobile-toggle { display: none; }
      .sidebar-overlay { display: none !important; }
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div style="width:40px;height:40px;border:3px solid rgba(59,27,64,0.15);border-top-color:#3b1b40;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p style="color:#888;font-size:0.9rem;margin:0;">جارٍ التحميل...</p>
  </div>

  <!-- HEADER مُضمَّج مباشرة (نفس dashboard) -->
  <div id="headerPlaceholder">
    <header class="temp-header" id="fallbackHeader">
      <a href="dashboard.html" class="site-title" style="text-decoration:none;color:white;">🕌 معهد التأصيل العلمي</a>
      <nav class="header-nav">
        <a href="dashboard.html">الرئيسية</a>
        <a href="courses.html">المقررات</a>
        <a href="curriculum.html">المنهج</a>
        <span style="font-size:0.85rem;opacity:0.8;" id="headerUserName"></span>

  <!-- Sidebar overlay + mobile toggle -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <button class="mobile-toggle" id="mobileSidebarToggle" onclick="toggleSidebar()">📚</button>

  <!-- COURSE BANNER -->
  <div class="course-top-banner">
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">الرئيسية</a>
        <span>/</span>
        <a href="courses.html" style="color:#d4b48e;">المقررات</a>
        <span>/</span>
        <span id="crCourse" style="color:rgba(255,255,255,0.7);">...</span>
      </div>
      <h1 id="courseTitle">جارٍ التحميل...</h1>
      <p id="courseDesc"></p>
      <div class="course-top-meta">

        <span>📋 <span id="examCountLabel">—</span> اختبار</span>
      </div>

  </div>

  <!-- MAIN LAYOUT -->
  <div style="padding-top:0;" id="mainWrapper" style="display:none;">
    <div class="course-layout">

      <!-- SIDEBAR -->
      <aside class="lessons-sidebar" id="lessonsSidebar">
        <div class="sidebar-course-title" id="sidebarCourseTitle">...</div>
        <div id="lessonLinks"></div>
        <div style="padding:12px 20px;border-top:1px solid #eee;margin-top:8px;">
          <div id="examLinks"></div>
        </div>
      </aside>

      <!-- CONTENT -->
      <div class="lesson-content" id="lessonContent">
        <div class="no-lesson">
          <span style="font-size:3rem;">📚</span>
          <p>اختر درساً من القائمة الجانبية</p>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER مُضمَّج مباشرة (نفس dashboard) -->
  <div id="footerPlaceholder">
    <footer class="temp-footer">
      © جميع الحقوق محفوظة لمعهد التأصيل العلمي
    </footer>
  </div>

  <!-- ============================================================
       Firebase + Logic — مُضمَّج مباشرة (نفس نمط dashboard.html)
       لا imports من firebase.js أو components.js
       ============================================================ -->
  <script type="module">
    console.log('🟢 [2] course.html module script started');

    // ── Firebase من CDN مباشرة ──
    import { initializeApp }
      from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      getAuth, onAuthStateChanged, signOut,
      browserLocalPersistence, browserSessionPersistence, setPersistence
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import {
      getFirestore, doc, getDoc, updateDoc, collection, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    console.log('🟢 [3] Firebase imports OK');

    // ── Config مُضمَّج (نفس dashboard) ──
    const firebaseConfig = {
      apiKey:            'AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk',
      authDomain:        'tasil-3lmi.firebaseapp.com',
      projectId:         'tasil-3lmi',
      storageBucket:     'tasil-3lmi.firebasestorage.app',
      messagingSenderId: '596405733121',
      appId:             '1:596405733121:web:38ebadcc9eef8d8bb77d00',
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    setPersistence(auth, browserLocalPersistence).catch(() =>
      setPersistence(auth, browserSessionPersistence).catch(() => {})
    );

    console.log('🟢 [4] Firebase initialized');

    // ── STATE ──
    const params   = new URLSearchParams(location.search);
    const courseId = params.get('id') || 'prep';
    let currentUser  = null;
    let userProgress = {};
    let lessons      = [];
    let exams        = [];

    const DEFAULT_COURSES = {
      prep: { title:'المرحلة التمهيدية',       desc:'المدخل إلى طلب العلم وتذكرة السامع والمتكلم وكتاب الجرد' },
      p1:   { title:'العقيدة والتوحيد',         desc:'القواعد الأربع ونواقض الإسلام والأصول الثلاثة وكشف الشبهات' },
      p2:   { title:'علوم الآلة والسنة',        desc:'الآجرومية والتذكرة والأربعون النووية والرسالة اللطيفة' },
      p3:   { title:'الفقه المالكي',            desc:'الأخضري والعشماوية ونظم ابن أبي كف والمرشد المعين' },
      p4:   { title:'أصول التفسير والعقيدة',   desc:'مقدمة التفسير وكتاب التوحيد والعقيدة الواسطية' },
      p5:   { title:'المقاصد والآداب',          desc:'تبصرة القاصد والقوانين الفقهية والسياسة الشرعية' },
      p6:   { title:'فقه الدعوة والمناظرة',     desc:'الأمر بالمعروف وآداب البحث والرد على المخالف' },
    };

    let courseData = DEFAULT_COURSES[courseId] || { title: 'مقرر', desc: '' };

    // ── Timeout 15 ثانية (نفس dashboard) ──
    const authFallback = setTimeout(() => {
      const screen = document.getElementById('loadingScreen');
      if (screen && !screen.classList.contains('hidden')) {
        screen.innerHTML = `<div style="text-align:center;padding:24px;">
          <p style="color:#888;margin-bottom:20px;">تعذّر الاتصال — تأكد من الاتصال بالإنترنت</p>
          <button onclick="location.reload()" style="background:#3b1b40;color:white;border:none;padding:12px 28px;border-radius:100px;font-size:1rem;font-family:inherit;cursor:pointer;">إعادة المحاولة</button>
          <br><br><a href="index.html" style="color:#888;font-size:0.85rem;">العودة للرئيسية</a>
        </div>`;
      }
    }, 15000);

    // ── AUTH LISTENER (نفس نمط dashboard) ──
    onAuthStateChanged(auth, async (user) => {
      console.log('🟢 [5] onAuthStateChanged — user:', user ? user.email : 'null');
      try {
        clearTimeout(authFallback);

        if (!user) {
          console.log('🔴 لا يوجد مستخدم → index.html');
          window.location.href = 'index.html';
          return;
        }

        currentUser = user;

        // أظهر الصفحة فوراً
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('mainWrapper').style.display = '';
        const nameEl = document.getElementById('headerUserName');
        if (nameEl) nameEl.textContent = user.displayName || user.email?.split('@')[0] || '';

        console.log('🟢 [6] UI shown — loading user data...');

        // جلب بيانات المستخدم
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists()) {
            userProgress = snap.data()?.progress || {};
            const userData = snap.data();
            if (nameEl) nameEl.textContent = userData.fullName || user.email;
          }
        } catch(e) { console.warn('user doc error:', e.message); }

        loadCourse();

      } catch (err) {
        console.error('🔴 course.html auth error:', err);
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('mainWrapper').style.display = '';
        throw err; // يصل إلى window.onerror
      }
    });

    // ── LOAD COURSE ──
    async function loadCourse() {
      console.log('🟢 [7] loadCourse — courseId:', courseId);

      try {
        const cSnap = await getDoc(doc(db, 'courses', courseId));
        if (cSnap.exists()) courseData = { ...courseData, ...cSnap.data() };
      } catch(e) { console.warn('course doc error:', e.message); }

      document.getElementById('courseTitle').textContent      = courseData.title;
      document.getElementById('courseDesc').textContent       = courseData.desc || '';
      document.getElementById('crCourse').textContent         = courseData.title;
      document.getElementById('sidebarCourseTitle').textContent = courseData.title;
      document.title = courseData.title + ' — معهد التأصيل العلمي';

      // Load lessons
      try {
        const lSnap = await getDocs(collection(db, 'courses', courseId, 'lessons'));
        lSnap.forEach(d => lessons.push({ id: d.id, ...d.data() }));
        lessons.sort((a, b) => (a.order || 0) - (b.order || 0));
      } catch(e) { console.warn('lessons error:', e.message); }

      // Default lessons if none
      if (!lessons.length) {
        for (let i = 1; i <= 20; i++) {
          lessons.push({ id: 'l' + i, title: 'الدرس ' + i, order: i, visible: true, locked: false });
        }
      }

      // Load exams
      try {
        const eSnap = await getDocs(collection(db, 'courses', courseId, 'exams'));
        eSnap.forEach(d => exams.push({ id: d.id, ...d.data() }));
      } catch(e) { console.warn('exams error:', e.message); }

      document.getElementById('lessonCountLabel').textContent = lessons.filter(l => l.visible !== false).length;
      document.getElementById('examCountLabel').textContent   = exams.filter(e => e.visible !== false).length;

      buildSidebar();
      console.log('🟢 [8] sidebar built');
    }

    // ── BUILD SIDEBAR ──
    function buildSidebar() {
      const linksEl = document.getElementById('lessonLinks');
      linksEl.innerHTML = lessons.filter(l => l.visible !== false).map((l, i) => {
        const done = userProgress['lesson_' + courseId + '_' + l.id];
        return `<a class="lesson-link${l.locked ? ' locked-lesson' : ''}${done ? ' done' : ''}"
          onclick="window.openLesson('${l.id}')" href="javascript:void(0)" id="ll-${l.id}">
          <div class="l-num">${done ? '✓' : (i + 1)}</div>
          <span>${l.title}</span>
          ${l.locked ? '<span style="font-size:0.75rem;margin-right:auto;">🔒</span>' : ''}
        </a>`;
      }).join('');

      const examsEl = document.getElementById('examLinks');
      examsEl.innerHTML = exams.filter(e => e.visible !== false).map(ex => `
        <a class="lesson-link${ex.locked ? ' locked-lesson' : ''}"
          onclick="window.openExam('${ex.id}')" href="javascript:void(0)"
          style="color:#a07840;">
          <div class="l-num" style="background:rgba(212,180,142,0.2);color:#a07840;">📝</div>
          <span>${ex.title || 'الاختبار'}</span>
          ${ex.locked ? '<span style="font-size:0.75rem;margin-right:auto;">🔒</span>' : ''}
        </a>`).join('');
    }

    // ── OPEN LESSON ──
    window.openLesson = async function(lessonId) {
      document.querySelectorAll('.lesson-link').forEach(l => l.classList.remove('active'));
      document.getElementById('ll-' + lessonId)?.classList.add('active');

      if (window.innerWidth <= 860) closeSidebar();

      let lesson = lessons.find(l => l.id === lessonId) || {};
      try {
        const snap = await getDoc(doc(db, 'courses', courseId, 'lessons', lessonId));
        if (snap.exists()) lesson = { ...lesson, ...snap.data() };
      } catch(e) {}

      let exercises = [];
      try {
        const exSnap = await getDocs(collection(db, 'courses', courseId, 'lessons', lessonId, 'exercises'));
        exSnap.forEach(d => exercises.push({ id: d.id, ...d.data() }));
        exercises.sort((a, b) => (a.order || 0) - (b.order || 0));
      } catch(e) {}

      const isDone = userProgress['lesson_' + courseId + '_' + lessonId];

      // embed video URL
      let videoEmbed = '';
      if (lesson.videoUrl) {
        const url = lesson.videoUrl;
        const embedUrl = url.includes('youtu')
          ? url.replace('watch?v=', 'embed/').replace('youtu.be/', 'www.youtube.com/embed/')
          : url;
        videoEmbed = `<iframe src="${embedUrl}?rel=0" allowfullscreen></iframe>`;
      }

      const content = document.getElementById('lessonContent');
      content.innerHTML = `
        <div class="fade-in-up">
          <h2 style="font-size:1.3rem;color:#3b1b40;margin-bottom:8px;margin-top:0;">${lesson.title || 'الدرس'}</h2>
          ${lesson.desc
            ? `<p style="color:#888;font-size:0.88rem;margin-bottom:24px;line-height:1.8;">${lesson.desc}</p>`
            : '<div style="margin-bottom:24px;"></div>'}

          <!-- Video -->
          <div class="lesson-video-wrap">
            <div class="lesson-video-inner">
              ${videoEmbed || `<div class="lesson-video-placeholder"><span style="font-size:3rem;">📹</span><p>لم يُضَف فيديو لهذا الدرس بعد</p></div>`}
            </div>
          </div>

          <!-- Attachments -->
          ${(lesson.audioUrl || lesson.pdfUrl) ? `
          <div class="lesson-attachments">
            ${lesson.audioUrl ? `
            <a href="${lesson.audioUrl}" target="_blank" class="attachment-card">
              <div class="att-ico">🎧</div>
              <div><h4>المرفق الصوتي</h4><p>اضغط للاستماع</p></div>
            </a>` : ''}
            ${lesson.pdfUrl ? `
            <a href="${lesson.pdfUrl}" target="_blank" class="attachment-card">
              <div class="att-ico">📄</div>
              <div><h4>ملف PDF</h4><p>اضغط للتحميل أو العرض</p></div>
            </a>` : ''}
          </div>` : ''}

          <!-- Exercises -->
          ${exercises.filter(q => q.visible !== false && q.locked !== true).length ? `
          <div class="exercise-section" id="exerciseSection">
            <div class="exercise-header">
              <h3>✏️ تمارين الدرس</h3>
              <span class="badge badge-purple">${exercises.length} سؤال</span>
            </div>
            <div id="exerciseQs">
              ${buildQuestions(exercises, 'ex', lessonId)}
            </div>
            <button class="btn btn-primary" onclick="window.submitExercise('${lessonId}')" id="exSubmitBtn" style="margin-top:20px;">تسليم التمارين</button>
            <div id="exResult" style="margin-top:16px;display:none;"></div>
          </div>` : ''}

          <!-- Mark done -->
          <div class="mark-done-card">
            <span>هل أنهيت هذا الدرس؟</span>
            <button class="btn btn-success btn-sm" onclick="window.markLessonDone('${lessonId}')">
              ${isDone ? '✅ تم الإتمام' : 'تحديد كمكتمل ✓'}
            </button>
          </div>
        </div>`;

      window.currentExercises = exercises;
    };

    // ── OPEN EXAM ──
    window.openExam = function(examId) {
      window.location.href = `exam.html?course=${courseId}&exam=${examId}`;
    };

    // ── BUILD QUESTIONS ──
    function buildQuestions(questions, prefix) {
      const letters = ['أ','ب','ج','د','هـ','و','ز','ح','ط','ي'];
      return questions.filter(q => q.visible !== false).map((q, qi) => `
        <div class="question-block" id="${prefix}_q_${qi}">
          <div class="q-num-badge">سؤال ${qi + 1}</div>
          <div class="q-text">${q.question}</div>
          <div class="options-list">
            ${(q.options || []).map((opt, oi) => `
              <label class="option-item" id="${prefix}_opt_${qi}_${oi}">
                <input type="${(q.correctIndexes||[]).length > 1 ? 'checkbox' : 'radio'}"
                  name="${prefix}_q${qi}" value="${oi}"
                  onchange="window.handleOptionChange('${prefix}', ${qi}, ${oi}, this)">
                <span class="option-letter">${letters[oi] || oi + 1}</span>
                <span>${opt}</span>
              </label>`).join('')}
          </div>
        </div>`).join('');
    }

    window.handleOptionChange = function(prefix, qi, oi, input) {
      const q = window.currentExercises?.[qi];
      if (!q) return;
      const isMulti = (q.correctIndexes || []).length > 1;
      if (!isMulti) {
        document.querySelectorAll(`input[name="${prefix}_q${qi}"]`).forEach(inp => {
          document.getElementById(`${prefix}_opt_${qi}_${inp.value}`)
            ?.classList.toggle('selected', inp === input && inp.checked);
        });
      } else {
        document.getElementById(`${prefix}_opt_${qi}_${oi}`)
          ?.classList.toggle('selected', input.checked);
      }
    };

    window.submitExercise = function() {
      const exercises = window.currentExercises || [];
      const prefix    = 'ex';
      let correct = 0;

      exercises.filter(q => q.visible !== false).forEach((q, qi) => {
        const correctSet = new Set(q.correctIndexes || []);
        const isMulti    = correctSet.size > 1;
        let userCorrect  = false;

        if (isMulti) {
          const checked = [...document.querySelectorAll(`input[name="${prefix}_q${qi}"]:checked`)]
            .map(i => parseInt(i.value));
          userCorrect = checked.length === correctSet.size && checked.every(i => correctSet.has(i));
        } else {
          const checked = document.querySelector(`input[name="${prefix}_q${qi}"]:checked`);
          userCorrect = checked && correctSet.has(parseInt(checked.value));
        }

        if (userCorrect) correct++;

        (q.options || []).forEach((_, oi) => {
          const el = document.getElementById(`${prefix}_opt_${qi}_${oi}`);
          if (!el) return;
          el.classList.remove('correct', 'wrong', 'selected');
          if (correctSet.has(oi)) el.classList.add('correct');
          const inp = el.querySelector('input');
          if (inp?.checked && !correctSet.has(oi)) el.classList.add('wrong');
        });
        document.querySelectorAll(`input[name="${prefix}_q${qi}"]`).forEach(i => i.disabled = true);
      });

      const total    = exercises.filter(q => q.visible !== false).length;
      const pct      = total ? Math.round((correct / total) * 100) : 0;
      const isPass   = pct >= 60;
      const resultEl = document.getElementById('exResult');
      if (resultEl) {
        resultEl.style.display = 'block';
        resultEl.innerHTML = `
          <div style="padding:20px;border-radius:8px;text-align:center;
            background:${isPass ? 'rgba(26,122,74,0.08)' : 'rgba(185,45,58,0.08)'};
            border:1px solid ${isPass ? 'rgba(26,122,74,0.25)' : 'rgba(185,45,58,0.25)'};">
            <div style="font-size:2rem;font-weight:bold;color:${isPass ? '#1a7a4a' : '#b92d3a'};">${pct}٪</div>
            <div style="font-size:0.88rem;color:#888;margin-top:6px;">أجبت ${correct} من ${total} إجابة صحيحة</div>
          </div>`;
      }
      const submitBtn = document.getElementById('exSubmitBtn');
      if (submitBtn) submitBtn.style.display = 'none';
    };

    window.markLessonDone = async function(lessonId) {
      if (!currentUser) return;
      const key = 'lesson_' + courseId + '_' + lessonId;
      userProgress[key] = true;
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), { progress: userProgress });
        buildSidebar();
        showToast('تم تحديد الدرس كمكتمل ✅', 'success');
        // تحديث زر الإتمام
        const btn = document.querySelector('.mark-done-card .btn');
        if (btn) btn.textContent = '✅ تم الإتمام';
      } catch(e) {
        console.error('markLessonDone error:', e);
        showToast('حدث خطأ، حاول مجدداً', 'error');
      }
    };

    // ── LOGOUT (نفس dashboard) ──
    window.handleLogout = async function() {
      try { await signOut(auth); } catch(e) { console.error(e); }
      window.location.href = 'index.html';
    };

    // ── MOBILE SIDEBAR (نفس dashboard) ──
    window.toggleSidebar = function() {
      const s = document.getElementById('lessonsSidebar');
      const o = document.getElementById('sidebarOverlay');
      const b = document.getElementById('mobileSidebarToggle');
      s?.classList.toggle('open');
      o?.classList.toggle('show');
      if (b) b.textContent = s?.classList.contains('open') ? '✕' : '📚';
    };
    window.closeSidebar = function() {
      document.getElementById('lessonsSidebar')?.classList.remove('open');
      document.getElementById('sidebarOverlay')?.classList.remove('show');
      const b = document.getElementById('mobileSidebarToggle');
      if (b) b.textContent = '📚';
    };

    // ── MOBILE HEADER MENU ──
    window.toggleMobileMenu = function() {
      const nav = document.querySelector('.temp-header .header-nav');
      if (nav) nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
    };

    // ── TOAST ──
    function showToast(msg, type = '') {
      let t = document.getElementById('globalToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'globalToast';
        t.className = 'toast';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(() => t.classList.add('show'), 50);
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    console.log('🟢 [9] All handlers ready — waiting for Firebase auth...');
  </script>
</body>
</html>
