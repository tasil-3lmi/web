<style>
/* ══ RESET & BASE ══ */
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3B1B40;--purple-l:#5a2d63;--gold:#D4B48E;--gold-d:#b8965e;--bg:#faf8f5;--white:#fff;--muted:#7a6a7e;--border:rgba(212,180,142,.25)}
body{font-family:'Zain','Segoe UI',sans-serif;background:var(--bg);color:#1a0a1e;direction:rtl}

/* ══ SPINNER ══ */
#spinner{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:44px;height:44px;border:4px solid rgba(59,27,64,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}

/* ══ TOP NAV BAR ══ */
#course-topbar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:10px 20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(59,27,64,.06);
}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:700;color:var(--muted);
  text-decoration:none;padding:6px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg);
  transition:.18s;white-space:nowrap;
}
.back-btn:hover{color:var(--purple);border-color:var(--purple)}
#topbar-title{font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--purple);flex:1}

/* ══ MAIN 2-COLUMN LAYOUT ══
   Left = content area  |  Right = lesson sidebar
   (RTL: sidebar is on the right visually = first in DOM)
*/
.page-wrap{
  display:grid;
  grid-template-columns:300px 1fr;   /* sidebar | content */
  height:calc(100vh - 56px - 44px);
  overflow:hidden;
}

/* ══ SIDEBAR (RIGHT) ══ */
.sb{
  background:var(--white);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sb-head{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-course-name{
  font-family:'Amiri',serif;font-size:15px;font-weight:700;
  color:var(--purple);margin-bottom:8px;line-height:1.4;
}
.sb-prog-bar{background:rgba(212,180,142,.2);border-radius:8px;height:5px;margin-bottom:4px;overflow:hidden}
.sb-prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .4s}
.sb-prog-txt{font-size:11px;color:var(--muted)}

.sb-list{flex:1;overflow-y:auto;padding:6px 8px}

/* Each lesson row in sidebar */
.sb-row{
  display:flex;align-items:center;gap:7px;
  padding:9px 10px;border-radius:10px;margin-bottom:3px;
  cursor:pointer;border:1.5px solid transparent;
  transition:.18s;background:var(--bg);
  position:relative;
}
.sb-row:hover{border-color:rgba(59,27,64,.18);background:rgba(59,27,64,.04)}
.sb-row.active{border-color:var(--purple);background:rgba(59,27,64,.08)}
.sb-row.done{border-color:rgba(40,167,69,.3);background:rgba(40,167,69,.04)}
.sb-row.locked-row{opacity:.55;cursor:not-allowed}
.sb-row.hidden-row{opacity:.4}
.sb-row.drag-over{border-color:var(--gold)!important;background:rgba(212,180,142,.12)!important}

.sb-num{
  width:24px;height:24px;border-radius:50%;
  background:rgba(212,180,142,.2);color:var(--gold-d);
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-num.done-n{background:rgba(40,167,69,.15);color:#28a745}
.sb-info{flex:1;min-width:0}
.sb-title{font-size:12px;font-weight:700;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-meta{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.sb-tag{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:700}

/* Sidebar action buttons (admin only, show on hover) */
.sb-acts{display:none;gap:2px;flex-shrink:0}
.sb-row:hover .sb-acts{display:flex}
.sb-act{
  width:22px;height:22px;border-radius:5px;border:none;
  cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.drag-h{cursor:grab;color:var(--muted);opacity:.3;font-size:12px;flex-shrink:0}
.drag-h:hover{opacity:.8}

/* Test row */
.test-row{
  display:flex;align-items:center;gap:7px;
  padding:9px 10px;border-radius:10px;margin-bottom:3px;
  cursor:pointer;border:1.5px solid var(--border);
  background:rgba(212,180,142,.07);transition:.18s;
}
.test-row:hover{border-color:var(--gold-d);background:rgba(212,180,142,.14)}
.test-row.active{border-color:var(--gold-d);background:rgba(212,180,142,.18)}

.sb-section-lbl{font-size:11px;font-weight:800;color:var(--muted);padding:4px 6px;margin-top:4px;margin-bottom:2px}
.sb-divider{border:none;border-top:1px dashed rgba(212,180,142,.3);margin:6px 0}

/* ══ CONTENT (LEFT) ══ */
.content{overflow-y:auto;background:var(--bg)}
.content-inner{padding:22px 26px;max-width:820px}

/* ── Lesson title bar ── */
.lesson-titlebar{
  background:var(--white);border-radius:14px;
  padding:14px 18px;margin-bottom:16px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.lesson-name{font-family:'Amiri',serif;font-size:20px;font-weight:700;color:var(--purple)}
.lesson-order{font-size:12px;color:var(--muted);background:rgba(212,180,142,.15);padding:4px 12px;border-radius:10px;font-weight:700}

/* ── Video box ── */
.video-box{
  border:2.5px solid var(--purple);
  border-radius:16px;overflow:hidden;
  background:#000;margin-bottom:14px;
  box-shadow:0 8px 28px rgba(59,27,64,.15);
}
.video-ratio{position:relative;padding-bottom:56.25%;height:0}
.video-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-placeholder{
  background:linear-gradient(135deg,var(--purple),var(--purple-l));
  padding:50px 24px;text-align:center;
  color:rgba(255,255,255,.75);font-size:14px;
}
.video-placeholder .play-icon{font-size:40px;display:block;margin-bottom:10px}

/* ── Action chips row (below video) ── */
.action-chips{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 15px;border-radius:10px;border:none;
  font-family:'Zain',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;text-decoration:none;white-space:nowrap;
}
.chip:hover{filter:brightness(1.06);transform:translateY(-1px)}
.chip-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--purple)}
.chip-green{background:linear-gradient(135deg,#28a745,#1e7e34);color:#fff}
.chip-ghost{background:var(--white);color:var(--muted);border:1.5px solid var(--border)}
.chip-ghost:hover{color:var(--purple);border-color:var(--purple)}
.chip-purple{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.chip-red{background:rgba(220,53,69,.1);color:#dc3545}
.chip-sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* ── Info section (وصف + مؤلف) ── */
.info-box{
  background:var(--white);border-radius:12px;
  padding:16px 18px;margin-bottom:16px;
  border:1px solid var(--border);
}
.info-lbl{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px}
.info-val{font-size:14px;color:#3a2a3e;line-height:1.8}

/* ── Exercises section ── */
.ex-section-title{
  font-family:'Amiri',serif;font-size:19px;font-weight:700;
  color:var(--purple);margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}

/* Each exercise card */
.ex-card{
  background:var(--white);border-radius:14px;
  padding:18px;margin-bottom:14px;
  border:2px solid var(--purple);
  box-shadow:0 4px 16px rgba(59,27,64,.08);
}
.ex-q-text{
  font-size:15px;font-weight:700;color:var(--purple);
  margin-bottom:14px;line-height:1.7;
}
.multi-tag{
  font-size:10px;background:rgba(59,27,64,.1);color:var(--purple);
  padding:2px 7px;border-radius:6px;font-weight:700;margin-right:6px;
}

/* Answer options */
.opt{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:10px;
  border:1.5px solid rgba(212,180,142,.3);
  margin-bottom:8px;cursor:pointer;font-size:14px;
  transition:.18s;
}
.opt:hover:not(.opt-locked){border-color:var(--purple);background:rgba(59,27,64,.04)}
.opt.opt-sel{border-color:var(--purple);background:rgba(59,27,64,.07)}
.opt.opt-ok{border-color:#28a745!important;background:rgba(40,167,69,.09)!important;color:#28a745!important}
.opt.opt-wrong{border-color:#dc3545!important;background:rgba(220,53,69,.08)!important;color:#dc3545!important}
.opt.opt-locked{cursor:not-allowed;opacity:.55}
.opt-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(212,180,142,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:.15s}
.opt-square{width:20px;height:20px;border-radius:4px;border:1.5px solid rgba(212,180,142,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:.15s}

/* Admin toolbar inside cards */
.adm-bar{
  background:rgba(59,27,64,.04);border:1px dashed rgba(59,27,64,.18);
  border-radius:10px;padding:8px 12px;margin-bottom:12px;
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
}
.adm-bar-lbl{font-size:10px;font-weight:800;color:var(--purple);opacity:.6;margin-left:4px}

/* Test result card */
.result-card{
  background:var(--white);border-radius:16px;padding:28px;
  text-align:center;border:1px solid var(--border);margin-bottom:20px;
}

/* Next lesson button */
.next-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple-l));
  color:#fff;font-family:'Zain',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.22s;margin-top:20px;
}
.next-btn:hover{filter:brightness(1.06);transform:translateY(-1px)}

/* ══ MOBILE ══ */
.mob-sb-btn{
  display:none;position:fixed;bottom:18px;right:16px;
  width:46px;height:46px;border-radius:50%;
  background:var(--purple);color:#fff;border:none;cursor:pointer;
  box-shadow:0 6px 20px rgba(59,27,64,.4);z-index:99;
  font-size:20px;align-items:center;justify-content:center;
}

@media(max-width:900px){
  .page-wrap{grid-template-columns:1fr}
  .sb{
    position:fixed;top:0;right:0;bottom:0;width:280px;
    z-index:300;transform:translateX(100%);transition:transform .3s;
    box-shadow:-8px 0 32px rgba(59,27,64,.2);
  }
  .sb.open{transform:translateX(0)}
  .mob-sb-btn{display:flex}
  .content{height:100%}
}
@media(max-width:600px){
  .content-inner{padding:14px 12px}
  .lesson-name{font-size:16px}
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
var CU=null, CD=null, CID=null, curItem=null, dragSrc=null, scores={}, testAns={};

var p=new URLSearchParams(location.search);
CID=p.get('id');
if(!CID){location.href='courses.html';}

// Cache-first
(function(){var c=localStorage.getItem('ti_user');if(c){try{CU=JSON.parse(c);}catch(e){}}})();

auth.onAuthStateChanged(async function(u){
  if(!u){localStorage.removeItem('ti_user');location.href='login.html';return;}
  if(!CU){
    var a=await db.collection('admins').doc(u.uid).get().catch(function(){return null;});
    if(a&&a.exists){CU={uid:u.uid,...a.data(),isAdmin:true};}
    else{
      var us=await db.collection('users').doc(u.uid).get().catch(function(){return null;});
      if(!us||!us.exists){await auth.signOut();location.href='login.html';return;}
      CU={uid:u.uid,...us.data(),isAdmin:false};
    }
    localStorage.setItem('ti_user',JSON.stringify(CU));
  }
  await loadCourse();
  boot();
});

// ══════════════════════════════════════════════
// KNOWN COURSES
// ══════════════════════════════════════════════
var KNOWN={
  t1:{title:'كتاب "المدخل إلى طلب العلم"',color:'#b8965e'},
  t2:{title:'كتاب "تذكرة السامع والمتكلم"',color:'#a07840'},
  t3:{title:'الجرد القرآني التطبيقي',color:'#8B6914'},
  m1:{title:'القواعد الأربع',color:'#3B1B40'},
  m2:{title:'نواقض الإسلام',color:'#4a2250'},
  m3:{title:'الأصول الثلاثة وأدلتها',color:'#5a2d63'},
  m4:{title:'كشف الشبهات',color:'#3B1B40'},
  m5:{title:'متن الآجرومية في النحو',color:'#1a5276'},
  m6:{title:'التذكرة في علوم الحديث',color:'#1b4f72'},
  m7:{title:'الأرجوزة الميئية في السيرة',color:'#154360'},
  m8:{title:'الرسالة اللطيفة في أصول الفقه',color:'#0e3251'},
  m9:{title:'الأربعون النووية مع زيادات ابن رجب',color:'#1a5276'},
  m10:{title:'مقدمات التفقه',color:'#117a65'},
  m11:{title:'متن الأخضري في العبادات',color:'#0e6655'},
  m12:{title:'متن العشماوية (قراءة سريعة)',color:'#117a65'},
  m13:{title:'نظم ابن أبي كف في أدلة المذهب',color:'#0d5e4a'},
  m14:{title:'نظم المرشد المعين لابن عاشر',color:'#117a65'},
  m15:{title:'منظومة القواعد الفقهية',color:'#0a4d3a'},
  m16:{title:'مقدمة في أصول التفسير',color:'#6e2f0a'},
  m17:{title:'كتاب التوحيد',color:'#7d3410'},
  m18:{title:'القواعد والضوابط السلفية في الأسماء والصفات',color:'#6e2f0a'},
  m19:{title:'العقيدة الواسطية',color:'#8b3c11'},
  m20:{title:'منظومة تبصرة القاصد في المقاصد',color:'#512e5f'},
  m21:{title:'كتاب الجامع في الآداب',color:'#5b3068'},
  m22:{title:'السبل المرضية في السياسة الشرعية',color:'#6c3483'},
  m23:{title:'الأمر بالمعروف والنهي عن المنكر',color:'#922b21'},
  m24:{title:'آداب البحث والمناظرة',color:'#a93226'},
  m25:{title:'متن الرد على المخالف',color:'#922b21'},
  m26:{title:'متن الحصانة الفكرية',color:'#b03a2e'}
};

function mkLessons(cid){
  return Array.from({length:20},function(_,i){
    return{id:cid+'-l'+(i+1),order:i+1,title:'الدرس '+(i+1),visible:true,locked:false,youtube:'',audio:'',pdf:'',exercises:[]};
  });
}
function mkTests(cid,ct){
  var qs=[
    {id:'q1',q:'ما موضوع '+ct+'؟',multi:false,options:['دراسة شرعية متخصصة','دراسة لغوية','دراسة تاريخية','دراسة فلسفية'],answers:[0]},
    {id:'q2',q:'ما أول خطوة في طلب العلم؟',multi:false,options:['الإخلاص لله','شراء الكتب','الإنترنت','حضور الدروس'],answers:[0]},
    {id:'q3',q:'ما منهج المعهد؟',multi:false,options:['منهج أهل السنة والجماعة','المنهج العقلاني','المنهج الفلسفي','منهج المتكلمين'],answers:[0]},
    {id:'q4',q:'ما ثمرة العلم الشرعي؟',multi:false,options:['خشية الله والعمل به','الشهرة','الجدل','النجاح فقط'],answers:[0]},
    {id:'q5',q:'ما الهدف من دراسة المقرر؟',multi:false,options:['التعمق في العلم الشرعي','الشهادة','التفوق','بلا هدف'],answers:[0]}
  ];
  return[
    {id:cid+'-t1',title:'اختبار الوحدة الأولى — '+ct,visible:true,locked:false,questions:qs},
    {id:cid+'-t2',title:'الاختبار النهائي — '+ct,visible:true,locked:false,questions:qs.map(function(q){return Object.assign({},q,{id:q.id+'b'});})}
  ];
}

// ══════════════════════════════════════════════
// LOAD COURSE FROM FIRESTORE
// ══════════════════════════════════════════════
async function loadCourse(){
  var snap=await db.collection('courses').doc(CID).get().catch(function(){return null;});
  if(snap&&snap.exists){
    CD=snap.data();
  } else {
    var k=KNOWN[CID];
    if(!k){showToast('المقرر غير موجود','error');setTimeout(function(){location.href='courses.html';},2e3);return;}
    CD={id:CID,title:k.title,color:k.color||'#3B1B40',desc:'',author:'',lessons:mkLessons(CID),tests:mkTests(CID,k.title)};
    db.collection('courses').doc(CID).set(CD).catch(function(e){console.log('init:',e.message);});
  }
  if(!CD.lessons||!CD.lessons.length) CD.lessons=mkLessons(CID);
  if(!CD.tests||!CD.tests.length)     CD.tests=mkTests(CID,CD.title);
  CD.lessons.forEach(function(l){if(!l.exercises)l.exercises=[];});

  // Load student scores
  if(!CU.isAdmin){
    var sc=await db.collection('scores').doc(CU.uid+'_'+CID).get().catch(function(){return null;});
    if(sc&&sc.exists) scores=sc.data().scores||{};
  }
  console.log('✅ Course loaded:',CD.title,'| lessons:',CD.lessons.length);
}

// ══════════════════════════════════════════════
// BUILD SIDEBAR
// ══════════════════════════════════════════════
function buildSB(){
  var ls=CD.lessons||[], ts=CD.tests||[], adm=CU.isAdmin;
  var done=CU.completedLessons||[];
  var cnt=ls.filter(function(l){return done.indexOf(l.id)>=0;}).length;
  var pct=ls.length?Math.round(cnt/ls.length*100):0;
  document.getElementById('sb-prog').style.width=pct+'%';
  document.getElementById('sb-prog-txt').textContent=cnt+' / '+ls.length+' درس مكتمل';

  var h='';

  // ── Lesson rows ──
  var vis=adm?ls:ls.filter(function(l){return l.visible;});
  vis.forEach(function(l){
    var isDone=done.indexOf(l.id)>=0;
    var isAct=curItem&&curItem.t==='l'&&curItem.id===l.id;
    var cls='sb-row'
      +(isAct?' active':'')
      +(isDone?' done':'')
      +(l.locked&&!adm?' locked-row':'')
      +(!l.visible&&adm?' hidden-row':'');
    var fn=l.locked&&!adm?'locked()':'oL("'+l.id+'")';

    h+='<div class="'+cls+'" id="sr-'+l.id+'" onclick="'+fn+'"';
    h+=' draggable="'+(adm?'true':'false')+'"';
    h+=' ondragstart="dStart(\''+l.id+'\')"';
    h+=' ondragover="event.preventDefault();this.classList.add(\'drag-over\')"';
    h+=' ondragleave="this.classList.remove(\'drag-over\')"';
    h+=' ondrop="event.preventDefault();this.classList.remove(\'drag-over\');dDrop(\''+l.id+'\')">';

    if(adm) h+='<span class="drag-h" title="اسحب">⋮⋮</span>';
    h+='<div class="sb-num'+(isDone?' done-n':'')+'">'+(isDone?'✓':l.order)+'</div>';
    h+='<div class="sb-info"><div class="sb-title">'+l.title+'</div>';
    h+='<div class="sb-meta">';
    if(!l.visible&&adm) h+='<span class="sb-tag" style="background:rgba(220,53,69,.1);color:#dc3545">مخفي</span>';
    if(l.locked)         h+='<span class="sb-tag" style="background:rgba(255,193,7,.15);color:#856404">🔒</span>';
    if(isDone)           h+='<span class="sb-tag" style="background:rgba(40,167,69,.12);color:#28a745">✓</span>';
    h+='</div></div>';

    if(adm){
      h+='<div class="sb-acts">';
      h+='<button class="sb-act" onclick="event.stopPropagation();eL(\''+l.id+'\')" style="background:rgba(212,180,142,.2);color:var(--gold-d)" title="تعديل">✎</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();tLP(\''+l.id+'\',\'visible\')" style="background:rgba(59,27,64,.08);color:var(--purple)" title="'+(l.visible?'إخفاء':'إظهار')+'">'+(l.visible?'👁':'🚫')+'</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();tLP(\''+l.id+'\',\'locked\')" style="background:rgba(255,193,7,.1);color:#856404" title="'+(l.locked?'فتح':'قفل')+'">'+(l.locked?'🔓':'🔒')+'</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();dL(\''+l.id+'\')" style="background:rgba(220,53,69,.1);color:#dc3545" title="حذف">✕</button>';
      h+='</div>';
    }
    h+='</div>';
  });

  if(adm){
    h+='<button onclick="addL()" style="width:100%;padding:7px;border-radius:9px;border:1.5px dashed rgba(59,27,64,.2);background:none;cursor:pointer;font-size:12px;color:var(--muted);font-family:Zain,sans-serif;margin-top:3px;transition:.2s" onmouseover="this.style.borderColor=\'var(--purple)\'" onmouseout="this.style.borderColor=\'rgba(59,27,64,.2)\'">+ إضافة درس</button>';
  }

  // ── Test rows ──
  h+='<hr class="sb-divider"/>';
  h+='<div class="sb-section-lbl">الاختبارات</div>';
  var visT=adm?ts:ts.filter(function(t){return t.visible;});
  visT.forEach(function(t){
    var isAct=curItem&&curItem.t==='test'&&curItem.id===t.id;
    var sc=scores[t.id];
    var fn=t.locked&&!adm?'locked()':'oT("'+t.id+'")';
    h+='<div class="test-row'+(isAct?' active':'')+'" id="tr-'+t.id+'" onclick="'+fn+'">';
    h+='<span style="font-size:14px">'+(t.locked?'🔒':'📝')+'</span>';
    h+='<div class="sb-info"><div class="sb-title">'+t.title+'</div>';
    if(sc) h+='<div style="font-size:10px;color:#28a745">✓ '+sc.score+'/'+sc.total+'</div>';
    if(!t.visible&&adm) h+='<div style="font-size:10px;color:#dc3545">مخفي</div>';
    h+='</div>';
    if(adm){
      h+='<div style="display:flex;gap:2px">';
      h+='<button class="sb-act" onclick="event.stopPropagation();eT(\''+t.id+'\')" style="background:rgba(212,180,142,.2);color:var(--gold-d)">✎</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();tTP(\''+t.id+'\',\'visible\')" style="background:rgba(59,27,64,.08);color:var(--purple)">'+(t.visible?'👁':'🚫')+'</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();tTP(\''+t.id+'\',\'locked\')" style="background:rgba(255,193,7,.1);color:#856404">'+(t.locked?'🔓':'🔒')+'</button>';
      h+='<button class="sb-act" onclick="event.stopPropagation();dT(\''+t.id+'\')" style="background:rgba(220,53,69,.1);color:#dc3545">✕</button>';
      h+='</div>';
    }
    h+='</div>';
  });

  if(adm){
    h+='<button onclick="addT()" style="width:100%;padding:7px;border-radius:9px;border:1.5px dashed rgba(212,180,142,.4);background:none;cursor:pointer;font-size:12px;color:var(--muted);font-family:Zain,sans-serif;margin-top:3px">+ إضافة اختبار</button>';
  }

  document.getElementById('sb-list').innerHTML=h;
}

// ══════════════════════════════════════════════
// OPEN LESSON  (تصميم الصورة)
// ══════════════════════════════════════════════
function oL(lid){
  var l=CD.lessons.find(function(x){return x.id===lid;});
  if(!l)return;
  curItem={t:'l',id:lid};
  buildSB();
  closeSidebar();

  var adm=CU.isAdmin;
  var isDone=(CU.completedLessons||[]).indexOf(lid)>=0;
  var exs=l.exercises||[];
  var h='';

  // 1. عنوان المقرر + اسم الدرس / رقمه
  h+='<div class="lesson-titlebar">';
  h+='<div class="lesson-name">'+l.title+'</div>';
  h+='<div style="display:flex;align-items:center;gap:6px">';
  h+='<span class="lesson-order">الدرس '+l.order+'</span>';
  if(isDone) h+='<span class="lesson-order" style="background:rgba(40,167,69,.12);color:#28a745">✓ مكتمل</span>';
  if(l.locked&&adm) h+='<span class="lesson-order" style="background:rgba(255,193,7,.15);color:#856404">🔒</span>';
  h+='</div></div>';

  // 2. رابط مقطع اليوتيوب (الصندوق الكبير)
  h+='<div class="video-box">';
  if(l.youtube){
    h+='<div class="video-ratio"><iframe src="'+l.youtube+'" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>';
  } else {
    h+='<div class="video-placeholder"><span class="play-icon">🎬</span>';
    h+=(adm?'انقر "تعديل الدرس" لإضافة رابط يوتيوب':'لم يُضَف مقطع فيديو لهذا الدرس بعد');
    h+='</div>';
  }
  h+='</div>';

  // 3. الأزرار تحت الفيديو: التمارين | تعديل | قفل | إخفاء  +  الإنجاز  +  مرفق صوتي + PDF
  h+='<div class="action-chips">';
  if(adm){
    h+='<button onclick="eL(\''+lid+'\')" class="chip chip-gold">✎ تعديل الدرس</button>';
    h+='<button onclick="tLP(\''+lid+'\',\'locked\')" class="chip chip-ghost">'+(l.locked?'🔓 فتح القفل':'🔒 قفل')+'</button>';
    h+='<button onclick="tLP(\''+lid+'\',\'visible\')" class="chip chip-ghost">'+(l.visible?'🚫 إخفاء':'👁 إظهار')+'</button>';
  }
  if(!isDone&&!(l.locked&&!adm)){
    h+='<button onclick="markDone(\''+lid+'\')" class="chip chip-green">✓ الإنجاز</button>';
  }
  if(isDone){
    h+='<button onclick="unDone(\''+lid+'\')" class="chip chip-ghost">↩ إلغاء الإنجاز</button>';
  }
  if(l.audio) h+='<a href="'+l.audio+'" target="_blank" class="chip chip-ghost">🎵 مرفق صوتي</a>';
  if(l.pdf)   h+='<a href="'+l.pdf+'" target="_blank" class="chip chip-ghost">📄 مرفق PDF</a>';
  h+='</div>';

  // 4. وصف المقرر + اسم المؤلف
  if(CD.desc||CD.author||adm){
    h+='<div class="info-box">';
    if(CD.desc){
      h+='<div class="info-lbl">وصف المقرر:</div>';
      h+='<div class="info-val">'+CD.desc+'</div>';
    } else if(adm){
      h+='<div style="font-size:12px;color:var(--muted);text-align:center;padding:6px">انقر "تعديل المقرر" لإضافة الوصف</div>';
    }
    if(CD.author){
      h+='<div class="info-lbl" style="margin-top:10px">اسم المؤلف:</div>';
      h+='<div class="info-val">'+CD.author+'</div>';
    }
    h+='</div>';
  }

  // 5. التمارين
  h+='<div class="ex-section-title">';
  h+='<span>📝 التمارين'+(exs.length?' <span style="font-size:13px;font-weight:400;color:var(--muted)">('+exs.length+' سؤال)</span>':'')+'</span>';
  if(adm) h+='<button onclick="addEx(\''+lid+'\')" class="chip chip-purple chip-sm">+ إضافة سؤال</button>';
  h+='</div>';

  if(!exs.length){
    h+='<div style="background:var(--white);border-radius:12px;padding:24px;text-align:center;color:var(--muted);border:1px solid var(--border)">';
    h+=(adm?'انقر "+ إضافة سؤال" لإضافة تمارين للدرس':'لم تُضَف تمارين لهذا الدرس بعد');
    h+='</div>';
  } else {
    exs.forEach(function(ex,ei){
      if(ex.visible===false&&!adm)return;
      var sc=scores[lid+'_ex_'+ex.id];
      h+='<div class="ex-card" id="exc-'+ex.id+'">';

      // Admin toolbar
      if(adm){
        h+='<div class="adm-bar"><span class="adm-bar-lbl">🛠</span>';
        h+='<button onclick="eeX(\''+lid+'\',\''+ex.id+'\')" class="chip chip-gold chip-sm">✎ تعديل</button>';
        h+='<button onclick="tEP(\''+lid+'\',\''+ex.id+'\',\'locked\')" class="chip chip-ghost chip-sm">'+(ex.locked?'🔓 فتح':'🔒 قفل')+'</button>';
        h+='<button onclick="tEP(\''+lid+'\',\''+ex.id+'\',\'visible\')" class="chip chip-ghost chip-sm">'+(ex.visible===false?'👁 إظهار':'🚫 إخفاء')+'</button>';
        h+='<button onclick="dEx(\''+lid+'\',\''+ex.id+'\')" class="chip chip-red chip-sm">✕ حذف</button>';
        h+='</div>';
      }

      // Question text
      h+='<div class="ex-q-text">'+(ei+1)+'. '+ex.q;
      if(ex.multi) h+='<span class="multi-tag">متعددة</span>';
      h+='</div>';

      // Options
      h+='<div id="opts-'+ex.id+'">';
      (ex.options||[]).forEach(function(opt,oi){
        var shape=ex.multi?'opt-square':'opt-circle';
        var fn=(ex.locked&&!adm)?'':ex.multi?'tM("'+lid+'","'+ex.id+'",'+oi+')':'aS("'+lid+'","'+ex.id+'",'+oi+')';
        h+='<div class="opt'+(ex.locked&&!adm?' opt-locked':'')+'" id="opt-'+ex.id+'-'+oi+'" onclick="'+fn+'">';
        h+='<div class="'+shape+'" id="chk-'+ex.id+'-'+oi+'"></div>';
        h+=opt+'</div>';
      });
      h+='</div>';
      if(ex.multi) h+='<button onclick="sM("'+lid+'","'+ex.id+'")" class="chip chip-purple chip-sm" style="margin-top:8px" id="sbtn-'+ex.id+'">تأكيد الإجابة</button>';
      if(sc) h+='<div style="margin-top:8px;font-size:13px;font-weight:700;color:'+(sc.correct?'#28a745':'#dc3545')+'">'+(sc.correct?'✓ إجابة صحيحة':'✕ إجابة خاطئة')+'</div>';
      h+='</div>';
    });
  }

  // 6. زر الدرس التالي
  var idx=CD.lessons.findIndex(function(x){return x.id===lid;});
  if(idx>=0&&idx<CD.lessons.length-1){
    var nxt=CD.lessons[idx+1];
    if(nxt.visible||adm){
      h+='<button onclick="oL(\''+nxt.id+'\')" class="next-btn">الدرس التالي: '+nxt.title+' ←</button>';
    }
  }

  document.getElementById('content-area').innerHTML='<div class="content-inner">'+h+'</div>';
  restoreAns(lid);
}

// ══════════════════════════════════════════════
// EXERCISE ANSWERS
// ══════════════════════════════════════════════
var pendM={};
function aS(lid,exId,oi){
  var l=CD.lessons.find(function(x){return x.id===lid;});if(!l)return;
  var ex=l.exercises.find(function(e){return e.id===exId;});if(!ex)return;
  if(scores[lid+'_ex_'+exId])return;
  var ok=ex.answers.indexOf(oi)>=0;
  document.getElementById('opts-'+exId).querySelectorAll('.opt').forEach(function(el,i){
    el.onclick=null;
    if(ex.answers.indexOf(i)>=0)el.classList.add('opt-ok');
    else if(i===oi)el.classList.add('opt-wrong');
  });
  scores[lid+'_ex_'+exId]={correct:ok,chosen:oi};
  saveSc();
}
function tM(lid,exId,oi){
  if(!pendM[exId])pendM[exId]=new Set();
  var s=pendM[exId];
  if(s.has(oi)){s.delete(oi);document.getElementById('chk-'+exId+'-'+oi).textContent='';document.getElementById('opt-'+exId+'-'+oi).classList.remove('opt-sel');}
  else{s.add(oi);document.getElementById('chk-'+exId+'-'+oi).textContent='✓';document.getElementById('opt-'+exId+'-'+oi).classList.add('opt-sel');}
}
function sM(lid,exId){
  var l=CD.lessons.find(function(x){return x.id===lid;});if(!l)return;
  var ex=l.exercises.find(function(e){return e.id===exId;});if(!ex)return;
  var ch=Array.from(pendM[exId]||[]);if(!ch.length){showToast('اختر إجابة','warn');return;}
  var ok=JSON.stringify(ch.sort()+'')==JSON.stringify([...ex.answers].sort()+'');
  document.getElementById('opts-'+exId).querySelectorAll('.opt').forEach(function(el,i){
    el.onclick=null;
    if(ex.answers.indexOf(i)>=0)el.classList.add('opt-ok');
    else if(ch.indexOf(i)>=0)el.classList.add('opt-wrong');
  });
  var btn=document.getElementById('sbtn-'+exId);if(btn)btn.style.display='none';
  scores[lid+'_ex_'+exId]={correct:ok,chosen:ch};
  saveSc();
}
function restoreAns(lid){
  var l=CD.lessons.find(function(x){return x.id===lid;});if(!l)return;
  (l.exercises||[]).forEach(function(ex){
    var sc=scores[lid+'_ex_'+ex.id];if(!sc)return;
    var opts=document.getElementById('opts-'+ex.id);if(!opts)return;
    opts.querySelectorAll('.opt').forEach(function(el,i){
      el.onclick=null;
      if(ex.answers.indexOf(i)>=0)el.classList.add('opt-ok');
      else{var ch=Array.isArray(sc.chosen)?sc.chosen:[sc.chosen];if(ch.indexOf(i)>=0)el.classList.add('opt-wrong');}
    });
    var btn=document.getElementById('sbtn-'+ex.id);if(btn)btn.style.display='none';
  });
}

// ══════════════════════════════════════════════
// TEST ANSWERS
// ══════════════════════════════════════════════
function sTOpt(tid,qId,oi){
  var test=CD.tests.find(function(t){return t.id===tid;});if(!test)return;
  if(!testAns[qId])testAns[qId]=[];testAns[qId]=[oi];
  var q=test.questions.find(function(x){return x.id===qId;});
  (q.options||[]).forEach(function(_,i){
    var el=document.getElementById('topt-'+qId+'-'+i);
    var chk=document.getElementById('tchk-'+qId+'-'+i);
    if(el)el.classList.toggle('opt-sel',i===oi);
    if(chk)chk.textContent=i===oi?'●':'';
  });
}
function tTM(tid,qId,oi){
  if(!testAns[qId])testAns[qId]=[];
  var arr=testAns[qId],idx=arr.indexOf(oi);
  if(idx>=0){arr.splice(idx,1);document.getElementById('topt-'+qId+'-'+oi).classList.remove('opt-sel');document.getElementById('tchk-'+qId+'-'+oi).textContent='';}
  else{arr.push(oi);document.getElementById('topt-'+qId+'-'+oi).classList.add('opt-sel');document.getElementById('tchk-'+qId+'-'+oi).textContent='✓';}
}
async function subTest(tid){
  var t=CD.tests.find(function(x){return x.id===tid;});if(!t)return;
  var qs=t.questions||[];if(!qs.length){showToast('لا توجد أسئلة','warn');return;}
  var sc=0;
  qs.forEach(function(q){
    var ch=testAns[q.id]||[];
    if(JSON.stringify(ch.sort()+'')==JSON.stringify([...(q.answers||[])].sort()+''))sc++;
  });
  scores[tid]={score:sc,total:qs.length,answers:testAns,date:new Date().toISOString()};
  await saveSc();
  oT(tid);
  showToast('نتيجتك: '+sc+'/'+qs.length,sc/qs.length>=0.7?'success':'warn',5000);
}
async function retake(tid){delete scores[tid];testAns={};await saveSc();oT(tid);}

function dStart(id){dragSrc=id;}
async function dDrop(tgt){
  if(!dragSrc||dragSrc===tgt)return;
  var ls=CD.lessons;
  var si=ls.findIndex(function(l){return l.id===dragSrc;});
  var ti=ls.findIndex(function(l){return l.id===tgt;});

async function saveC(){
  try{await db.collection('courses').doc(CID).set(CD,{merge:true});console.log('✅ Saved:',CID);}
  catch(e){showToast('❌ خطأ في الحفظ: '+e.message,'error');console.log('saveC:',e.message);}
}
function ytEmb(url){
  if(!url)return'';if(url.includes('/embed/'))return url;
  var s=url.match(/youtu\.be\/([^?&\s]+)/);if(s)return'https://www.youtube.com/embed/'+s[1]+'?rel=0';
  var w=url.match(/[?&]v=([^&\s]+)/);if(w)return'https://www.youtube.com/embed/'+w[1]+'?rel=0';
  return url;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function locked(){showToast('🔒 هذا الدرس مقفل من قِبل المشرف','warn');}
function toggleSidebar(){
  var sb=document.getElementById('sidebar'),ov=document.getElementById('mob-ov');
  var open=sb.classList.contains('open');
  sb.classList.toggle('open',!open);ov.style.display=open?'none':'';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-ov').style.display='none';
}
function logout(){auth.signOut().then(function(){localStorage.removeItem('ti_user');location.href='index.html';});}
