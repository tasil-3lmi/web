<style>
body{margin:0}
#course-app{display:none}
/* Layout */
.course-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 56px);overflow:hidden}
/* Sidebar */
.sidebar{background:#fff;border-left:1px solid rgba(212,180,142,.18);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 12px;border-bottom:1px solid rgba(212,180,142,.15);flex-shrink:0}
.sidebar-course-title{font-family:'Amiri',serif;font-size:15px;font-weight:700;color:var(--purple);margin-bottom:8px;line-height:1.3}
.progress-bar-wrap{background:rgba(212,180,142,.2);border-radius:10px;height:6px;margin-bottom:5px}
.progress-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .4s}
.progress-text{font-size:11px;color:var(--muted)}
.sidebar-list{flex:1;overflow-y:auto;padding:6px}
/* Lesson row */
.l-row{display:flex;align-items:center;gap:6px;padding:8px 9px;border-radius:10px;margin-bottom:3px;cursor:pointer;border:1.5px solid transparent;transition:.18s;position:relative}
.l-row:hover{background:rgba(59,27,64,.05);border-color:rgba(59,27,64,.15)}
.l-row.active{background:rgba(59,27,64,.08);border-color:var(--purple)}
.l-row.l-done{border-color:rgba(40,167,69,.3);background:rgba(40,167,69,.04)}
.l-row.l-locked{opacity:.5;cursor:not-allowed}
.l-row.l-hidden{opacity:.4}
.l-row.drag-over{border-color:var(--gold)!important;background:rgba(212,180,142,.1)!important}
.l-num{width:22px;height:22px;border-radius:50%;background:rgba(212,180,142,.2);color:var(--gold-d);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.l-num.done-num{background:rgba(40,167,69,.15);color:#28a745}
.l-info{flex:1;min-width:0}
.l-title{font-size:12px;font-weight:700;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.l-badges{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.l-badge{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700}
.l-actions{display:flex;gap:2px;opacity:0;transition:.15s;flex-shrink:0}
.l-row:hover .l-actions{opacity:1}
.l-act-btn{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:.15s}
.drag-handle{cursor:grab;color:var(--muted);opacity:.3;font-size:11px;flex-shrink:0;padding:2px}
.drag-handle:hover{opacity:.8}
/* Test row in sidebar */
.test-row{display:flex;align-items:center;gap:6px;padding:8px 9px;border-radius:10px;margin-bottom:3px;cursor:pointer;border:1.5px solid rgba(212,180,142,.25);transition:.18s;background:rgba(212,180,142,.06)}
.test-row:hover{border-color:var(--gold);background:rgba(212,180,142,.12)}
.test-row.active{border-color:var(--gold-d);background:rgba(212,180,142,.15)}
.sidebar-divider{margin:8px 6px;border:none;border-top:1px dashed rgba(212,180,142,.3)}
/* Content area */
.content{overflow-y:auto;background:var(--bg)}
.content-inner{padding:24px;max-width:860px}
/* Video */
.video-container{position:relative;padding-bottom:56.25%;height:0;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 12px 40px rgba(0,0,0,.25);margin-bottom:20px}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.video-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--purple),var(--purple-l));color:rgba(255,255,255,.7);font-size:13px}
/* Exercise */
.exercise-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid rgba(212,180,142,.2)}
.ex-q{font-size:14px;font-weight:700;color:var(--purple);margin-bottom:12px;line-height:1.6}
.ex-opt{padding:10px 14px;border-radius:10px;border:1.5px solid rgba(212,180,142,.25);margin-bottom:7px;cursor:pointer;font-size:13px;transition:.18s;display:flex;align-items:center;gap:8px}
.ex-opt:hover:not(.locked){border-color:var(--purple);background:rgba(59,27,64,.04)}
.ex-opt.selected{border-color:var(--purple);background:rgba(59,27,64,.07)}
.ex-opt.correct{border-color:#28a745!important;background:rgba(40,167,69,.09)!important;color:#28a745!important}
.ex-opt.wrong  {border-color:#dc3545!important;background:rgba(220,53,69,.08)!important;color:#dc3545!important}
.ex-opt.locked {cursor:not-allowed;opacity:.6}
/* Admin toolbar */
.admin-toolbar{background:rgba(59,27,64,.04);border:1px dashed rgba(59,27,64,.2);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.admin-toolbar span{font-size:11px;font-weight:800;color:var(--purple);opacity:.7}
/* Score display */
.score-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;background:rgba(212,180,142,.15);color:var(--gold-d)}
/* Mobile sidebar toggle */
.mob-sidebar-toggle{display:none;position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--purple);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(59,27,64,.4);z-index:99;align-items:center;justify-content:center;font-size:20px}
@media(max-width:900px){
  .course-layout{grid-template-columns:1fr;grid-template-rows:1fr}
  .sidebar{position:fixed;top:56px;right:0;bottom:0;width:280px;z-index:200;transform:translateX(100%);transition:transform .3s;box-shadow:-8px 0 32px rgba(59,27,64,.15)}
  .sidebar.open{transform:translateX(0)}
  .mob-sidebar-toggle{display:flex}
  .content{height:calc(100vh - 56px)}
}
</style>
</head>
<body>

<!-- Spinner -->
<div id="spinner" class="spinner-overlay"><div class="spin-ring"></div></div>

<!-- Nav -->
<div id="nav-ph"></div>

<div id="course-app">
  <!-- Course header (above layout) -->
  <div id="course-header" style="background:#fff;border-bottom:1px solid rgba(212,180,142,.15);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <a href="courses.html" style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid rgba(212,180,142,.25)">
      ← المقررات
    </a>
    <div id="course-title-display" style="font-family:'Amiri',serif;font-size:17px;font-weight:700;color:var(--purple);flex:1"></div>
    <div id="admin-course-controls" style="display:none;gap:6px;display:none">
      <button onclick="editCourseTitle()" class="btn btn-gold btn-sm">✎ تعديل العنوان</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="course-layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="main-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-course-title" id="sb-title"></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
        <div class="progress-text" id="prog-text">0 / 0 درس مكتمل</div>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div style="text-align:center;padding:30px;color:var(--muted)">جارٍ التحميل...</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="main-content">
      <div class="content-inner">
        <div style="text-align:center;padding:80px 20px;color:var(--muted)">
          <div style="font-size:48px;margin-bottom:12px">📖</div>
          <div style="font-size:15px">اختر درساً من القائمة</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile sidebar toggle -->
  <button class="mob-sidebar-toggle" onclick="toggleMobileSidebar()" id="mob-sb-btn">☰</button>
  <div id="mob-sb-overlay" onclick="closeMobileSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199"></div>
</div>

<!-- Modal -->
<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentUser = null;
let courseData   = null;   // full course object from Firestore
let courseId     = null;
let currentItem  = null;   // {type:'lesson'|'test', id}
let dragSrcId    = null;
let studentScores = {};    // {lessonId: {score, total, answers[]}}

// ── Read URL param ──
const params = new URLSearchParams(location.search);
courseId = params.get('id');
if(!courseId){ location.href = 'courses.html'; }

// ═══════════════════════════════════════
// DEFAULT DATA GENERATORS
// ═══════════════════════════════════════
function makeLessons(cid){
  return Array.from({length:20},(_,i)=>({
    id:`${cid}-l${i+1}`, order:i+1,
    title:`الدرس ${i+1}`,
    visible:true, locked:false,
    youtube:'', exercises:[]
  }));
}
function makeTests(cid, ctitle){
  const make = (n, label) => ({
    id:`${cid}-test${n}`, type:'test', order:20+n,
    title:`${label} — ${ctitle}`,
    visible:true, locked:false,
    questions:[
      {id:'q1',q:`ما موضوع ${ctitle}؟`,multi:false,options:["دراسة شرعية متخصصة","دراسة لغوية","دراسة تاريخية","دراسة فلسفية"],answers:[0]},
      {id:'q2',q:"ما أول خطوة في طلب العلم؟",multi:false,options:["الإخلاص لله","شراء الكتب","البحث في الإنترنت","حضور الدروس"],answers:[0]},
      {id:'q3',q:"ما الهدف من دراسة هذا المقرر؟",multi:false,options:["التعمق في العلم الشرعي","الحصول على شهادة","التفوق على الآخرين","بلا هدف محدد"],answers:[0]},
      {id:'q4',q:"ما منهج المعهد في التدريس؟",multi:false,options:["منهج أهل السنة والجماعة","المنهج العقلاني","المنهج الفلسفي","منهج المتكلمين"],answers:[0]},
      {id:'q5',q:"ما ثمرة العلم الشرعي؟",multi:false,options:["خشية الله والعمل به","الشهرة والمال","الجدل والمناظرة","النجاح الدراسي فقط"],answers:[0]},
    ]
  });
  return [make(1,'اختبار الوحدة الأولى'), make(2,'الاختبار النهائي')];
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
(function(){
  const c = localStorage.getItem('ti_user');
  if(c){ try{ currentUser = JSON.parse(c); }catch(e){} }
})();

auth.onAuthStateChanged(async user => {
  if(!user){ location.href='login.html'; return; }
  if(!currentUser){
    const a = await db.collection('admins').doc(user.uid).get().catch(()=>null);
    if(a?.exists){ currentUser={uid:user.uid,...a.data(),isAdmin:true}; }
    else{
      const u = await db.collection('users').doc(user.uid).get().catch(()=>null);
      if(!u?.exists){ await auth.signOut(); location.href='login.html'; return; }
      currentUser={uid:user.uid,...u.data(),isAdmin:false};
    }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
  }
  await loadCourse();
  initUI();
});

// ═══════════════════════════════════════
// LOAD COURSE
// ═══════════════════════════════════════
async function loadCourse(){
  const snap = await db.collection('courses').doc(courseId).get().catch(()=>null);
  if(snap?.exists){
    courseData = snap.data();
  } else {
    // Build default from KNOWN_COURSES list
    const known = KNOWN_COURSES[courseId];
    if(!known){ toast('المقرر غير موجود','error'); setTimeout(()=>location.href='courses.html',2000); return; }
    courseData = {
      id:courseId, title:known.title, color:known.color||'#3B1B40',
      lessons: makeLessons(courseId),
      tests:   makeTests(courseId, known.title)
    };
    // Save to Firestore
    db.collection('courses').doc(courseId).set(courseData).catch(e=>console.log('Init course:',e.message));
  }
  // Load student scores
  if(!currentUser.isAdmin){
    const scSnap = await db.collection('scores').doc(currentUser.uid+'_'+courseId).get().catch(()=>null);
    if(scSnap?.exists) studentScores = scSnap.data().scores||{};
  }
}

// All known courses
const KNOWN_COURSES = {
  t1:{title:'كتاب "المدخل إلى طلب العلم"',color:"#b8965e"},
  t2:{title:'كتاب "تذكرة السامع والمتكلم"',color:"#a07840"},
  t3:{title:"الجرد القرآني التطبيقي",color:"#8B6914"},
  m1:{title:"القواعد الأربع",color:"#3B1B40"},
  m2:{title:"نواقض الإسلام",color:"#4a2250"},
  m3:{title:"الأصول الثلاثة وأدلتها",color:"#5a2d63"},
  m4:{title:"كشف الشبهات",color:"#3B1B40"},
  m5:{title:"متن الآجرومية في النحو",color:"#1a5276"},
  m6:{title:"التذكرة في علوم الحديث",color:"#1b4f72"},
  m7:{title:"الأرجوزة الميئية في السيرة",color:"#154360"},
  m8:{title:"الرسالة اللطيفة في أصول الفقه",color:"#0e3251"},
  m9:{title:"الأربعون النووية مع زيادات ابن رجب",color:"#1a5276"},
  m10:{title:"مقدمات التفقه",color:"#117a65"},
  m11:{title:"متن الأخضري في العبادات",color:"#0e6655"},
  m12:{title:"متن العشماوية (قراءة سريعة)",color:"#117a65"},
  m13:{title:"نظم ابن أبي كف في أدلة المذهب",color:"#0d5e4a"},
  m14:{title:"نظم المرشد المعين لابن عاشر",color:"#117a65"},
  m15:{title:"منظومة القواعد الفقهية",color:"#0a4d3a"},
  m16:{title:"مقدمة في أصول التفسير",color:"#6e2f0a"},
  m17:{title:"كتاب التوحيد",color:"#7d3410"},
  m18:{title:"القواعد والضوابط السلفية في الأسماء والصفات",color:"#6e2f0a"},
  m19:{title:"العقيدة الواسطية",color:"#8b3c11"},
  m20:{title:"منظومة تبصرة القاصد في علم المقاصد",color:"#512e5f"},
  m21:{title:'كتاب الجامع من "القوانين الفقهية" في الآداب',color:"#5b3068"},
  m22:{title:"السبل المرضية في السياسة الشرعية",color:"#6c3483"},
  m23:{title:"الأمر بالمعروف والنهي عن المنكر",color:"#922b21"},
  m24:{title:"آداب البحث والمناظرة",color:"#a93226"},
  m25:{title:"متن الرد على المخالف",color:"#922b21"},
  m26:{title:"متن الحصانة الفكرية",color:"#b03a2e"},
};

// ═══════════════════════════════════════
// INIT UI
// ═══════════════════════════════════════
function initUI(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('course-app').style.display='';
  document.getElementById('nav-ph').outerHTML = buildNav('courses',currentUser);
  if(typeof setNavUser==='function') setNavUser(currentUser);
  setTimeout(()=>{ if(window.lucide) lucide.createIcons(); },100);

  // Course title
  document.getElementById('course-title-display').textContent = courseData.title;
  document.getElementById('sb-title').textContent = courseData.title;
  document.title = courseData.title + ' — معهد التأصيل العلمي';

  // Admin controls
  if(currentUser.isAdmin){
    const ctrl = document.getElementById('admin-course-controls');
    ctrl.style.display = 'flex';
  }

  renderSidebar();
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
function renderSidebar(){
  const lessons = courseData.lessons||[];
  const tests   = courseData.tests||[];
  const isAdm   = currentUser.isAdmin;
  const done    = (currentUser.completedLessons||[]);
  const completedCount = lessons.filter(l=>done.includes(l.id)).length;
  const pct = lessons.length ? Math.round(completedCount/lessons.length*100) : 0;

  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-text').textContent = completedCount+' / '+lessons.length+' درس مكتمل';

  let rows = '';

  // ── Lessons ──
  const visibleLessons = isAdm ? lessons : lessons.filter(l=>l.visible);
  visibleLessons.forEach(function(l){
    const isDone   = done.includes(l.id);
    const isActive = currentItem && currentItem.type==='lesson' && currentItem.id===l.id;
    const cls = 'l-row'+(isActive?' active':'')+(isDone?' l-done':'')+(l.locked?' l-locked':'')+((!l.visible)?' l-hidden':'');
    const clickFn = (l.locked && !isAdm) ? 'showLocked()' : 'openLesson("'+l.id+'")';

    rows += '<div class="'+cls+'" id="lr-'+l.id+'"';
    rows += ' onclick="'+clickFn+'"';
    rows += ' draggable="'+(isAdm?'true':'false')+'"';
    rows += ' ondragstart="dragStart(''+l.id+'')"';
    rows += ' ondragover="event.preventDefault();this.classList.add('drag-over')"';
    rows += ' ondragleave="this.classList.remove('drag-over')"';
    rows += ' ondrop="event.preventDefault();this.classList.remove('drag-over');dropOn(''+l.id+'')">';

    if(isAdm) rows += '<span class="drag-handle" title="اسحب">⋮⋮</span>';

    rows += '<div class="l-num'+(isDone?' done-num':'')+'">'+(isDone?'✓':l.order)+'</div>';
    rows += '<div class="l-info">';
    rows += '<div class="l-title">'+l.title+'</div>';
    rows += '<div class="l-badges">';
    if(!l.visible) rows += '<span class="l-badge" style="background:rgba(220,53,69,.1);color:#dc3545">مخفي</span>';
    if(l.locked)   rows += '<span class="l-badge" style="background:rgba(255,193,7,.15);color:#856404">🔒</span>';
    if(isDone)     rows += '<span class="l-badge" style="background:rgba(40,167,69,.12);color:#28a745">✓</span>';
    rows += '</div></div>';

    if(isAdm){
      rows += '<div class="l-actions">';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();editLesson(''+l.id+'')" style="background:rgba(212,180,142,.2);color:var(--gold-d)">✎</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();toggleLessonProp(''+l.id+'','visible')" style="background:rgba(59,27,64,.08);color:var(--purple)">'+(l.visible?'👁':'🚫')+'</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();toggleLessonProp(''+l.id+'','locked')" style="background:rgba(255,193,7,.1);color:#856404">'+(l.locked?'🔓':'🔒')+'</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();deleteLesson(''+l.id+'')" style="background:rgba(220,53,69,.1);color:#dc3545">✕</button>';
      rows += '</div>';
    }
    rows += '</div>';
  });

  // ── Add lesson button (admin) ──
  if(isAdm){
    rows += '<button onclick="addLesson()" style="display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:7px;border-radius:10px;border:1.5px dashed rgba(59,27,64,.2);background:none;cursor:pointer;font-family:Zain,sans-serif;font-size:12px;color:var(--muted);margin-top:4px">+ إضافة درس</button>';
  }

  // ── Tests divider ──
  if(tests.length || isAdm){
    rows += '<hr class="sidebar-divider"/>';
    rows += '<div style="font-size:11px;font-weight:800;color:var(--muted);padding:4px 8px;margin-bottom:4px">الاختبارات</div>';
  }

  // ── Test rows ──
  const visibleTests = isAdm ? tests : tests.filter(t=>t.visible);
  visibleTests.forEach(function(t){
    const isActive = currentItem && currentItem.type==='test' && currentItem.id===t.id;
    const score    = studentScores[t.id];
    const clickFn  = (t.locked && !isAdm) ? 'showLocked()' : 'openTest("'+t.id+'")';

    rows += '<div class="test-row'+(isActive?' active':'')+'" id="tr-'+t.id+'" onclick="'+clickFn+'">';
    rows += '<span style="font-size:14px">'+(t.locked?'🔒':'📝')+'</span>';
    rows += '<div class="l-info">';
    rows += '<div class="l-title">'+t.title+'</div>';
    if(score) rows += '<div style="font-size:10px;color:#28a745">✓ '+score.score+'/'+score.total+'</div>';
    if(!t.visible) rows += '<div style="font-size:10px;color:#dc3545">مخفي</div>';
    rows += '</div>';
    if(isAdm){
      rows += '<div style="display:flex;gap:2px">';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();editTest(''+t.id+'')" style="background:rgba(212,180,142,.2);color:var(--gold-d)">✎</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();toggleTestProp(''+t.id+'','visible')" style="background:rgba(59,27,64,.08);color:var(--purple)">'+(t.visible?'👁':'🚫')+'</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();toggleTestProp(''+t.id+'','locked')" style="background:rgba(255,193,7,.1);color:#856404">'+(t.locked?'🔓':'🔒')+'</button>';
      rows += '<button class="l-act-btn" onclick="event.stopPropagation();deleteTest(''+t.id+'')" style="background:rgba(220,53,69,.1);color:#dc3545">✕</button>';
      rows += '</div>';
    }
    rows += '</div>';
  });

  if(isAdm){
    rows += '<button onclick="addTest()" style="display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:7px;border-radius:10px;border:1.5px dashed rgba(212,180,142,.4);background:none;cursor:pointer;font-family:Zain,sans-serif;font-size:12px;color:var(--muted);margin-top:4px">+ إضافة اختبار</button>';
  }

  document.getElementById('sidebar-list').innerHTML = rows;
  if(window.lucide) setTimeout(function(){ lucide.createIcons(); },50);
}

// ═══════════════════════════════════════
// LESSON CONTENT
// ═══════════════════════════════════════
function openLesson(lid){
  const lesson = courseData.lessons.find(function(l){ return l.id===lid; });
  if(!lesson) return;
  currentItem = {type:'lesson', id:lid};
  renderSidebar();
  closeMobileSidebar();

  const isAdm   = currentUser.isAdmin;
  const isDone  = (currentUser.completedLessons||[]).includes(lid);
  const exercises = lesson.exercises||[];

  // Build content using string concatenation to avoid nested backtick issues
  let c = '';

  // Breadcrumb
  c += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">';
  c += '<a href="courses.html" style="color:var(--purple-l);font-weight:700;text-decoration:none">المقررات</a>';
  c += ' ← <a href="course.html?id='+courseId+'" style="color:var(--purple-l);font-weight:700;text-decoration:none">'+courseData.title+'</a>';
  c += ' ← '+lesson.title+'</div>';

  // Title + badges
  c += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
  c += '<div>';
  c += '<h1 style="font-family:Amiri,serif;font-size:22px;color:var(--purple);margin-bottom:6px">'+lesson.title+'</h1>';
  c += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  c += '<span class="badge badge-gold">الدرس '+lesson.order+'</span>';
  if(isDone)         c += '<span class="badge badge-green">✓ مكتمل</span>';
  if(!lesson.visible) c += '<span class="badge badge-red">مخفي</span>';
  if(lesson.locked)  c += '<span class="badge badge-yellow">🔒 مقفل</span>';
  c += '</div></div>';
  c += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  if(isAdm)           c += '<button onclick="editLesson(\''+lid+'\')" class="btn btn-gold btn-sm">✎ تعديل</button>';
  if(!isDone && !lesson.locked) c += '<button onclick="markDone(\''+lid+'\')" class="btn btn-primary btn-sm">✓ تم الإنجاز</button>';
  if(isDone)          c += '<button onclick="unmarkDone(\''+lid+'\')" class="btn btn-ghost btn-sm">↩ إلغاء</button>';
  c += '</div></div>';

  // Video
  c += '<div class="video-container">';
  if(lesson.youtube){
    c += '<iframe src="'+lesson.youtube+'" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>';
  } else {
    c += '<div class="video-empty">';
    c += '<div style="font-size:44px">🎬</div>';
    c += '<div>'+(isAdm?'انقر "تعديل" لإضافة رابط يوتيوب':'لم يُضَف فيديو بعد')+'</div>';
    c += '</div>';
  }
  c += '</div>';

  // Exercises header
  c += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:18px">';
  c += '<h2 style="font-size:16px;font-weight:800;color:var(--purple)">📝 التمارين';
  if(exercises.length) c += ' <span style="font-size:12px;font-weight:400;color:var(--muted)">('+exercises.length+' سؤال)</span>';
  c += '</h2>';
  if(isAdm) c += '<button onclick="addExercise(\''+lid+'\')" class="btn btn-primary btn-sm">+ إضافة سؤال</button>';
  c += '</div>';

  if(!exercises.length){
    c += '<div style="background:#fff;border-radius:12px;padding:24px;text-align:center;color:var(--muted);border:1px solid rgba(212,180,142,.15)">';
    c += isAdm ? 'انقر "+ إضافة سؤال" لإضافة تمارين' : 'لم تُضَف تمارين لهذا الدرس بعد';
    c += '</div>';
  } else {
    exercises.forEach(function(ex, ei){
      if(ex.visible===false && !isAdm) return;
      const exScore = studentScores[lid+'_ex_'+ex.id];

      c += '<div class="exercise-card" id="exc-'+ex.id+'">';
      if(isAdm){
        c += '<div class="admin-toolbar">';
        c += '<span>🛠 المشرف</span>';
        c += '<button onclick="editExercise(\''+lid+'\',\''+ex.id+'\')" class="btn btn-xs btn-gold">✎</button>';
        c += '<button onclick="toggleExProp(\''+lid+'\',\''+ex.id+'\',\'locked\')" class="btn btn-xs btn-ghost">'+(ex.locked?'🔓 فتح':'🔒 قفل')+'</button>';
        c += '<button onclick="toggleExProp(\''+lid+'\',\''+ex.id+'\',\'visible\')" class="btn btn-xs btn-ghost">'+(ex.visible===false?'👁 إظهار':'🚫 إخفاء')+'</button>';
        c += '<button onclick="deleteExercise(\''+lid+'\',\''+ex.id+'\')" class="btn btn-xs btn-danger">✕</button>';
        c += '</div>';
      }

      c += '<div class="ex-q">'+(ei+1)+'. '+ex.q;
      if(ex.multi) c += ' <span style="font-size:10px;background:rgba(59,27,64,.1);color:var(--purple);padding:2px 6px;border-radius:6px">متعددة</span>';
      c += '</div>';

      c += '<div id="opts-'+ex.id+'">';
      const shape = ex.multi ? '4px' : '50%';
      (ex.options||[]).forEach(function(opt,oi){
        const clickFn = ex.locked && !isAdm ? '' : ex.multi
          ? 'toggleMulti(\''+lid+'\',\''+ex.id+'\','+oi+')'
          : 'answerSingle(\''+lid+'\',\''+ex.id+'\','+oi+')';
        c += '<div class="ex-opt'+(ex.locked&&!isAdm?' locked':'')+'" id="opt-'+ex.id+'-'+oi+'" onclick="'+clickFn+'">';
        c += '<span style="width:20px;height:20px;border-radius:'+shape+';border:1.5px solid rgba(212,180,142,.4);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px" id="chk-'+ex.id+'-'+oi+'"></span>';
        c += opt+'</div>';
      });
      c += '</div>';

      if(ex.multi) c += '<button onclick="submitMulti(\''+lid+'\',\''+ex.id+'\')" class="btn btn-primary btn-sm" style="margin-top:8px" id="submit-'+ex.id+'">تأكيد الإجابة</button>';
      if(exScore)  c += '<div class="score-chip" style="margin-top:8px">✓ '+(exScore.correct?'إجابة صحيحة':'إجابة خاطئة')+'</div>';
      c += '</div>';
    });
  }

  document.getElementById('main-content').innerHTML = '<div class="content-inner">'+c+'</div>';
  if(window.lucide) setTimeout(function(){ lucide.createIcons(); },50);
  restoreAnswers(lid);
}

function openTest(tid){
  const test = courseData.tests.find(function(t){ return t.id===tid; });
  if(!test) return;
  currentItem = {type:'test', id:tid};
  renderSidebar();
  closeMobileSidebar();

  const isAdm    = currentUser.isAdmin;
  const prevScore = studentScores[tid];
  const qs       = test.questions||[];
  testAnswers    = {};

  let c = '';

  // Breadcrumb
  c += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">';
  c += '<a href="courses.html" style="color:var(--purple-l);font-weight:700;text-decoration:none">المقررات</a>';
  c += ' ← <a href="course.html?id='+courseId+'" style="color:var(--purple-l);font-weight:700;text-decoration:none">'+courseData.title+'</a>';
  c += ' ← '+test.title+'</div>';

  // Header
  c += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
  c += '<h1 style="font-family:Amiri,serif;font-size:20px;color:var(--purple)">'+test.title+'</h1>';
  c += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  if(isAdm){
    c += '<button onclick="editTest(\''+tid+'\')" class="btn btn-gold btn-sm">✎ تعديل</button>';
    c += '<button onclick="addTestQuestion(\''+tid+'\')" class="btn btn-primary btn-sm">+ إضافة سؤال</button>';
  }
  if(prevScore) c += '<span class="score-chip">نتيجتك: '+prevScore.score+'/'+prevScore.total+' ('+Math.round(prevScore.score/prevScore.total*100)+'%)</span>';
  c += '</div></div>';

  // Previous result
  if(prevScore && !isAdm){
    const pct = Math.round(prevScore.score/prevScore.total*100);
    c += '<div style="background:#fff;border-radius:16px;padding:24px;border:1px solid rgba(212,180,142,.2);text-align:center;margin-bottom:20px">';
    c += '<div style="font-size:48px;margin-bottom:10px">'+(pct>=70?'🎉':'📚')+'</div>';
    c += '<div style="font-family:Amiri,serif;font-size:28px;font-weight:700;color:var(--purple)">'+prevScore.score+' / '+prevScore.total+'</div>';
    c += '<div style="font-size:14px;color:var(--muted);margin-top:4px">'+pct+'% — '+(pct>=70?'أحسنت! لقد اجتزت الاختبار':'راجع الدروس وحاول مجدداً')+'</div>';
    c += '<button onclick="retakeTest(\''+tid+'\')" class="btn btn-ghost btn-sm" style="margin-top:14px">↩ إعادة الاختبار</button>';
    c += '</div>';
  }

  // No questions
  if(!qs.length){
    c += '<div style="background:#fff;border-radius:12px;padding:30px;text-align:center;color:var(--muted);border:1px solid rgba(212,180,142,.15)">';
    c += isAdm ? 'انقر "+ إضافة سؤال" لإضافة أسئلة الاختبار' : 'لم تُضَف أسئلة بعد';
    c += '</div>';
  } else if(!prevScore || isAdm){
    // Show questions
    qs.forEach(function(q,qi){
      c += '<div class="exercise-card" id="tq-'+q.id+'">';
      if(isAdm){
        c += '<div class="admin-toolbar"><span>🛠 المشرف</span>';
        c += '<button onclick="editTestQuestion(\''+tid+'\',\''+q.id+'\')" class="btn btn-xs btn-gold">✎</button>';
        c += '<button onclick="deleteTestQuestion(\''+tid+'\',\''+q.id+'\')" class="btn btn-xs btn-danger">✕</button>';
        c += '</div>';
      }
      c += '<div class="ex-q">'+(qi+1)+'. '+q.q;
      if(q.multi) c += ' <span style="font-size:10px;background:rgba(59,27,64,.1);color:var(--purple);padding:2px 6px;border-radius:6px">متعددة</span>';
      c += '</div>';
      c += '<div id="topts-'+q.id+'">';
      const shape = q.multi?'4px':'50%';
      (q.options||[]).forEach(function(opt,oi){
        const fn = q.multi
          ? 'toggleTMulti(\''+tid+'\',\''+q.id+'\','+oi+')'
          : 'selectTOpt(\''+tid+'\',\''+q.id+'\','+oi+')';
        c += '<div class="ex-opt" id="topt-'+q.id+'-'+oi+'" onclick="'+fn+'">';
        c += '<span style="width:20px;height:20px;border-radius:'+shape+';border:1.5px solid rgba(212,180,142,.4);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px" id="tchk-'+q.id+'-'+oi+'"></span>';
        c += opt+'</div>';
      });
      c += '</div>';
      c += '</div>';
    });
    if(!prevScore){
      c += '<div style="text-align:center;margin-top:20px">';
      c += '<button onclick="submitTest(\''+tid+'\')" class="btn btn-primary" style="padding:12px 36px;font-size:15px">تسليم الاختبار</button>';
      c += '</div>';
    }
  }

  document.getElementById('main-content').innerHTML = '<div class="content-inner">'+c+'</div>';
  if(window.lucide) setTimeout(function(){ lucide.createIcons(); },50);
}
