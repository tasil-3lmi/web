<style>
:root{--purple:#3B1B40;--purple-l:#5a2d63;--gold:#D4B48E;--gold-d:#b8965e;--bg:#faf8f5;--muted:#7a6a7e}
body{margin:0;font-family:'Zain','Segoe UI',sans-serif}
#app{display:none}

/* ══ MAIN LAYOUT ══ */
.course-wrap{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 56px);gap:0}

/* ══ LEFT: CONTENT ══ */
.c-content{overflow-y:auto;background:var(--bg);padding:24px 28px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;margin-bottom:14px;padding:5px 12px;border-radius:8px;border:1px solid rgba(212,180,142,.25);background:#fff;transition:.2s}
.back-link:hover{color:var(--purple);border-color:var(--purple)}

/* Course header */
.course-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.course-title{font-family:'Amiri',serif;font-size:26px;font-weight:700;color:var(--purple)}
.course-desc{font-size:14px;color:var(--muted);margin-top:4px;line-height:1.7}
.course-author{font-size:13px;color:#4a3a50;margin-top:3px;font-weight:600}

/* Lesson name bar */
.lesson-name-bar{background:#fff;border-radius:14px;padding:14px 18px;border:1px solid rgba(212,180,142,.2);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.lesson-name-text{font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--purple)}
.lesson-order-badge{font-size:12px;color:var(--muted);background:rgba(212,180,142,.15);padding:3px 10px;border-radius:10px;font-weight:700}

/* Video box */
.video-box{background:#fff;border-radius:14px;overflow:hidden;border:2px solid var(--purple);margin-bottom:14px;box-shadow:0 6px 24px rgba(59,27,64,.12)}
.video-ratio{position:relative;padding-bottom:56.25%;height:0}
.video-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-empty-box{background:linear-gradient(135deg,var(--purple),var(--purple-l));padding:48px 24px;text-align:center;color:rgba(255,255,255,.75);font-size:14px}

/* Action row below video */
.action-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.act-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;border:none;font-family:'Zain',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.act-btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.act-btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--purple)}
.act-btn-green{background:linear-gradient(135deg,#28a745,#218838);color:#fff}
.act-btn-ghost{background:#fff;color:var(--muted);border:1.5px solid rgba(212,180,142,.35)}
.act-btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.act-btn-red{background:rgba(220,53,69,.1);color:#dc3545}
.act-btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* Course info section */
.info-section{background:#fff;border-radius:14px;padding:18px;border:1px solid rgba(212,180,142,.18);margin-bottom:16px}
.info-label{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:5px}
.info-value{font-size:14px;color:#1a0a1e;line-height:1.7}

/* Exercises */
.exercises-section{margin-top:4px}
.exercises-title{font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--purple);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.exercise-box{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:2px solid var(--purple);box-shadow:0 4px 14px rgba(59,27,64,.08)}
.ex-question{font-size:15px;font-weight:700;color:var(--purple);margin-bottom:14px;line-height:1.6}
.ex-multi-tag{font-size:10px;background:rgba(59,27,64,.1);color:var(--purple);padding:2px 7px;border-radius:6px;font-weight:700;margin-right:6px}
.ex-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid rgba(212,180,142,.3);margin-bottom:8px;cursor:pointer;font-size:14px;transition:.18s}
.ex-option:hover:not(.ex-locked){border-color:var(--purple);background:rgba(59,27,64,.04)}
.ex-option.ex-selected{border-color:var(--purple);background:rgba(59,27,64,.07)}
.ex-option.ex-correct{border-color:#28a745!important;background:rgba(40,167,69,.09)!important;color:#28a745!important}
.ex-option.ex-wrong{border-color:#dc3545!important;background:rgba(220,53,69,.08)!important;color:#dc3545!important}
.ex-option.ex-locked{cursor:not-allowed;opacity:.55}
.ex-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(212,180,142,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.ex-square{width:20px;height:20px;border-radius:4px;border:1.5px solid rgba(212,180,142,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.admin-bar{background:rgba(59,27,64,.04);border:1px dashed rgba(59,27,64,.18);border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.admin-bar-label{font-size:11px;font-weight:800;color:var(--purple);opacity:.6;margin-left:4px}

/* ══ RIGHT: SIDEBAR ══ */
.c-sidebar{background:#fff;border-right:1px solid rgba(212,180,142,.18);overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.sb-header{padding:14px 14px 10px;border-bottom:1px solid rgba(212,180,142,.14)}
.sb-course-title{font-family:'Amiri',serif;font-size:14px;font-weight:700;color:var(--purple);margin-bottom:6px;line-height:1.4}
.sb-prog-wrap{background:rgba(212,180,142,.2);border-radius:8px;height:5px;margin-bottom:4px}
.sb-prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .4s}
.sb-prog-text{font-size:11px;color:var(--muted)}
.sb-list{padding:8px}
.sb-row{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:10px;margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:.18s;background:var(--bg)}
.sb-row:hover{border-color:rgba(59,27,64,.18);background:rgba(59,27,64,.04)}
.sb-row.sb-active{border-color:var(--purple);background:rgba(59,27,64,.08)}
.sb-row.sb-done{border-color:rgba(40,167,69,.3);background:rgba(40,167,69,.04)}
.sb-row.sb-locked{opacity:.5;cursor:not-allowed}
.sb-row.sb-hidden-row{opacity:.45}
.sb-row.sb-drag-over{border-color:var(--gold)!important;background:rgba(212,180,142,.12)!important}
.sb-num{width:24px;height:24px;border-radius:50%;background:rgba(212,180,142,.2);color:var(--gold-d);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-num.sb-done-num{background:rgba(40,167,69,.15);color:#28a745}
.sb-info{flex:1;min-width:0}
.sb-title{font-size:12px;font-weight:700;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-tags{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.sb-tag{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:700}
.sb-acts{display:none;gap:2px;flex-shrink:0}
.sb-row:hover .sb-acts{display:flex}
.sb-act{width:22px;height:22px;border-radius:6px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.drag-handle{cursor:grab;color:var(--muted);opacity:.3;font-size:12px;flex-shrink:0}
.drag-handle:hover{opacity:.8}
.sb-test-row{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:10px;margin-bottom:4px;cursor:pointer;border:1.5px solid rgba(212,180,142,.25);background:rgba(212,180,142,.07);transition:.18s}
.sb-test-row:hover{border-color:var(--gold-d);background:rgba(212,180,142,.14)}
.sb-test-row.sb-active{border-color:var(--gold-d);background:rgba(212,180,142,.18)}
.sb-divider{margin:8px 6px;border:none;border-top:1px dashed rgba(212,180,142,.3)}
.sb-section-label{font-size:11px;font-weight:800;color:var(--muted);padding:3px 8px;margin-bottom:4px}

/* Mobile sidebar toggle */
.mob-sb-btn{display:none;position:fixed;bottom:20px;right:16px;width:46px;height:46px;border-radius:50%;background:var(--purple);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(59,27,64,.4);z-index:99;font-size:20px;align-items:center;justify-content:center}

/* Test result card */
.result-card{background:#fff;border-radius:16px;padding:28px;text-align:center;border:1px solid rgba(212,180,142,.2);margin-bottom:20px}

/* Spinner */
.spinner-ov{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:44px;height:44px;border:4px solid rgba(59,27,64,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}

@media(max-width:900px){
  .course-wrap{grid-template-columns:1fr}
  .c-sidebar{position:fixed;top:56px;right:0;bottom:0;width:280px;z-index:200;transform:translateX(100%);transition:transform .3s;box-shadow:-8px 0 32px rgba(59,27,64,.15)}
  .c-sidebar.sb-open{transform:translateX(0)}
  .mob-sb-btn{display:flex}
}
@media(max-width:600px){.c-content{padding:16px 14px}}
</style>
</head>
<body>

<div id="spinner" class="spinner-ov"><div class="spin-ring"></div></div>
<div id="app">
  <div id="nav-ph"></div>

  <!-- Course top bar -->
  <div id="course-topbar" style="background:#fff;border-bottom:1px solid rgba(212,180,142,.15);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-height:44px">
    <a href="courses.html" class="back-link" style="margin-bottom:0">← المقررات</a>
    <span id="topbar-title" style="font-family:'Amiri',serif;font-size:16px;font-weight:700;color:var(--purple);flex:1"></span>
    <div id="admin-topbar-acts" style="display:none;gap:6px">
      <button onclick="editCourseInfo()" class="act-btn act-btn-gold act-btn-sm">✎ تعديل المقرر</button>
    </div>
  </div>

  <div class="course-wrap">
    <!-- LEFT CONTENT -->
    <div class="c-content" id="main-content">
      <div style="text-align:center;padding:80px 20px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:12px">📖</div>
        <div style="font-size:15px;font-weight:600">اختر درساً من القائمة على اليمين</div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="c-sidebar" id="c-sidebar">
      <div class="sb-header">
        <div class="sb-course-title" id="sb-title">جارٍ التحميل...</div>
        <div class="sb-prog-wrap"><div class="sb-prog-fill" id="sb-prog" style="width:0%"></div></div>
        <div class="sb-prog-text" id="sb-prog-text">0 / 0</div>
      </div>
      <div class="sb-list" id="sb-list">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">جارٍ التحميل...</div>
      </div>
    </div>
  </div>

  <!-- Mobile sidebar overlay -->
  <div id="mob-sb-ov" onclick="closeSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199"></div>
  <button class="mob-sb-btn" onclick="toggleSidebar()">☰</button>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
var currentUser=null, courseData=null, courseId=null, currentItem=null, dragSrc=null, studentScores={};
var testAnswers={};

var params=new URLSearchParams(location.search);
courseId=params.get('id');
if(!courseId){location.href='courses.html';}

// ── Instant cache ──
(function(){
  var c=localStorage.getItem('ti_user');
  if(c){try{currentUser=JSON.parse(c);}catch(e){}}
})();

auth.onAuthStateChanged(async function(user){
  if(!user){localStorage.removeItem('ti_user');location.href='login.html';return;}
  if(!currentUser){
    var a=await db.collection('admins').doc(user.uid).get().catch(function(){return null;});
    if(a&&a.exists){currentUser={uid:user.uid,...a.data(),isAdmin:true};}
    else{
      var u=await db.collection('users').doc(user.uid).get().catch(function(){return null;});
      if(!u||!u.exists){await auth.signOut();location.href='login.html';return;}
      currentUser={uid:user.uid,...u.data(),isAdmin:false};
    }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
  }
  await loadCourse();
  initUI();
});

// ══════════════════════════════════════════════
// KNOWN COURSES
// ══════════════════════════════════════════════
var KNOWN={
  t1:{title:'كتاب "المدخل إلى طلب العلم"',color:'#b8965e'},
  t2:{title:'كتاب "تذكرة السامع والمتكلم"',color:'#a07840'},
  t3:{title:'الجرد القرآني التطبيقي',color:'#8B6914'},
  m1:{title:'القواعد الأربع',color:'#3B1B40'},
  m2:{title:'نواقض الإسلام',color:'#4a2250'},
  m3:{title:'الأصول الثلاثة وأدلتها',color:'#5a2d63'},
  m4:{title:'كشف الشبهات',color:'#3B1B40'},
  m5:{title:'متن الآجرومية في النحو',color:'#1a5276'},
  m6:{title:'التذكرة في علوم الحديث',color:'#1b4f72'},
  m7:{title:'الأرجوزة الميئية في السيرة',color:'#154360'},
  m8:{title:'الرسالة اللطيفة في أصول الفقه',color:'#0e3251'},
  m9:{title:'الأربعون النووية مع زيادات ابن رجب',color:'#1a5276'},
  m10:{title:'مقدمات التفقه',color:'#117a65'},
  m11:{title:'متن الأخضري في العبادات',color:'#0e6655'},
  m12:{title:'متن العشماوية (قراءة سريعة)',color:'#117a65'},
  m13:{title:'نظم ابن أبي كف في أدلة المذهب',color:'#0d5e4a'},
  m14:{title:'نظم المرشد المعين لابن عاشر',color:'#117a65'},
  m15:{title:'منظومة القواعد الفقهية',color:'#0a4d3a'},
  m16:{title:'مقدمة في أصول التفسير',color:'#6e2f0a'},
  m17:{title:'كتاب التوحيد',color:'#7d3410'},
  m18:{title:'القواعد والضوابط السلفية في الأسماء والصفات',color:'#6e2f0a'},
  m19:{title:'العقيدة الواسطية',color:'#8b3c11'},
  m20:{title:'منظومة تبصرة القاصد في المقاصد',color:'#512e5f'},
  m21:{title:'كتاب الجامع في الآداب',color:'#5b3068'},
  m22:{title:'السبل المرضية في السياسة الشرعية',color:'#6c3483'},
  m23:{title:'الأمر بالمعروف والنهي عن المنكر',color:'#922b21'},
  m24:{title:'آداب البحث والمناظرة',color:'#a93226'},
  m25:{title:'متن الرد على المخالف',color:'#922b21'},
  m26:{title:'متن الحصانة الفكرية',color:'#b03a2e'}
};

function makeLessons(cid){
  return Array.from({length:20},function(_,i){
    return {id:cid+'-l'+(i+1),order:i+1,title:'الدرس '+(i+1),visible:true,locked:false,youtube:'',exercises:[]};
  });
}
function makeTests(cid,ctitle){
  var qs=[
    {id:'q1',q:'ما موضوع '+ctitle+'؟',multi:false,options:['دراسة شرعية متخصصة','دراسة لغوية','دراسة تاريخية','دراسة فلسفية'],answers:[0]},
    {id:'q2',q:'ما أول خطوة في طلب العلم؟',multi:false,options:['الإخلاص لله','شراء الكتب','البحث في الإنترنت','حضور الدروس'],answers:[0]},
    {id:'q3',q:'ما منهج المعهد في التدريس؟',multi:false,options:['منهج أهل السنة والجماعة','المنهج العقلاني','المنهج الفلسفي','منهج المتكلمين'],answers:[0]},
    {id:'q4',q:'ما ثمرة العلم الشرعي؟',multi:false,options:['خشية الله والعمل به','الشهرة والمال','الجدل','النجاح الدراسي فقط'],answers:[0]},
    {id:'q5',q:'ما الهدف من دراسة هذا المقرر؟',multi:false,options:['التعمق في العلم الشرعي','الحصول على شهادة','التفوق','بلا هدف'],answers:[0]}
  ];
  return [
    {id:cid+'-test1',title:'اختبار الوحدة الأولى — '+ctitle,visible:true,locked:false,questions:qs},
    {id:cid+'-test2',title:'الاختبار النهائي — '+ctitle,visible:true,locked:false,questions:qs.map(function(q){return Object.assign({},q,{id:q.id+'b'});})}
  ];
}

// ══════════════════════════════════════════════
// LOAD COURSE
// ══════════════════════════════════════════════
async function loadCourse(){
  var snap=await db.collection('courses').doc(courseId).get().catch(function(){return null;});
  if(snap&&snap.exists){
    courseData=snap.data();
  } else {
    var known=KNOWN[courseId];
    if(!known){showToast('المقرر غير موجود','error');setTimeout(function(){location.href='courses.html';},2e3);return;}
    courseData={id:courseId,title:known.title,color:known.color||'#3B1B40',desc:'',author:'',
      lessons:makeLessons(courseId),tests:makeTests(courseId,known.title)};
    db.collection('courses').doc(courseId).set(courseData).catch(function(e){console.log('init:',e.message);});
  }
  if(!courseData.lessons||!courseData.lessons.length) courseData.lessons=makeLessons(courseId);
  if(!courseData.tests||!courseData.tests.length)     courseData.tests=makeTests(courseId,courseData.title);
  if(!currentUser.isAdmin){
    var sc=await db.collection('scores').doc(currentUser.uid+'_'+courseId).get().catch(function(){return null;});
    if(sc&&sc.exists) studentScores=sc.data().scores||{};
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function initUI(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav('courses',currentUser);
  if(typeof setNavUser==='function')setNavUser(currentUser);
  setTimeout(function(){if(window.lucide)lucide.createIcons();},100);
  document.getElementById('topbar-title').textContent=courseData.title;
  document.getElementById('sb-title').textContent=courseData.title;
  document.title=courseData.title+' — معهد التأصيل العلمي';
  if(currentUser.isAdmin) document.getElementById('admin-topbar-acts').style.display='flex';
  buildSidebar();
}

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
function buildSidebar(){
  var lessons=courseData.lessons||[];
  var tests=courseData.tests||[];
  var isAdm=currentUser.isAdmin;
  var done=currentUser.completedLessons||[];
  var doneCount=lessons.filter(function(l){return done.indexOf(l.id)>=0;}).length;
  var pct=lessons.length?Math.round(doneCount/lessons.length*100):0;
  document.getElementById('sb-prog').style.width=pct+'%';
  document.getElementById('sb-prog-text').textContent=doneCount+' / '+lessons.length+' درس مكتمل';

  var rows='';
  var vis=isAdm?lessons:lessons.filter(function(l){return l.visible;});
  vis.forEach(function(l){
    var isDone=done.indexOf(l.id)>=0;
    var isAct=currentItem&&currentItem.type==='lesson'&&currentItem.id===l.id;

  document.getElementById('main-content').innerHTML='<div style="padding:20px 24px;max-width:820px">'+c+'</div>';

}

// ══════════════════════════════════════════════
// EXERCISE ANSWERS
// ══════════════════════════════════════════════
var pendingMulti={};
function ansS(lid,exId,oi){
  var l=courseData.lessons.find(function(x){return x.id===lid;});if(!l)return;
  var ex=l.exercises.find(function(e){return e.id===exId;});if(!ex)return;
  if(studentScores[lid+'_ex_'+exId])return;
  var ok=ex.answers.indexOf(oi)>=0;
  var opts=document.getElementById('opts-'+exId);if(!opts)return;
  opts.querySelectorAll('.ex-option').forEach(function(el,i){
    el.onclick=null;
    if(ex.answers.indexOf(i)>=0)el.classList.add('ex-correct');
    else if(i===oi)el.classList.add('ex-wrong');
  });
  studentScores[lid+'_ex_'+exId]={correct:ok,chosen:oi,exId:exId};
  saveScores();
}
function togM(lid,exId,oi){
  if(!pendingMulti[exId])pendingMulti[exId]=new Set();
  var s=pendingMulti[exId];
  if(s.has(oi)){s.delete(oi);document.getElementById('chk-'+exId+'-'+oi).textContent='';document.getElementById('opt-'+exId+'-'+oi).classList.remove('ex-selected');}
  else{s.add(oi);document.getElementById('chk-'+exId+'-'+oi).textContent='✓';document.getElementById('opt-'+exId+'-'+oi).classList.add('ex-selected');}
}
function subM(lid,exId){
  var l=courseData.lessons.find(function(x){return x.id===lid;});if(!l)return;
  var ex=l.exercises.find(function(e){return e.id===exId;});if(!ex)return;
  var chosen=Array.from(pendingMulti[exId]||[]);
  if(!chosen.length){showToast('اختر إجابة','warn');return;}
  var ok=JSON.stringify(chosen.sort()+'')===JSON.stringify([...ex.answers].sort()+'');
  document.querySelectorAll('#opts-'+exId+' .ex-option').forEach(function(el,i){
    el.onclick=null;
    if(ex.answers.indexOf(i)>=0)el.classList.add('ex-correct');
    else if(chosen.indexOf(i)>=0)el.classList.add('ex-wrong');
  });
  var btn=document.getElementById('sbtn-'+exId);if(btn)btn.style.display='none';
  studentScores[lid+'_ex_'+exId]={correct:ok,chosen:chosen,exId:exId};
  saveScores();
}
function restoreAnswers(lid){
  var l=courseData.lessons.find(function(x){return x.id===lid;});if(!l)return;
  (l.exercises||[]).forEach(function(ex){
    var sc=studentScores[lid+'_ex_'+ex.id];if(!sc)return;
    var opts=document.getElementById('opts-'+ex.id);if(!opts)return;
    opts.querySelectorAll('.ex-option').forEach(function(el,i){
      el.onclick=null;
      if(ex.answers.indexOf(i)>=0)el.classList.add('ex-correct');
      else{var ch=Array.isArray(sc.chosen)?sc.chosen:[sc.chosen];if(ch.indexOf(i)>=0)el.classList.add('ex-wrong');}
    });
    var btn=document.getElementById('sbtn-'+ex.id);if(btn)btn.style.display='none';
  });
}

// ══════════════════════════════════════════════
// TEST ANSWERS
// ══════════════════════════════════════════════
function selTO(tid,qId,oi){
  var test=courseData.tests.find(function(t){return t.id===tid;});if(!test)return;
  if(!testAnswers[qId])testAnswers[qId]=[];
  testAnswers[qId]=[oi];
  var q=test.questions.find(function(x){return x.id===qId;});
  (q.options||[]).forEach(function(_,i){
    var el=document.getElementById('topt-'+qId+'-'+i);
    var chk=document.getElementById('tchk-'+qId+'-'+i);
    if(el)el.classList.toggle('ex-selected',i===oi);
    if(chk)chk.textContent=i===oi?'●':'';
  });
}
function togTM(tid,qId,oi){
  if(!testAnswers[qId])testAnswers[qId]=[];
  var arr=testAnswers[qId],idx=arr.indexOf(oi);
  if(idx>=0){arr.splice(idx,1);document.getElementById('topt-'+qId+'-'+oi).classList.remove('ex-selected');document.getElementById('tchk-'+qId+'-'+oi).textContent='';}
  else{arr.push(oi);document.getElementById('topt-'+qId+'-'+oi).classList.add('ex-selected');document.getElementById('tchk-'+qId+'-'+oi).textContent='✓';}
}
async function submitTest(tid){
  var test=courseData.tests.find(function(t){return t.id===tid;});if(!test)return;
  var qs=test.questions||[];if(!qs.length){showToast('لا توجد أسئلة','warn');return;}
  var score=0;
  qs.forEach(function(q){
    var chosen=testAnswers[q.id]||[];
    if(JSON.stringify(chosen.sort()+'')===JSON.stringify([...(q.answers||[])].sort()+''))score++;
  });
  studentScores[tid]={score:score,total:qs.length,answers:testAnswers,date:new Date().toISOString()};
  await saveScores();
  openTest(tid);
  showToast('نتيجتك: '+score+'/'+qs.length,score/qs.length>=0.7?'success':'warn',5000);
}
async function retakeTest(tid){delete studentScores[tid];testAnswers={};await saveScores();openTest(tid);}

// ══════════════════════════════════════════════
// DONE / SCORES
// ══════════════════════════════════════════════
async function markDone(lid){
  var list=[...(currentUser.completedLessons||[])];
  if(list.indexOf(lid)<0)list.push(lid);
  currentUser.completedLessons=list;
  localStorage.setItem('ti_user',JSON.stringify(currentUser));
  try{await db.collection('users').doc(currentUser.uid).update({completedLessons:list});}catch(e){}
  showToast('✓ تم تسجيل الإنجاز','success');
  buildSidebar();openLesson(lid);
}
async function unmarkDone(lid){
  var list=(currentUser.completedLessons||[]).filter(function(x){return x!==lid;});
  currentUser.completedLessons=list;
  localStorage.setItem('ti_user',JSON.stringify(currentUser));
  try{await db.collection('users').doc(currentUser.uid).update({completedLessons:list});}catch(e){}
  buildSidebar();openLesson(lid);
}
async function saveScores(){
  if(currentUser.isAdmin)return;

// ══════════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════════
function dragStart(id){dragSrc=id;}
async function dropOn(targetId){
  if(!dragSrc||dragSrc===targetId)return;
  var ls=courseData.lessons,si=ls.findIndex(function(l){return l.id===dragSrc;}),ti=ls.findIndex(function(l){return l.id===targetId;});
  var moved=ls.splice(si,1)[0];ls.splice(ti,0,moved);
  ls.forEach(function(l,i){l.order=i+1;});
  dragSrc=null;await saveCourse();buildSidebar();showToast('✓ تم إعادة الترتيب','info');
}

async function saveNewEx(lid){
  var q=document.getElementById('exq').value.trim();if(!q){showToast('يرجى كتابة السؤال','warn');return;}
  var opts=document.getElementById('exo').value.split('\n').map(function(x){return x.trim();}).filter(Boolean);
  if(opts.length<2){showToast('أدخل خيارَين على الأقل','warn');return;}
  var ans=document.getElementById('exa').value.split(',').map(function(x){return parseInt(x.trim());}).filter(function(x){return!isNaN(x);});
  var multi=document.getElementById('exm').checked;
  var l=courseData.lessons.find(function(x){return x.id===lid;});if(!l)return;
  if(!l.exercises)l.exercises=[];
  l.exercises.push({id:'ex-'+Date.now().toString(36),q:q,options:opts,answers:ans,multi:multi,visible:true,locked:false});
  await saveCourse();closeModal();showToast('✅ تم إضافة التمرين','success');openLesson(lid);
}

// ══════════════════════════════════════════════
// SAVE / HELPERS
// ══════════════════════════════════════════════
async function saveCourse(){
  try{await db.collection('courses').doc(courseId).set(courseData,{merge:true});}
  catch(e){showToast('خطأ في الحفظ: '+e.message,'error');console.log('save:',e.message);}
}
function showLocked(){showToast('🔒 هذا الدرس مقفل من قِبل المشرف','warn');}
function toYtEmbed(url){
  if(!url)return'';
  if(url.includes('/embed/'))return url;
  var s=url.match(/youtu\.be\/([^?&\s]+)/);if(s)return'https://www.youtube.com/embed/'+s[1]+'?rel=0';
  var w=url.match(/[?&]v=([^&\s]+)/);if(w)return'https://www.youtube.com/embed/'+w[1]+'?rel=0';
  return url;
}
function toggleSidebar(){
  var sb=document.getElementById('c-sidebar'),ov=document.getElementById('mob-sb-ov');
  var open=sb.classList.contains('sb-open');
  sb.classList.toggle('sb-open',!open);ov.style.display=open?'none':'';
}
function closeSidebar(){
  document.getElementById('c-sidebar').classList.remove('sb-open');
  document.getElementById('mob-sb-ov').style.display='none';
}
function logout(){auth.signOut().then(function(){localStorage.removeItem('ti_user');location.href='index.html';});}
function toast(m,t,d){showToast(m,t,d);}
function btn(){return'<button style="flex:1" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>';}
