<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التسجيل — معهد التأصيل العلمي</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .register-page {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--white) 0%, rgba(212,180,142,0.06) 50%, rgba(59,27,64,0.03) 100%);
      padding: 120px 0 80px;
    }
    .register-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .register-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .register-header img { width: 80px; height: 80px; object-fit: contain; margin: 0 auto 16px; display: block; }
    .register-header h1 { font-size: 1.8rem; color: var(--purple); margin-bottom: 8px; }
    .register-header p { color: var(--text-soft); font-size: 0.92rem; }

    .register-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* Role Switcher */
    .role-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(59,27,64,0.04);
      border-bottom: 1px solid var(--border);
    }
    .role-btn {
      padding: 18px;
      text-align: center;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      color: var(--text-soft);
      background: none;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      border-bottom: 3px solid transparent;
    }
    .role-btn.active {
      color: var(--purple);
      background: var(--white);
      border-bottom-color: var(--purple);
    }
    .role-btn .role-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }

    .register-body { padding: 36px; }

    /* Inner Tabs (for student: new account / login) */
    .inner-tabs { display: flex; gap: 0; margin-bottom: 28px; background: rgba(59,27,64,0.05); border-radius: 100px; padding: 4px; }
    .inner-tab {
      flex: 1; padding: 10px; text-align: center;
      font-family: inherit; font-size: 0.88rem; font-weight: bold;
      background: none; border: none; border-radius: 100px;
      cursor: pointer; transition: var(--transition); color: var(--text-soft);
    }
    .inner-tab.active { background: var(--white); color: var(--purple); box-shadow: 0 2px 8px rgba(59,27,64,0.1); }

    /* Form Grid */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    .form-grid .form-group { grid-column: span 1; }
    .form-grid .full { grid-column: span 2; }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px;
    }
    .submit-btn:hover { background: var(--purple-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,27,64,0.3); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider-text {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-soft);
      margin: 20px 0;
      position: relative;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px; background: var(--border);
    }
    .divider-text::before { right: 0; }
    .divider-text::after { left: 0; }

    .switch-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: 16px;
    }
    .switch-link a { color: var(--purple); font-weight: bold; text-decoration: underline; cursor: pointer; }

    /* Radio group */
    .radio-group { display: flex; gap: 16px; }
    .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .radio-item input { accent-color: var(--purple); width: 16px; height: 16px; }
    .radio-item label { font-size: 0.9rem; color: var(--text-main); cursor: pointer; }

    /* Success state */
    .success-state {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-state.show { display: block; animation: scaleIn 0.4s ease; }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-state h3 { font-size: 1.4rem; color: var(--purple); margin-bottom: 8px; }
    .success-state p { color: var(--text-soft); font-size: 0.9rem; margin-bottom: 24px; }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: span 1; }
      .register-body { padding: 24px; }
    }
  </style>
</head>
<body>
  <div id="headerPlaceholder"></div>

  <div class="page-content register-page">
    <div class="register-container">
      <div class="register-header fade-in-up">
        <img id="registerLogo" alt="شعار المعهد">
        <h1>التسجيل في المعهد</h1>
        <p>سجّل حسابك وابدأ رحلتك العلمية</p>
      </div>

      <div class="register-card fade-in-up delay-1">

        <!-- Role Switcher -->
        <div class="role-switcher">
          <button class="role-btn active" id="roleStudent" onclick="switchRole('student')">
            <span class="role-icon">👨‍🎓</span>
            طالب
          </button>
          <button class="role-btn" id="roleSupervisor" onclick="switchRole('supervisor')">
            <span class="role-icon">👨‍💼</span>
            مشرف
          </button>
        </div>

        <div class="register-body">

          <!-- ============================
               STUDENT SECTION
               ============================ -->
          <div id="studentSection">
            <!-- Inner tabs -->
            <div class="inner-tabs">
              <button class="inner-tab active" id="tabNewAccount" onclick="switchStudentTab('new')">حساب جديد</button>
              <button class="inner-tab" id="tabLogin" onclick="switchStudentTab('login')">تسجيل الدخول</button>
            </div>

            <!-- New Account Form -->
            <div id="formNewAccount">
              <div class="success-state" id="successRegister">
                <div class="success-icon">🎉</div>
                <h3>تم التسجيل بنجاح!</h3>
                <p>مرحباً بك في معهد التأصيل العلمي. جارٍ تحويلك إلى لوحة التحكم...</p>
              </div>
              <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-grid">
                  <div class="form-group full">
                    <label class="form-label">الاسم الثلاثي <span class="req">*</span></label>
                    <input type="text" class="form-control" id="reg_fullName" placeholder="أدخل اسمك الثلاثي" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">البريد الإلكتروني <span class="req">*</span></label>
                    <input type="email" class="form-control" id="reg_email" placeholder="example@mail.com" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">اسم المستخدم <span class="req">*</span></label>
                    <input type="text" class="form-control" id="reg_username" placeholder="username" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">كلمة المرور <span class="req">*</span></label>
                    <input type="password" class="form-control" id="reg_password" placeholder="••••••••" required minlength="6">
                  </div>
                  <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-control" id="reg_phone" placeholder="+968 XXXX XXXX">
                  </div>
                  <div class="form-group">
                    <label class="form-label">معرف التليجرام</label>
                    <input type="text" class="form-control" id="reg_telegram" placeholder="@username">
                  </div>
                  <div class="form-group full">
                    <label class="form-label">المرحلة الدراسية</label>
                    <select class="form-control" id="reg_level">
                      <option value="">اختر المرحلة</option>
                      <option value="primary">ابتدائي</option>
                      <option value="middle">متوسط</option>
                      <option value="high">ثانوي</option>
                      <option value="bachelor">بكالوريوس</option>
                      <option value="master">ماجستير</option>
                      <option value="phd">دكتوراه</option>
                      <option value="work">وظيفة</option>
                    </select>
                  </div>
                  <div class="form-group full">
                    <label class="form-label">الجنس <span class="req">*</span></label>
                    <div class="radio-group">
                      <label class="radio-item">
                        <input type="radio" name="gender" value="male" checked> <span>ذكر</span>
                      </label>
                      <label class="radio-item">
                        <input type="radio" name="gender" value="female"> <span>أنثى</span>
                      </label>
                    </div>
                  </div>
                </div>
                <div class="form-error" id="reg_error"></div>
                <button type="submit" class="submit-btn" id="registerBtn">
                  <span id="registerBtnText">إنشاء الحساب</span>
                </button>
                <div class="switch-link">
                  لديك حساب؟ <a onclick="switchStudentTab('login')">تسجيل الدخول</a>
                </div>
              </form>
            </div>

            <!-- Login Form -->
            <div id="formLogin" style="display:none;">
              <div class="success-state" id="successLogin">
                <div class="success-icon">✅</div>
                <h3>أهلاً وسهلاً!</h3>
                <p>جارٍ تحويلك إلى لوحة التحكم...</p>
              </div>
              <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                  <label class="form-label">البريد الإلكتروني أو اسم المستخدم <span class="req">*</span></label>
                  <input type="text" class="form-control" id="login_identifier" placeholder="البريد أو اسم المستخدم" required>
                </div>
                <div class="form-group">
                  <label class="form-label">كلمة المرور <span class="req">*</span></label>
                  <input type="password" class="form-control" id="login_password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                  <label class="checkbox-group">
                    <input type="checkbox" id="login_remember">
                    <label for="login_remember">تذكرني (تسجيل دخول دائم)</label>
                  </label>
                </div>
                <div class="form-error" id="login_error"></div>
                <button type="submit" class="submit-btn" id="loginBtn">
                  <span id="loginBtnText">تسجيل الدخول</span>
                </button>
                <div class="switch-link">
                  ليس لديك حساب؟ <a onclick="switchStudentTab('new')">سجّل الآن</a>
                </div>
              </form>
            </div>
          </div>

          <!-- ============================
               SUPERVISOR SECTION
               ============================ -->
          <div id="supervisorSection" style="display:none;">
            <div class="success-state" id="successSupervisor">
              <div class="success-icon">✅</div>
              <h3>أهلاً بك أيها المشرف!</h3>
              <p>جارٍ تحويلك إلى لوحة التحكم...</p>
            </div>
            <form id="supervisorForm" onsubmit="handleSupervisorLogin(event)">
              <div class="form-group">
                <label class="form-label">البريد الإلكتروني / اسم المستخدم <span class="req">*</span></label>
                <input type="text" class="form-control" id="sup_identifier" placeholder="البريد أو اسم المستخدم" required>
              </div>
              <div class="form-group">
                <label class="form-label">كلمة المرور <span class="req">*</span></label>
                <input type="password" class="form-control" id="sup_password" placeholder="••••••••" required>
              </div>
              <div class="form-group">
                <label class="checkbox-group">
                  <input type="checkbox" id="sup_remember">
                  <label for="sup_remember">تذكرني (تسجيل دخول دائم)</label>
                </label>
              </div>
              <div class="form-error" id="sup_error"></div>
              <button type="submit" class="submit-btn" id="supBtn">
                <span id="supBtnText">دخول المشرف</span>
              </button>
            </form>
          </div>

        </div><!-- /register-body -->
      </div><!-- /register-card -->
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script type="module">
    import { renderHeader, renderFooter, LOGO_SRC } from './components.js';
    import {
      auth, db,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      doc, setDoc, getDoc, collection, getDocs
    } from './firebase.js';
    import { browserLocalPersistence, browserSessionPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    document.getElementById('headerPlaceholder').innerHTML = renderHeader('register.html');
    document.getElementById('footerPlaceholder').innerHTML = renderFooter();
    document.getElementById('registerLogo').src = LOGO_SRC;

    const header = document.getElementById('siteHeader');
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 40));
    hamburger && hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));

    // ============ ROLE SWITCH ============
    window.switchRole = function(role) {
      const student = document.getElementById('studentSection');
      const supervisor = document.getElementById('supervisorSection');
      const btnStudent = document.getElementById('roleStudent');
      const btnSup = document.getElementById('roleSupervisor');
      if (role === 'student') {
        student.style.display = ''; supervisor.style.display = 'none';
        btnStudent.classList.add('active'); btnSup.classList.remove('active');
      } else {
        student.style.display = 'none'; supervisor.style.display = '';
        btnSup.classList.add('active'); btnStudent.classList.remove('active');
      }
    };

    // ============ STUDENT TABS ============
    window.switchStudentTab = function(tab) {
      const newAccount = document.getElementById('formNewAccount');
      const login = document.getElementById('formLogin');
      const tabNew = document.getElementById('tabNewAccount');
      const tabLog = document.getElementById('tabLogin');
      if (tab === 'new') {
        newAccount.style.display = ''; login.style.display = 'none';
        tabNew.classList.add('active'); tabLog.classList.remove('active');
      } else {
        newAccount.style.display = 'none'; login.style.display = '';
        tabLog.classList.add('active'); tabNew.classList.remove('active');
      }
    };

    // ============ REGISTER NEW STUDENT ============
    window.handleRegister = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const btnText = document.getElementById('registerBtnText');
      const errEl = document.getElementById('reg_error');
      errEl.classList.remove('show');

      const fullName = document.getElementById('reg_fullName').value.trim();
      const email = document.getElementById('reg_email').value.trim();
      const username = document.getElementById('reg_username').value.trim();
      const password = document.getElementById('reg_password').value;
      const phone = document.getElementById('reg_phone').value.trim();
      const telegram = document.getElementById('reg_telegram').value.trim();
      const level = document.getElementById('reg_level').value;
      const gender = document.querySelector('input[name="gender"]:checked')?.value || 'male';

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> جارٍ التسجيل...';

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', userCred.user.uid), {
          fullName, email, username, phone, telegram,
          level, gender, role: 'student',
          progress: {}, createdAt: new Date().toISOString()
        });
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('successRegister').classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 2000);
      } catch (error) {
        let msg = 'حدث خطأ. حاول مرة أخرى.';
        if (error.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم مسبقاً.';
        if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة جداً (٦ أحرف على الأقل).';
        errEl.textContent = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btnText.textContent = 'إنشاء الحساب';
      }
    };

    // ============ STUDENT LOGIN ============
    window.handleLogin = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const errEl = document.getElementById('login_error');
      errEl.classList.remove('show');
      const identifier = document.getElementById('login_identifier').value.trim();
      const password = document.getElementById('login_password').value;
      const remember = document.getElementById('login_remember').checked;

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> جارٍ الدخول...';

      try {
        // Try to find by username first
        let email = identifier;
        if (!identifier.includes('@')) {
          const usersSnap = await getDocs(collection(db, 'users'));
          usersSnap.forEach(d => { if (d.data().username === identifier) email = d.data().email; });
        }
        if (remember) await setPersistence(auth, browserLocalPersistence);
        else await setPersistence(auth, browserSessionPersistence);
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('successLogin').classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 2000);
      } catch (error) {
        let msg = 'بيانات غير صحيحة. تحقق من البريد وكلمة المرور.';
        errEl.textContent = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btnText.textContent = 'تسجيل الدخول';
      }
    };

    // ============ SUPERVISOR LOGIN ============
    window.handleSupervisorLogin = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('supBtn');
      const btnText = document.getElementById('supBtnText');
      const errEl = document.getElementById('sup_error');
      errEl.classList.remove('show');
      const identifier = document.getElementById('sup_identifier').value.trim();
      const password = document.getElementById('sup_password').value;
      const remember = document.getElementById('sup_remember').checked;

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> جارٍ الدخول...';

      try {
        let email = identifier;
        if (!identifier.includes('@')) {
          const usersSnap = await getDocs(collection(db, 'users'));
          usersSnap.forEach(d => { if (d.data().username === identifier) email = d.data().email; });
        }
        if (remember) await setPersistence(auth, browserLocalPersistence);
        else await setPersistence(auth, browserSessionPersistence);
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
        if (userDoc.exists() && (userDoc.data().role === 'superAdmin' || userDoc.data().role === 'supervisor')) {
          document.getElementById('supervisorForm').style.display = 'none';
          document.getElementById('successSupervisor').classList.add('show');
          setTimeout(() => window.location.href = 'dashboard.html', 2000);
        } else {
          await auth.signOut();
          throw new Error('not_supervisor');
        }
      } catch (error) {
        let msg = 'بيانات غير صحيحة أو ليس لديك صلاحية مشرف.';
        errEl.textContent = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btnText.textContent = 'دخول المشرف';
      }
    };
  </script>
</body>
</html>
