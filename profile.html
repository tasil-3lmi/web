<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/></noscript>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>firebase.initializeApp({apiKey:"AIzaSyC1sZ0cJeQMJ6QdnxwFkcfK3AGir0TRuuk",authDomain:"tasil-3lmi.firebaseapp.com",projectId:"tasil-3lmi",storageBucket:"tasil-3lmi.firebasestorage.app",messagingSenderId:"596405733121",appId:"1:596405733121:web:38ebadcc9eef8d8bb77d00"});
const auth=firebase.auth(); const db=firebase.firestore();</script>
<link rel="stylesheet" href="styles.css"/>
<script src="shared.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div id="spinner" class="spinner-overlay"><div class="spin-ring"></div></div>
<div id="app" style="display:none">
  <div id="nav-ph"></div>
  <main style="max-width:1100px;margin:0 auto;padding:24px">
    
<div style="max-width:600px;margin:0 auto">
  <!-- Grades link -->
  <a href="grades.html" style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:14px;padding:16px 20px;margin-bottom:16px;text-decoration:none;transition:.2s" onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter=''">
    <span style="font-size:28px">🏅</span>
    <div>
      <div style="font-family:'Amiri',serif;font-size:16px;font-weight:700;color:#fff">درجاتي وإنجازاتي</div>
      <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:2px">عرض درجاتك في التمارين والاختبارات ونسبة إنجازك</div>
    </div>
    <span style="margin-right:auto;color:rgba(255,255,255,.6);font-size:18px">←</span>
  </a>

  <div style="background:#fff;border-radius:16px;padding:24px;border:1px solid rgba(212,180,142,.2)">
    <h2 style="font-family:'Amiri',serif;font-size:20px;color:var(--purple);margin-bottom:20px">الملف الشخصي</h2>
    <div id="profile-form"></div>
  </div>
</div>
  </main>
</div>
<div id="modal-container"></div>
<div id="toast-container"></div>
<script>
const PAGE_ID='profile';

// Cache-first auth
let currentUser=null;
(function(){ const c=localStorage.getItem('ti_user'); if(c){ try{ currentUser=JSON.parse(c); showApp(); }catch(e){} }})();
auth.onAuthStateChanged(async user=>{
  if(!user){ localStorage.removeItem('ti_user'); location.href='login.html'; return; }
  if(!currentUser){
    const a=await db.collection('admins').doc(user.uid).get().catch(()=>null);
    if(a?.exists){ currentUser={uid:user.uid,...a.data(),isAdmin:true}; }
    else{ const u=await db.collection('users').doc(user.uid).get().catch(()=>null); if(!u?.exists){ await auth.signOut(); location.href='login.html'; return; } currentUser={uid:user.uid,...u.data(),isAdmin:false}; }
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
    showApp();
  }
});
function showApp(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('nav-ph').outerHTML=buildNav(PAGE_ID,currentUser);
  if(typeof setNavUser==='function') setNavUser(currentUser);
  setTimeout(()=>{ if(window.lucide) lucide.createIcons(); },80);
  if(typeof onReady==='function') onReady();
}
async function logout(){ localStorage.removeItem('ti_user'); try{await auth.signOut();}catch(e){} location.href='index.html'; }

function onReady(){
  const u=currentUser;
  document.getElementById('profile-form').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="field"><label>الاسم</label><input type="text" id="p-name" value="${u.name||u.fullName||''}"/></div>
      <div class="field"><label>البريد</label><input type="email" id="p-email" value="${u.email||''}" style="opacity:.6" readonly/></div>
      <div class="field"><label>الهاتف</label><input type="text" id="p-phone" value="${u.phone||''}"/></div>
      <div class="field"><label>تيليجرام</label><input type="text" id="p-tg" value="${u.telegram||''}"/></div>
      <div class="field"><label>العمر</label><input type="text" id="p-age" value="${u.age||''}"/></div>
      <div class="field"><label>المستوى</label><input type="text" id="p-level" value="${u.level||''}"/></div>
    </div>
    <button class="btn btn-primary" onclick="saveProfile()"><i data-lucide="save" style="width:14px;height:14px"></i> حفظ</button>
    <div id="p-msg" style="display:none;margin-top:12px;padding:10px;border-radius:8px;font-size:13px"></div>
  `;
  if(window.lucide) lucide.createIcons();
}
async function saveProfile(){
  const updates={name:document.getElementById('p-name').value.trim(),phone:document.getElementById('p-phone').value.trim(),telegram:document.getElementById('p-tg').value.trim(),age:document.getElementById('p-age').value.trim()};
  try{
    const col=currentUser.isAdmin?'admins':'users';
    await db.collection(col).doc(currentUser.uid).update(updates);
    Object.assign(currentUser,updates);
    localStorage.setItem('ti_user',JSON.stringify(currentUser));
    const m=document.getElementById('p-msg');
    m.textContent='✅ تم الحفظ'; m.style.cssText='display:block;background:#d4edda;color:#155724;padding:10px;border-radius:8px;font-size:13px';
    setTimeout(()=>m.style.display='none',3000);
  }catch(e){ alert('خطأ: '+e.message); }
}
</script>
</body>
</html>
