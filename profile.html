<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3B1B40;--purple-l:#5a2d63;--gold:#D4B48E;--gold-d:#b8965e;--bg:#faf8f5;--white:#fff;--muted:#7a6a7e}
body{font-family:'Zain',sans-serif;background:var(--bg);color:#1a0a1e;direction:rtl}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(212,180,142,.2);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 16px rgba(59,27,64,.06)}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color:var(--purple);font-family:'Amiri',serif}
.nav-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Amiri',serif;font-size:16px;font-weight:900}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;transition:.2s;background:transparent;color:var(--muted);text-decoration:none}
.nav-btn:hover,.nav-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.nav-btn i{width:14px;height:14px}
.btn-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:none;cursor:pointer;font-family:'Zain',sans-serif;font-size:12px;font-weight:700;background:rgba(220,53,69,.1);color:#dc3545;transition:.2s}
.btn-logout:hover{background:#dc3545;color:#fff}
main{max-width:1100px;margin:0 auto;padding:28px 24px}
.card{background:var(--white);border-radius:16px;padding:22px;border:1px solid rgba(212,180,142,.2);box-shadow:0 4px 20px rgba(59,27,64,.06);margin-bottom:16px}
.card h2{font-size:18px;font-weight:800;color:var(--purple);margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid rgba(212,180,142,.15)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:11px;border:none;font-family:'Zain',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.22s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--purple)}
.btn-danger{background:linear-gradient(135deg,#dc3545,#c82333);color:#fff}
.btn-sm{padding:6px 13px;font-size:12px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-green{background:rgba(40,167,69,.12);color:#28a745}
.badge-yellow{background:rgba(255,193,7,.15);color:#856404}
.badge-red{background:rgba(220,53,69,.1);color:#dc3545}
table{width:100%;border-collapse:collapse}
th{background:var(--purple);color:#fff;padding:10px 14px;font-size:12px;font-weight:700;text-align:right}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(212,180,142,.12)}
tr:hover td{background:rgba(212,180,142,.05)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--purple);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid rgba(212,180,142,.4);font-size:13px;font-family:'Zain',sans-serif;background:var(--bg);outline:none;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,180,142,.2)}
#spinner{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:44px;height:44px;border:4px solid rgba(59,27,64,.12);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@media(max-width:768px){nav{padding:10px 16px}.nav-links .nav-btn span{display:none}main{padding:18px 14px}}
</style>
</head>
<body>
<div id="spinner"><div class="spin-ring"></div><div style="font-size:14px;color:var(--muted);font-weight:600">جارٍ التحميل...</div></div>
<div id="app" style="display:none">

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">ت</div>
    <span>معهد التأصيل</span>
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-btn"><i data-lucide="home"></i><span>الرئيسية</span></a>
    <a href="courses.html"   class="nav-btn" id="nb-courses"><i data-lucide="book-open"></i><span>المقررات</span></a>
    <a href="tests.html"     class="nav-btn" id="nb-tests"><i data-lucide="clipboard-check"></i><span>الاختبارات</span></a>
    <a href="schedule.html"  class="nav-btn" id="nb-schedule"><i data-lucide="calendar"></i><span>الجدول</span></a>
    <a href="qa.html"        class="nav-btn" id="nb-qa"><i data-lucide="message-circle"></i><span>الأسئلة</span></a>
    <a href="profile.html"   class="nav-btn" id="nb-profile" class="nav-btn active"><i data-lucide="user"></i><span>ملفي</span></a>
    <a href="admin.html"     class="nav-btn" id="nav-admin" style="display:none"><i data-lucide="settings"></i><span>الإدارة</span></a>
    <button class="btn-logout" onclick="logout()"><i data-lucide="log-out" style="width:14px;height:14px"></i>خروج</button>
  </div>
</nav>

<main>
<div class="card">
  <h2><i data-lucide="user" style="width:20px;height:20px;color:var(--gold-d)"></i> الملف الشخصي</h2>
  <div id="profile-content">جارٍ التحميل...</div>
</div>
</main>
</div>
<script>

let currentUser = null;

auth.onAuthStateChanged(async user => {
  if(!user){ window.location.href = 'login.html'; return; }

  // Check admin
  const adminSnap = await db.collection('admins').doc(user.uid).get().catch(()=>null);
  if(adminSnap?.exists){
    currentUser = { uid:user.uid, ...adminSnap.data(), isAdmin:true };
  } else {
    const userSnap = await db.collection('users').doc(user.uid).get().catch(()=>null);
    if(!userSnap?.exists){ await auth.signOut(); window.location.href='login.html'; return; }
    currentUser = { uid:user.uid, ...userSnap.data(), isAdmin:false };
  }

  if(currentUser.isAdmin) document.getElementById('nav-admin').style.display='';

  document.getElementById('spinner').style.display='none';
  document.getElementById('app').style.display='';

  if(typeof initPage === 'function') initPage();
  lucide.createIcons();
});

async function logout(){
  localStorage.removeItem('ti_rm');
  await auth.signOut();
  window.location.href='index.html';
}


function initPage(){
  const u = currentUser;
  document.getElementById('profile-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
      <div class="field"><label>الاسم</label><input type="text" id="p-name" value="${u.name||u.fullName||''}"/></div>
      <div class="field"><label>البريد</label><input type="email" id="p-email" value="${u.email||''}" readonly style="opacity:.6"/></div>
      <div class="field"><label>الهاتف</label><input type="text" id="p-phone" value="${u.phone||''}"/></div>
      <div class="field"><label>تيليجرام</label><input type="text" id="p-tg" value="${u.telegram||''}"/></div>
    </div>
    <button class="btn btn-primary" onclick="saveProfile()">
      <i data-lucide="save" style="width:14px;height:14px"></i> حفظ التغييرات
    </button>
    <div id="profile-msg" style="display:none;margin-top:12px;padding:10px;border-radius:8px;font-size:13px"></div>
  `;
  lucide.createIcons();
}

async function saveProfile(){
  const updates = {
    name: document.getElementById('p-name').value.trim(),
    phone: document.getElementById('p-phone').value.trim(),
    telegram: document.getElementById('p-tg').value.trim(),
  };

  try{
    const col = currentUser.isAdmin ? 'admins' : 'users';
    await db.collection(col).doc(currentUser.uid).update(updates);
    const msg = document.getElementById('profile-msg');
    msg.textContent = '✅ تم حفظ التغييرات';
    msg.style.cssText = 'display:block;margin-top:12px;padding:10px;border-radius:8px;font-size:13px;background:#d4edda;color:#155724';
    Object.assign(currentUser, updates);
    setTimeout(()=>msg.style.display='none', 3000);
  }catch(e){
    console.log('Save profile error:', e.message);
    alert('خطأ: ' + e.message);
  }
}

</script>
</body>
</html>
