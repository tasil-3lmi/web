<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الملف الشخصي — معهد التأصيل العلمي</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f7f5fa; }
    .profile-hero {
      background: linear-gradient(135deg, var(--purple), #5a2d6b);
      padding: 110px 0 60px;
      text-align: center;
      color: white;
    }
    .profile-avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: bold; color: white;
      margin: 0 auto 16px;
      border: 3px solid rgba(255,255,255,0.35);
    }
    .profile-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 6px; }
    .profile-role-badge {
      display: inline-block; padding: 4px 16px;
      background: rgba(212,180,142,0.25);
      border: 1px solid rgba(212,180,142,0.4);
      border-radius: 100px; font-size: 0.82rem; color: var(--gold);
    }
    .profile-body { padding: 40px 0 60px; }
    .panel-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .panel-card h3 {
      font-size: 1rem; font-weight: bold; color: var(--purple);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .info-item label {
      display: block; font-size: 0.75rem; color: var(--text-soft);
      margin-bottom: 4px; font-weight: bold;
    }
    .info-item span {
      font-size: 0.92rem; color: var(--text);
    }
    .status-pending  { background: rgba(212,180,142,0.15); color: #b07d2a; padding: 3px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; }
    .status-accepted { background: rgba(26,122,74,0.12);   color: #1a7a4a; padding: 3px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; }
    .status-rejected { background: rgba(185,45,58,0.10);   color: #b92d3a; padding: 3px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; }
    .progress-bar-wrap { background: rgba(59,27,64,0.08); border-radius: 8px; height: 10px; margin-top: 6px; }
    .progress-bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--purple), var(--gold)); transition: width 0.6s ease; }
    .private-channel-box {
      background: rgba(212,180,142,0.08); border: 1px solid rgba(212,180,142,0.3);
      border-radius: var(--radius-sm); padding: 18px; text-align: center;
    }
    .private-channel-box a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; background: linear-gradient(135deg,var(--purple),#5a2d6b);
      color: white; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem;
    }
    .edit-form { display: none; }
    .edit-form.open { display: block; }
    @media(max-width:600px) { .info-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="headerPlaceholder"></div>
  <div class="page-content">

    <!-- HERO -->
    <div class="profile-hero">
      <div class="container">
        <div class="profile-avatar" id="profileAvatar">؟</div>
        <div class="profile-name" id="profileName">جارٍ التحميل...</div>
        <div class="profile-role-badge" id="profileRole">طالب</div>
      </div>
    </div>

    <div class="profile-body">
      <div class="container" style="max-width:720px;">

        <!-- حالة الحساب -->
        <div class="panel-card" id="statusCard" style="display:none;">
          <h3>📋 حالة الحساب</h3>
          <div id="statusContent"></div>
        </div>

        <!-- المعلومات الشخصية -->
        <div class="panel-card">
          <h3>👤 المعلومات الشخصية
            <button class="btn btn-outline btn-sm" style="margin-right:auto;" onclick="toggleEdit()">✏️ تعديل</button>
          </h3>
          <div class="info-grid" id="infoDisplay">
            <div class="info-item"><label>الاسم الكامل</label><span id="d_fullName">—</span></div>
            <div class="info-item"><label>اسم المستخدم</label><span id="d_username">—</span></div>
            <div class="info-item"><label>البريد الإلكتروني</label><span id="d_email" style="direction:ltr;display:block;">—</span></div>
            <div class="info-item"><label>رقم الهاتف</label><span id="d_phone">—</span></div>
            <div class="info-item"><label>تليجرام</label><span id="d_telegram">—</span></div>
            <div class="info-item"><label>الجنس</label><span id="d_gender">—</span></div>
            <div class="info-item"><label>الدولة</label><span id="d_country">—</span></div>
            <div class="info-item"><label>مكان الإقامة</label><span id="d_residence">—</span></div>
            <div class="info-item"><label>المستوى الدراسي</label><span id="d_level">—</span></div>
          </div>

          <!-- نموذج التعديل -->
          <div class="edit-form" id="editForm">
            <div class="info-grid" style="margin-top:16px;">
              <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text" class="form-control" id="e_fullName"></div>
              <div class="form-group"><label class="form-label">رقم الهاتف</label><input type="text" class="form-control" id="e_phone"></div>
              <div class="form-group"><label class="form-label">تليجرام</label><input type="text" class="form-control" id="e_telegram" placeholder="@username"></div>
              <div class="form-group"><label class="form-label">مكان الإقامة</label><input type="text" class="form-control" id="e_residence"></div>
            </div>
            <div style="display:flex;gap:12px;margin-top:8px;">
              <button class="btn btn-primary btn-sm" onclick="saveProfile()">💾 حفظ التعديلات</button>
              <button class="btn btn-outline btn-sm" onclick="toggleEdit()">إلغاء</button>
            </div>
          </div>
        </div>

        <!-- تغيير كلمة المرور -->
        <div class="panel-card">
          <h3>🔒 تغيير كلمة المرور</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">كلمة المرور الجديدة</label>
              <input type="password" class="form-control" id="newPassword" placeholder="••••••••" minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label">تأكيد كلمة المرور</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••">
            </div>
          </div>
          <div class="form-error" id="passError" style="margin-bottom:8px;"></div>
          <button class="btn btn-primary btn-sm" onclick="changePassword()">تحديث كلمة المرور</button>
        </div>

        <!-- تقدم الدراسة -->
        <div class="panel-card" id="progressCard" style="display:none;">
          <h3>📚 تقدم الدراسة</h3>
          <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:0.9rem;color:var(--text-soft);">الإنجاز الكلي</span>
            <span style="font-weight:bold;color:var(--purple);" id="progressPct">0٪</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <!-- القناة الخاصة -->
        <div class="panel-card" id="privateChannelCard" style="display:none;">
          <h3>🔒 القناة الخاصة بطلاب المعهد</h3>
          <div class="private-channel-box">
            <p style="color:var(--text-soft);font-size:0.85rem;margin-bottom:12px;">⚠️ هذا الرابط خاص بطلاب المعهد، يُرجى عدم مشاركته</p>
            <a href="#" id="privateChannelLink" target="_blank">✈️ الانضمام للقناة الخاصة</a>
          </div>
        </div>

        <!-- تسجيل الخروج -->
        <div style="text-align:center;padding:8px 0 24px;">
          <button class="btn btn-outline" onclick="handleLogout()" style="color:#b92d3a;border-color:#b92d3a;">🚪 تسجيل الخروج</button>
        </div>

      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script type="module">
    import { renderHeader, renderFooter, initSharedBehavior, showToast } from './components.js';
    import {
      auth, db,
      onAuthStateChanged,
      doc, getDoc, updateDoc, collection, getDocs
    } from './firebase.js';
    import { updatePassword, reauthenticateWithCredential, EmailAuthProvider }
      from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const TOTAL_ITEMS = 23;
    const LEVEL_MAP = { primary:'ابتدائي', middle:'متوسط', high:'ثانوي', bachelor:'بكالوريوس', master:'ماجستير', phd:'دكتوراه', work:'وظيفة' };

    let currentUser = null;
    let currentData = null;

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'register.html'; return; }
      currentUser = user;

      // تحميل البيانات
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = 'register.html'; return; }

      currentData = snap.data();
      const d = currentData;

      // رسم الهيدر
      document.getElementById('headerPlaceholder').innerHTML = renderHeader('profile.html', d);
      document.getElementById('footerPlaceholder').innerHTML = renderFooter(null);
      initSharedBehavior();

      // HERO
      document.getElementById('profileAvatar').textContent = d.fullName ? d.fullName.charAt(0) : '؟';
      document.getElementById('profileName').textContent   = d.fullName || '—';
      const isAdmin = d.role === 'superAdmin' || d.role === 'supervisor';
      document.getElementById('profileRole').textContent   = isAdmin ? 'مشرف' : 'طالب';

      // حالة الحساب (للطلاب فقط)
      if (!isAdmin) {
        const statusCard = document.getElementById('statusCard');
        const statusEl   = document.getElementById('statusContent');
        statusCard.style.display = '';
        if (d.status === 'pending') {
          statusEl.innerHTML = '<span class="status-pending">⏳ قيد المراجعة — سيتم إعلامك عند القبول</span>';
        } else if (d.status === 'rejected') {
          statusEl.innerHTML = '<span class="status-rejected">🚫 تم رفض طلبك — تواصل مع الإدارة</span>';
        } else {
          statusEl.innerHTML = '<span class="status-accepted">✅ مقبول</span>';
        }
      }

      // المعلومات الشخصية
      document.getElementById('d_fullName').textContent  = d.fullName  || '—';
      document.getElementById('d_username').textContent  = d.username  || '—';
      document.getElementById('d_email').textContent     = d.email     || '—';
      document.getElementById('d_phone').textContent     = d.phone     || '—';
      document.getElementById('d_telegram').textContent  = d.telegram  || '—';
      document.getElementById('d_gender').textContent    = d.gender === 'female' ? 'أنثى' : 'ذكر';
      document.getElementById('d_country').textContent   = d.country   || '—';
      document.getElementById('d_residence').textContent = d.residence || '—';
      document.getElementById('d_level').textContent     = LEVEL_MAP[d.level] || '—';

      // نموذج التعديل — القيم الأولية
      document.getElementById('e_fullName').value  = d.fullName  || '';
      document.getElementById('e_phone').value     = d.phone     || '';
      document.getElementById('e_telegram').value  = d.telegram  || '';
      document.getElementById('e_residence').value = d.residence || '';

      // تقدم الدراسة
      if (!isAdmin) {
        const done = Object.values(d.progress || {}).filter(Boolean).length;
        const pct  = Math.round((done / TOTAL_ITEMS) * 100);
        document.getElementById('progressCard').style.display = '';
        document.getElementById('progressPct').textContent = pct + '٪';
        document.getElementById('progressFill').style.width = pct + '%';
      }

      // القناة الخاصة
      try {
        const cs = await getDoc(doc(db, 'contactInfo', 'main'));
        if (cs.exists() && cs.data().privateChannelUrl && !isAdmin && d.status === 'accepted') {
          document.getElementById('privateChannelCard').style.display = '';
          document.getElementById('privateChannelLink').href = cs.data().privateChannelUrl;
        }
      } catch(e) {}
    });

    // تبديل نموذج التعديل
    window.toggleEdit = function() {
      document.getElementById('editForm').classList.toggle('open');
    };

    // حفظ التعديلات
    window.saveProfile = async function() {
      if (!currentUser) return;
      const updates = {
        fullName:  document.getElementById('e_fullName').value.trim(),
        phone:     document.getElementById('e_phone').value.trim(),
        telegram:  document.getElementById('e_telegram').value.trim(),
        residence: document.getElementById('e_residence').value.trim(),
      };
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), updates);
        // تحديث العرض
        document.getElementById('d_fullName').textContent  = updates.fullName  || '—';
        document.getElementById('d_phone').textContent     = updates.phone     || '—';
        document.getElementById('d_telegram').textContent  = updates.telegram  || '—';
        document.getElementById('d_residence').textContent = updates.residence || '—';
        document.getElementById('profileName').textContent = updates.fullName  || '—';
        document.getElementById('editForm').classList.remove('open');
        showToast('تم حفظ التعديلات ✅', 'success');
      } catch(e) {
        showToast('حدث خطأ: ' + e.message, 'error');
      }
    };

    // تغيير كلمة المرور
    window.changePassword = async function() {
      const newPass  = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const errEl    = document.getElementById('passError');
      errEl.textContent = '';
      errEl.classList.remove('show');

      if (newPass.length < 6) {
        errEl.textContent = 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.';
        errEl.classList.add('show'); return;
      }
      if (newPass !== confirm) {
        errEl.textContent = 'كلمتا المرور غير متطابقتين.';
        errEl.classList.add('show'); return;
      }
      try {
        await updatePassword(currentUser, newPass);
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        showToast('تم تحديث كلمة المرور ✅', 'success');
      } catch(e) {
        if (e.code === 'auth/requires-recent-login') {
          errEl.textContent = 'يرجى تسجيل الخروج والدخول مجدداً ثم إعادة المحاولة.';
        } else {
          errEl.textContent = 'حدث خطأ: ' + e.message;
        }
        errEl.classList.add('show');
      }
    };

    // تسجيل الخروج
    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    window.toggleNotifPanel = function() {
      const p = document.getElementById('notifPanel');
      if (p) p.style.display = p.style.display === 'none' ? 'block' : 'none';
    };
    window.markAllRead = function() {};
  </script>
</body>
</html>
